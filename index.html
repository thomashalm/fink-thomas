<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Fengselsimulator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0e1012;
  display:flex;
  font-family:'Courier New',monospace;
  color:#b0b0b0;
  height:100vh;
  overflow:hidden;
}
#canvas-wrap {
  flex:1;
  display:flex; align-items:center; justify-content:center;
  background:#0a0c0e;
  overflow:hidden;
}
canvas {
  display:block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#sidebar {
  width:260px;
  height:100vh;
  flex:0 0 260px;
  background:#161a1e;
  border-left:2px solid #222830;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.panel { padding:11px 14px; border-bottom:1px solid #1e2228; }
#hdr h1 { font-size:0.62rem; letter-spacing:3px; color:#334; text-transform:uppercase; margin-bottom:7px; }
#phase-display { font-size:1.3rem; color:#c8b460; font-weight:bold; }
#day-display   { font-size:0.75rem; color:#445; margin-top:2px; }
.stat-row { display:flex; justify-content:space-between; padding:2px 0; font-size:0.78rem; }
.lbl { color:#445; }
.val { color:#999; }
.val.hi { color:#c84040; }
.val.md { color:#b87830; }
.val.lo { color:#388050; }
.mlog { font-size:0.72rem; color:#8a9098; margin:2px 0; display:flex; gap:6px; }
.mlog .mlog-day { color:#555; flex-shrink:0; width:28px; }
.mlog.arrival { color:#c9a227; }
.mlog.rivalry { color:#d45f5f; }
.mlog.fall    { color:#7a96b8; }
.mlog.throne  { color:#e0c160; font-weight:600; }
.mlog.bed     { color:#9a8a6a; }
.departed-item   { padding:4px 0; border-bottom:1px solid #222; }
.departed-item:last-child { border-bottom:none; }
.departed-head   { display:flex; gap:6px; align-items:center; font-size:0.72rem; }
.departed-name   { font-weight:600; color:#c9c4b8; }
.departed-reason { font-size:0.72rem; color:#8a9098; margin-top:2px; padding-left:34px; }
.departed-section { font-size:0.58rem; letter-spacing:2px; color:#556; text-transform:uppercase; margin:6px 0 2px; }
.departed-section:first-child { margin-top:0; }
#departed-list { max-height:240px; overflow-y:auto; }
#inmate-section { flex:1; min-height:90px; overflow-y:auto; }
#inmate-section h3 { font-size:0.6rem; letter-spacing:2px; color:#334; text-transform:uppercase; padding:6px 14px 5px; border-bottom:1px solid #1a1e24; }
#gang-strip {
  display:flex; gap:3px;
  padding:6px 8px 4px; border-bottom:1px solid #1a1e24;
  position:sticky; top:0; background:#161a1e; z-index:2;
}
.gs {
  flex:1; text-align:center; cursor:pointer;
  background:#1a1e24; border:1px solid #252a32; border-radius:3px;
  padding:4px 3px; font-size:0.58rem; color:#667; letter-spacing:0.3px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  display:flex; align-items:center; justify-content:center; gap:4px;
}
.gs:hover { background:#22262e; color:#889; }
.gs.on    { background:#22293a; border-color:#c8b460; color:#c8b460; }
.gs-dot   { display:inline-block; width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.gs-count { font-weight:700; opacity:0.85; }
.ir-empty { padding:12px; text-align:center; color:#334; font-size:0.65rem; }
.ir.pinned { border-color:#665030; }
.ir {
  display:grid;
  grid-template-columns: 1fr auto auto auto 60px auto;
  align-items:center;
  gap:6px;
  padding: 3px 10px;
  margin: 1px 6px;
  cursor: pointer;
  border: 1px solid #1e2228;
  border-radius: 3px;
  background: #161a20;
  font-size: 0.72rem;
  transition: background 0.12s, border-color 0.12s;
}
.ir:hover { background:#1e2430; border-color:#3a4250; }
.ir.sel  { background:#22293a; border-color:#c8b460; box-shadow:0 0 6px rgba(200,180,96,0.18); }
.ir-name   { color:#ccc; font-weight:500;
             white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
             min-width:0; }
.ir-cell   { color:#556; font-size:0.62rem; letter-spacing:1px; }
.ir-status { font-size:0.75rem; min-width:12px; text-align:center; }
.ir-resp   { font-size:0.66rem; font-family:monospace; letter-spacing:0.5px; }
.ir-unrest { color:#778; font-size:0.66rem; font-family:monospace;
             min-width:18px; text-align:right; }
.ub { height:4px; background:#0e1116; border-radius:2px; overflow:hidden; }
.uf { height:100%; border-radius:2px; transition:width 0.5s; }
#detail { border-top:1px solid #1e2228; padding:11px 14px; background:#141820; max-height:50vh; overflow-y:auto; flex-shrink:0; }
#detail h4 { font-size:0.76rem; color:#c8b460; margin-bottom:6px; }
.dr { display:flex; justify-content:space-between; font-size:0.73rem; margin:2px 0; }
.dl { color:#445; }
.dv { color:#999; }
#ctrl { border-top:1px solid #1e2228; padding:6px 14px 5px; display:flex; flex-direction:column; gap:5px; }
.ctrl-row { display:flex; align-items:center; gap:5px; }
#ctrl span { font-size:0.66rem; color:#445; }
.sb {
  background:#1a1e24; border:1px solid #30363e; color:#777;
  padding:2px 7px; font-family:monospace; font-size:0.7rem;
  cursor:pointer; border-radius:2px;
  transition: border-color 0.12s, color 0.12s, box-shadow 0.12s;
}
.sb:hover { background:#22282e; border-color:#4a5560; color:#aaa; }
.sb.on { background:#202838; border-color:#c8b460; color:#c8b460;
         box-shadow: 0 0 6px rgba(200,180,96,0.18); }
.pb {
  background:#1a1e24; border:1px solid #30363e; color:#667;
  padding:2px 6px; font-family:monospace; font-size:0.63rem;
  cursor:pointer; border-radius:2px; flex:1;
  transition: border-color 0.12s, color 0.12s, box-shadow 0.12s;
}
.pb:hover { background:#1c2028; border-color:#445560; color:#99a; }
.pb.on { background:#1e2030; border-color:#8870a0; color:#c0a0e0;
         box-shadow: 0 0 5px rgba(136,112,160,0.2); }
.pwr {
  display:flex; justify-content:space-between; align-items:center;
  width:100%; margin-bottom:4px;
  background:#1a1e24; border:1px solid #30363e; color:#ccc;
  padding:6px 10px; font-family:monospace; font-size:0.72rem;
  cursor:pointer; border-radius:3px;
  transition: border-color 0.12s, color 0.12s, background 0.12s;
}
.pwr:hover:not(:disabled) { border-color:#c8b460; color:#c8b460; background:#1c2028; }
.pwr:disabled { color:#445; border-color:#1a1e24; cursor:default; background:#141820; }
.pwr-cd { font-size:0.6rem; color:#667; letter-spacing:1px; }
.pwr:not(:disabled) .pwr-cd { color:#388050; }
#tabbar { display:flex; border-bottom:1px solid #1e2228; background:#141820; }
.tb { flex:1; background:transparent; border:none;
      border-bottom:2px solid transparent;
      color:#667; padding:9px 4px 7px;
      font-family:monospace; font-size:0.7rem;
      letter-spacing:2px; text-transform:uppercase;
      cursor:pointer;
      transition: color 0.12s, border-color 0.12s, background 0.12s; }
.tb:hover { color:#aaa; background:#181c22; }
.tb.on { color:#c8b460; border-bottom-color:#c8b460; background:#181c22; }
.tabpane { display:none; }
.tabpane.on { display:flex; flex-direction:column; flex:1; min-height:0; }
#menu {
  position:fixed; inset:0; background:#0a0c0e;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  z-index:100;
}
#menu h1 { font-size:1.6rem; letter-spacing:6px; color:#c8b460; text-transform:uppercase; margin-bottom:10px; }
#menu p  { font-size:0.68rem; color:#334; letter-spacing:2px; margin-top:-10px; margin-bottom:8px; }
.mb {
  background:#141820; border:1px solid #2a3040; color:#888;
  padding:8px 32px; font-family:monospace; font-size:0.8rem; letter-spacing:2px;
  cursor:pointer; border-radius:2px; width:200px; text-align:center;
  transition: border-color 0.15s, color 0.15s;
}
.mb:hover:not(:disabled) { border-color:#c8b460; color:#c8b460; }
.mb:disabled { color:#2a3040; border-color:#1a1e24; cursor:default; }
</style>
</head>
<body>
<div id="menu">
  <h1>Fengselsimulator</h1>
  <p>Panoptikon v0.10.1 &bull; 2025</p>
  <button class="mb" id="btn-new">New Game</button>
  <button class="mb" id="btn-lastman">Last Man Standing</button>
  <button class="mb" id="btn-lastman-shower">Last Man Standing: Let's Take a Shower</button>
  <button class="mb" id="btn-continue" disabled>Continue</button>
  <button class="mb" id="btn-load" disabled>Load</button>
</div>
<div id="canvas-wrap"><canvas id="c"></canvas></div>
<div id="sidebar">
  <div class="panel" id="hdr">
    <h1>Fengselsimulator v1</h1>
    <div style="font-size:11px;color:#6a7080;margin-top:-2px;margin-bottom:4px;">Panoptikon v0.10.1</div>
    <div id="phase-display">Morgen</div>
    <div id="day-display">Dag 1</div>
    <div style="display:flex;flex-direction:column;gap:4px;margin-top:7px">
      <div class="ctrl-row">
        <button class="pb" data-p="Morgen">Morgen</button>
        <button class="pb" data-p="Formiddag">Formiddag</button>
        <button class="pb" data-p="Ettermiddag">Ettermiddag</button>
      </div>
      <div class="ctrl-row">
        <button class="pb" data-p="Kveld">Kveld</button>
        <button class="pb" data-p="Natt">Natt</button>
      </div>
    </div>
  </div>
  <div id="tabbar">
    <button class="tb on" data-tab="innsatte">Innsatte</button>
    <button class="tb"    data-tab="oversikt">Oversikt</button>
  </div>
  <div class="tabpane" data-tab="oversikt">
    <div class="panel">
      <div class="stat-row"><span class="lbl">Total uro</span><span class="val" id="s-unrest">0%</span></div>
      <div class="stat-row"><span class="lbl">Innsatte</span><span class="val" id="s-count">0</span></div>
      <div class="stat-row"><span class="lbl">Vakter</span><span class="val" id="s-guards">0</span></div>
    </div>
    <div class="panel">
      <div class="stat-row"><span class="lbl">Kamper</span><span class="val" id="s-fights">0</span></div>
      <div class="stat-row"><span class="lbl">Vennskap</span><span class="val" id="s-friendships">0</span></div>
      <div class="stat-row"><span class="lbl">Isolat</span><span class="val" id="s-isolation">0</span></div>
      <div class="stat-row"><span class="lbl">Samtaler</span><span class="val" id="s-counseling">0</span></div>
      <div class="stat-row"><span class="lbl">Bibliotek</span><span class="val" id="s-library">0</span></div>
      <div class="stat-row"><span class="lbl">Verksted</span><span class="val" id="s-workshop">0</span></div>
      <div class="stat-row"><span class="lbl">Forsvunnet</span><span class="val" id="s-disappeared">0</span></div>
    </div>
    <div class="panel" id="powers">
      <div style="font-size:0.6rem;letter-spacing:2px;color:#334;text-transform:uppercase;margin-bottom:6px">Powers</div>
      <button class="pwr" data-pwr="newcomer"><span>👤 Berømt nykommer</span><span class="pwr-cd">klar</span></button>
      <button class="pwr" data-pwr="gangwar"><span>🔥 Gjengkrig</span><span class="pwr-cd">klar</span></button>
    </div>
    <div class="panel" id="maktlogg-panel">
      <div style="font-size:0.6rem;letter-spacing:2px;color:#334;text-transform:uppercase;margin-bottom:6px">Maktlogg</div>
      <div id="maktlogg-list"></div>
    </div>
    <div class="panel" id="departed-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:0.6rem;letter-spacing:2px;color:#334;text-transform:uppercase">Forsvunnet</span>
        <button id="departed-toggle" class="sb" style="font-size:0.68rem;padding:2px 6px">Vis</button>
      </div>
      <div id="departed-list" style="display:none"></div>
    </div>
  </div>
  <div class="tabpane on" data-tab="innsatte">
    <div id="inmate-section">
      <div id="gang-strip">
        <div class="gs on" data-f="all"   title="Alle innsatte">Alle <span class="gs-count"></span></div>
        <div class="gs"    data-f="gA"    title="Gjeng A"><span class="gs-dot" style="background:#c83030"></span>A <span class="gs-count"></span></div>
        <div class="gs"    data-f="gB"    title="Gjeng B"><span class="gs-dot" style="background:#2858c8"></span>B <span class="gs-count"></span></div>
        <div class="gs"    data-f="gC"    title="Gjeng C"><span class="gs-dot" style="background:#28a040"></span>C <span class="gs-count"></span></div>
        <div class="gs"    data-f="gNone" title="Uten gjeng"><span class="gs-dot" style="background:#444;border:1px solid #667"></span>Ingen <span class="gs-count"></span></div>
      </div>
      <div id="ilist"></div>
    </div>
  </div>
  <div id="detail">
    <span style="color:#2a3040;font-size:0.73rem">Klikk på innsatt for detaljer.</span>
  </div>
  <div id="ctrl">
    <div class="ctrl-row">
      <span>Hastighet:</span>
      <button class="sb on" data-s="1">1×</button>
      <button class="sb" data-s="2">2×</button>
      <button class="sb" data-s="5">5×</button>
    </div>
    <div class="ctrl-row">
      <button class="sb" id="btn-save">Save</button>
      <button class="sb" id="btn-menu">Menu</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// CONFIG
// ================================================================
const TILE = 21, COLS = 44, ROWS = 26;
const W = COLS * TILE, H = ROWS * TILE; // 924 × 546

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

function fitCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const availW = wrap.clientWidth;
  const availH = wrap.clientHeight;
  const scale  = Math.min(availW / W, availH / H);
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

// ================================================================
// TILE DRAW FUNCTIONS
// ================================================================
function drawWall(ctx, px, py, T) {
  // Base mursteinsfarge
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(px, py, T, T);
  // Indre stein-flate
  ctx.fillStyle = '#464646';
  ctx.fillRect(px+1, py+1, T-2, T-2);

  // Mursteinsmønster — to rader per tile, offset annenhver tile-rad
  const even = Math.floor(py/T) % 2 === 0;
  const midY = py + T/2;
  const offX = even ? T/2 : 0;

  // Mortar-linjer (mørke)
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(px, midY); ctx.lineTo(px+T, midY);
  ctx.moveTo(px + offX, py);             ctx.lineTo(px + offX, midY);
  ctx.moveTo(px + offX + T/2, midY);     ctx.lineTo(px + offX + T/2, py + T);
  ctx.stroke();

  // Bevel — lys topp/venstre-kant gir 3D
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.fillRect(px, py, T, 1.5);
  ctx.fillRect(px, py, 1.5, T);

  // Bevel — mørk bunn/høyre-kant
  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.fillRect(px+T-2, py, 2, T);
  ctx.fillRect(px, py+T-2, T, 2);

  // Sparse slitasje: svak horisontal stripe på ~3% av veggene.
  if (((px/T*11 + py/T*17) % 33) < 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.07)';
    ctx.fillRect(px + 4, py + 7 + ((px+py)/T|0)%6, T - 8, 1.2);
  }
}

function drawFloor(ctx, px, py, T) {
  const v = (px/T*7 + py/T*13) % 3;
  ctx.fillStyle = v<1 ? '#505050' : v<2 ? '#4c4c4c' : '#484848';
  ctx.fillRect(px, py, T, T);
  ctx.strokeStyle = '#3e3e3e'; ctx.lineWidth = 0.5;
  ctx.strokeRect(px+0.5, py+0.5, T-1, T-1);
  if (((px/T*17 + py/T*23) % 31) < 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(px + 3 + ((px+py)/T|0)%4, py + 4 + ((px*3+py)/T|0)%5, 4, 3);
  }
  if (((px/T*7 + py/T*19) % 41) < 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fillRect(px + 5 + ((px+py*2)/T|0)%5, py + 8 + ((px*5+py)/T|0)%4, 3, 2);
  }
}

function drawCellFloor(ctx, px, py, T) {
  const v = (px/T*11 + py/T*7) % 3;
  ctx.fillStyle = v<1 ? '#444e5c' : v<2 ? '#404858' : '#3c4452';
  ctx.fillRect(px, py, T, T);
  ctx.strokeStyle = '#343c4c'; ctx.lineWidth = 0.5;
  ctx.strokeRect(px+0.5, py+0.5, T-1, T-1);
  if (((px/T*17 + py/T*23) % 31) < 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(px + 3 + ((px+py)/T|0)%4, py + 4 + ((px*3+py)/T|0)%5, 4, 3);
  }
  if (((px/T*7 + py/T*19) % 41) < 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fillRect(px + 5 + ((px+py*2)/T|0)%5, py + 8 + ((px*5+py)/T|0)%4, 3, 2);
  }
}

function drawDoor(ctx, px, py, T) {
  ctx.fillStyle = '#362416'; ctx.fillRect(px, py, T, T);
  ctx.fillStyle = '#282828';
  ctx.fillRect(px, py, T, 3); ctx.fillRect(px, py+T-3, T, 3);
  ctx.fillStyle = '#4c3820'; ctx.fillRect(px+3, py+3, T-6, T-6);
  ctx.fillStyle = '#706050'; ctx.fillRect(px+4, py+T*0.42|0, T-8, 3);
  ctx.fillStyle = '#8a8a8a'; ctx.fillRect(px+T-8, py+T/2-3|0, 3, 6);
}

function drawBed(ctx, px, py, T) {
  drawCellFloor(ctx, px, py, T);
  const m = 2;
  // Bed frame (dark wood)
  ctx.fillStyle = '#3a2410'; ctx.fillRect(px+m, py+m, T-m*2, T-m*2);
  ctx.strokeStyle = '#5a3820'; ctx.lineWidth = 1;
  ctx.strokeRect(px+m, py+m, T-m*2, T-m*2);
  // Mattress
  ctx.fillStyle = '#7a6050'; ctx.fillRect(px+m+2, py+m+2, T-m*2-4, T-m*2-4);
  // Blanket (lower 2/3)
  ctx.fillStyle = '#5c7080'; ctx.fillRect(px+m+2, py+m+6, T-m*2-4, T-m*2-8);
  // Blanket fold line
  ctx.strokeStyle = '#4a5e6c'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(px+m+2, py+m+6); ctx.lineTo(px+T-m-2, py+m+6); ctx.stroke();
  // Pillow — bright cream, clearly visible
  ctx.fillStyle = '#e0d8b8'; ctx.fillRect(px+m+3, py+m+2, T-m*2-8, 5);
  ctx.strokeStyle = '#c8c0a0'; ctx.lineWidth = 0.5;
  ctx.strokeRect(px+m+3, py+m+2, T-m*2-8, 5);
}

function drawToilet(ctx, px, py, T) {
  drawCellFloor(ctx, px, py, T);
  ctx.fillStyle = '#c0c0c0';
  ctx.beginPath(); ctx.ellipse(px+T/2, py+T*0.62, T*0.27, T*0.24, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#a0a0a0'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(px+T*0.27|0, py+T*0.17|0, T*0.46|0, T*0.26|0);
  ctx.strokeStyle = '#b0b0b0'; ctx.strokeRect(px+T*0.27|0, py+T*0.17|0, T*0.46|0, T*0.26|0);
}

function drawFence(ctx, px, py, T) {
  ctx.fillStyle = '#202020'; ctx.fillRect(px, py, T, T);
  ctx.strokeStyle = '#404040'; ctx.lineWidth = 1.5;
  for (let i=0; i<=2; i++) {
    const fx = px + T*(i/2);
    ctx.beginPath(); ctx.moveTo(fx, py); ctx.lineTo(fx, py+T); ctx.stroke();
  }
  ctx.strokeStyle = '#303030'; ctx.lineWidth = 0.8;
  for (let j=1; j<=4; j++) {
    const fy = py + T*(j/5);
    ctx.beginPath(); ctx.moveTo(px, fy); ctx.lineTo(px+T, fy); ctx.stroke();
  }
}

function drawYard(ctx, px, py, T) {
  const v = (px/T*5 + py/T*11) % 4;
  ctx.fillStyle = v<1?'#56603a':v<2?'#505a36':v<3?'#586438':'#4e5a36';
  ctx.fillRect(px, py, T, T);
  if (v>3.2) { ctx.fillStyle='rgba(80,60,20,0.1)'; ctx.fillRect(px+3,py+3,T-6,T-6); }
  if (((px/T*17 + py/T*23) % 31) < 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(px + 3 + ((px+py)/T|0)%4, py + 4 + ((px*3+py)/T|0)%5, 4, 3);
  }
  if (((px/T*7 + py/T*19) % 41) < 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fillRect(px + 5 + ((px+py*2)/T|0)%5, py + 8 + ((px*5+py)/T|0)%4, 3, 2);
  }
}

function drawTable(ctx, px, py, T) {
  drawFloor(ctx, px, py, T);
  const m = 3;
  ctx.fillStyle = '#543818'; ctx.fillRect(px+m, py+m+3, T-m*2, T-m*2-6);
  ctx.fillStyle = '#422c10';
  ctx.fillRect(px+m, py+m, T-m*2, 3);
  ctx.fillRect(px+m, py+T-m-3, T-m*2, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect(px+m+2, py+m+5, T-m*2-4, 2);
}

function drawGymFloor(ctx, px, py, T) {
  const v = (px/T*5 + py/T*7) % 3;
  ctx.fillStyle = v<1 ? '#3e2424' : v<2 ? '#392222' : '#342020';
  ctx.fillRect(px, py, T, T);
  // Gummimatte-kant (tykkere, mørk)
  ctx.strokeStyle = '#1a0f0f'; ctx.lineWidth = 0.8;
  ctx.strokeRect(px+0.5, py+0.5, T-1, T-1);
  // Indre 1/4-fuge — antyder sammenføyde matter
  ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 0.4;
  ctx.beginPath();
  ctx.moveTo(px + T/2, py); ctx.lineTo(px + T/2, py + T);
  ctx.moveTo(px, py + T/2); ctx.lineTo(px + T, py + T/2);
  ctx.stroke();
  // Svakt amber støvhint i ett hjørne
  ctx.fillStyle = 'rgba(180,100,40,0.03)';
  ctx.fillRect(px + T - 4, py + T - 4, 3, 3);
}

function drawShowerFloor(ctx, px, py, T) {
  const v = (px/T*7 + py/T*5) % 3;
  ctx.fillStyle = v<1 ? '#213a4e' : v<2 ? '#1f3646' : '#24405a';
  ctx.fillRect(px, py, T, T);
  // Tydelig flisefuge (tykkere, mørkere grout)
  ctx.strokeStyle = '#121e2c'; ctx.lineWidth = 0.9;
  ctx.strokeRect(px+0.5, py+0.5, T-1, T-1);
  // 1/4-flis-delelinje (antyder mindre fliser)
  ctx.strokeStyle = 'rgba(10,18,28,0.45)'; ctx.lineWidth = 0.4;
  ctx.beginPath();
  ctx.moveTo(px + T/2, py); ctx.lineTo(px + T/2, py + T);
  ctx.moveTo(px, py + T/2); ctx.lineTo(px + T, py + T/2);
  ctx.stroke();
  // Våt høydelys — øvre venstre hjørne
  ctx.fillStyle = 'rgba(180,210,240,0.08)';
  ctx.fillRect(px+1, py+1, T-2, 1);
  ctx.fillRect(px+1, py+1, 1, T-2);
  // Slitasje og flekker (deterministisk hash — samme fliser hver frame)
  const hash = ((px * 13 + py * 29) | 0) % 97;
  if (hash < 14) {
    ctx.fillStyle = 'rgba(20,30,40,0.28)';
    const fx = px + (hash % 5) + 2;
    const fy = py + ((hash * 3) % 6) + 2;
    ctx.beginPath();
    ctx.ellipse(fx, fy, 4 + (hash % 3), 2 + (hash % 2), 0, 0, Math.PI*2);
    ctx.fill();
  }
  if (hash > 40 && hash < 48) {
    ctx.strokeStyle = 'rgba(10,15,25,0.35)'; ctx.lineWidth = 0.5;
    const cx = px + (hash % 8);
    const cy = py + (hash * 2 % 10);
    ctx.beginPath();
    ctx.moveTo(cx, cy); ctx.lineTo(cx + 5, cy + 3);
    ctx.stroke();
  }
}

function drawShowerHead(ctx, px, py, T) {
  drawShowerFloor(ctx, px, py, T);
  const pipeX = px + T/2;
  const headY = py + T * 0.55;
  // Vertikal pipe fra bakvegg ned til hode
  ctx.strokeStyle = '#8892a0'; ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.moveTo(pipeX, py - 2); ctx.lineTo(pipeX, headY - 1); ctx.stroke();
  // Pipe-refleks
  ctx.strokeStyle = 'rgba(220,230,240,0.45)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(pipeX - 0.7, py - 2); ctx.lineTo(pipeX - 0.7, headY - 2); ctx.stroke();
  // Arm ut fra pipe
  ctx.strokeStyle = '#6a7280'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(pipeX - 3, headY - 1); ctx.lineTo(pipeX + 3, headY - 1); ctx.stroke();
  // Nozzle — krom-gradient ellipse
  const ng = ctx.createRadialGradient(pipeX - 1, headY - 0.5, 0, pipeX, headY, 4);
  ng.addColorStop(0, '#d8e0ea');
  ng.addColorStop(0.5, '#88929e');
  ng.addColorStop(1, '#3a424c');
  ctx.fillStyle = ng;
  ctx.beginPath(); ctx.ellipse(pipeX, headY + 1, 4.2, 2.4, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#2a303a'; ctx.lineWidth = 0.6;
  ctx.stroke();
  // Dråpe-vifte
  const opacs = [0.50, 0.40, 0.60, 0.38, 0.48];
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = `rgba(160,210,255,${opacs[i]})`;
    const dx = (i - 2) * 2.3;
    ctx.beginPath(); ctx.arc(pipeX + dx, py + T * 0.78, 1.0, 0, Math.PI*2); ctx.fill();
  }
}

function drawEquipment(ctx, px, py, T) {

}

// ================================================================
// MAP BUILDER
// ================================================================
function mk(type, walkable, zone) { return { type, walkable, zone }; }

function buildMap() {
  const M = [];
  for (let y=0; y<ROWS; y++) {
    M[y] = [];
    for (let x=0; x<COLS; x++) M[y][x] = mk('wall', false, 'wall');
  }

  // North fence row 1
  for (let x=1; x<=42; x++) M[1][x] = mk('fence', false, 'fence');

  // Yard rows 2-3 (fenced sides at col 1 and col 42)
  for (let y=2; y<=3; y++)
    for (let x=1; x<=42; x++)
      M[y][x] = (x===1||x===42) ? mk('fence',false,'fence') : mk('yard',true,'yard');

  // Inner fence row 4, gate at cols 20-22 (onto vertical corridor)
  for (let x=1; x<=42; x++)
    M[4][x] = (x>=20&&x<=22) ? mk('floor',true,'corridor') : mk('fence',false,'fence');

  // Cafeteria rows 5-7 (cols 2-41); col 21 will be overridden by vertical corridor
  for (let y=5; y<=7; y++)
    for (let x=2; x<=41; x++) M[y][x] = mk('floor', true, 'cafeteria');

  // Cafeteria: two long tables at row 6
  for (let x=4;  x<=18; x++) M[6][x] = mk('table', false, 'cafeteria'); // left long table
  for (let x=23; x<=37; x++) M[6][x] = mk('table', false, 'cafeteria'); // right long table

  // Row 8: wall (separates cafeteria from below) — only col 21 will be opened by vert corridor

  // Gym: cols 10-20, rows 17-21 (entered via left inner corridor col 9)
  for (let y=17; y<=21; y++)
    for (let x=10; x<=20; x++) M[y][x] = mk('gym_floor', true, 'gym');

  // Equipment in gym (non-walkable)
  for (const [ex,ey] of [
    [11,17],[15,17],[19,17],
    [11,19],[16,19],[19,19],
    [11,21],[15,21],[19,21],
  ]) M[ey][ex] = mk('equipment', false, 'gym');

  // Shower: cols 24-34, rows 17-21 (entered via right inner corridor col 35)
  for (let y=17; y<=21; y++)
    for (let x=24; x<=34; x++) M[y][x] = mk('shower_floor', true, 'shower');
  // Shower heads: 3 fixed stall positions (walkable)
  for (const [sx,sy] of [[26,18],[29,18],[32,18]]) M[sy][sx] = mk('shower_head', true, 'shower');

  // ── PANOPTIKON CORRIDORS ────────────────────────────────────────
  // Vertical spine: col 21, rows 4-23 (north-south axis)
  for (let y=4; y<=23; y++) M[y][21] = mk('floor', true, 'corridor');

  // Horizontal spine: row 12, cols 5-38 (east-west axis)
  for (let x=5; x<=38; x++) M[12][x] = mk('floor', true, 'corridor');

  // Center hub: cols 20-22, rows 11-13 (widened 3×3 intersection)
  for (let y=11; y<=13; y++)
    for (let x=20; x<=22; x++) M[y][x] = mk('floor', true, 'corridor');

  // Left inner corridor: col 9, rows 9-23
  for (let y=9; y<=23; y++) M[y][9] = mk('floor', true, 'corridor');

  // Right inner corridor: col 35, rows 9-23
  for (let y=9; y<=23; y++) M[y][35] = mk('floor', true, 'corridor');

  // Bottom cross-corridor: row 23, cols 5-38 (alternative east-west route)
  for (let x=5; x<=38; x++) M[23][x] = mk('floor', true, 'corridor');

  // Side entrances: openings in row 8 wall for cafeteria, row 4 fence for yard
  M[8][9]  = mk('floor', true, 'corridor');  // left cafeteria entry (via col 9)
  M[8][35] = mk('floor', true, 'corridor');  // right cafeteria entry (via col 35)
  M[4][9]  = mk('floor', true, 'corridor');  // left yard gate (via col 9)
  M[4][35] = mk('floor', true, 'corridor');  // right yard gate (via col 35)

  // ── CELL BLOCKS (4 per side, 8 inmates) ────────────────────────
  const BLOCKS = [
    { wr:9,  dr:10, lr:11 },   // above horizontal spine
    { wr:13, dr:14, lr:15 },   // below horizontal spine
    { wr:17, dr:18, lr:19 },   // alongside gym/shower (upper)
    { wr:20, dr:21, lr:22 },   // alongside gym/shower (lower)
  ];
  for (const { wr, dr, lr } of BLOCKS) {
    // Left cells: cols 1-7, door col 8, inner corridor col 9
    for (let x=1; x<=7; x++) M[wr][x] = mk('wall', false, 'wall');
    for (let x=1; x<=7; x++) M[dr][x] = mk('cell_floor', true, 'cell');
    M[dr][8] = mk('door', true, 'cell');
    for (let x=1; x<=7; x++) M[lr][x] = mk('cell_floor', true, 'cell');
    M[lr][8] = mk('wall', false, 'wall');
    // Furniture left
    M[dr][2] = mk('bed',    false, 'cell');
    M[dr][5] = mk('bed',    false, 'cell');
    M[lr][3] = mk('toilet', false, 'cell');

    // Right cells: cols 37-42, door col 36, inner corridor col 35
    for (let x=37; x<=42; x++) M[wr][x] = mk('wall', false, 'wall');
    for (let x=37; x<=42; x++) M[dr][x] = mk('cell_floor', true, 'cell');
    M[dr][36] = mk('door', true, 'cell');
    for (let x=37; x<=42; x++) M[lr][x] = mk('cell_floor', true, 'cell');
    M[lr][36] = mk('wall', false, 'wall');
    // Furniture right
    M[dr][38] = mk('bed',    false, 'cell');
    M[dr][41] = mk('bed',    false, 'cell');
    M[lr][40] = mk('toilet', false, 'cell');
  }

  // ── NYE ROM (rad 24–25) ─────────────────────────────────────────
  // Isolasjon: cols 2–6
  for (let y=24; y<=25; y++)
    for (let x=2; x<=6; x++) M[y][x] = mk('iso_floor', true, 'isolation');
  M[24][5] = mk('door', true, 'isolation');

  // Samtalerom: cols 12–18
  for (let y=24; y<=25; y++)
    for (let x=12; x<=18; x++) M[y][x] = mk('counsel_floor', true, 'counseling');
  M[24][15] = mk('door', true, 'counseling');

  // Bibliotek: cols 24–32
  for (let y=24; y<=25; y++)
    for (let x=24; x<=32; x++) M[y][x] = mk('library_floor', true, 'library');
  M[24][28] = mk('door', true, 'library');

  // Verksted: cols 33–42
  for (let y=24; y<=25; y++)
    for (let x=33; x<=42; x++) M[y][x] = mk('workshop_floor', true, 'workshop');
  M[24][38] = mk('door', true, 'workshop');

  return M;
}

// Bygger segment-liste for myke sone-kanter. Kalles én gang etter GS.map = buildMap().
// Returnerer [{x1,y1,x2,y2,color}, ...] i piksler.
const ZONE_OUTLINE_COLORS = {
  isolation:  '#c04040',
  counseling: '#4080c0',
  library:   '#c08040',
  workshop:  '#8090a0',
};
function computeZoneBorders() {
  const segs = [];
  const T = TILE;
  const M = GS.map;
  for (const zone of Object.keys(ZONE_OUTLINE_COLORS)) {
    const color = ZONE_OUTLINE_COLORS[zone];
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const t = M[y]?.[x];
        if (!t || t.zone !== zone) continue;
        // Top edge
        const above = M[y - 1]?.[x];
        if (!above || above.zone !== zone) {
          segs.push({ x1: x*T, y1: y*T, x2: (x+1)*T, y2: y*T, color });
        }
        // Bottom edge
        const below = M[y + 1]?.[x];
        if (!below || below.zone !== zone) {
          segs.push({ x1: x*T, y1: (y+1)*T, x2: (x+1)*T, y2: (y+1)*T, color });
        }
        // Left edge
        const left = M[y]?.[x - 1];
        if (!left || left.zone !== zone) {
          segs.push({ x1: x*T, y1: y*T, x2: x*T, y2: (y+1)*T, color });
        }
        // Right edge
        const right = M[y]?.[x + 1];
        if (!right || right.zone !== zone) {
          segs.push({ x1: (x+1)*T, y1: y*T, x2: (x+1)*T, y2: (y+1)*T, color });
        }
      }
    }
  }
  return segs;
}

function isArenaMode() {

function defaultStats() {

const HISTORY_MAX = 8;
function addHistory(inm, text) {
  inm.history.unshift({ day: GS.day, text });
  if (inm.history.length > HISTORY_MAX) inm.history.length = HISTORY_MAX;
}

function historyText(entry) {
  if (typeof entry === 'string') {
    const m = entry.match(/^D\d+\s*—\s*(.+)$/);
    return m ? m[1] : entry;
  }
  return entry.text || '';
}

function historyRender(entry) {
  if (typeof entry === 'string') return entry;
  return `D${entry.day} — ${entry.text}`;
}
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ================================================================
// MEMORIES & GRUDGES
// ================================================================
// Strukturerte minner per innsatt — danner basis for grudges og
// er klare til å sendes som kontekst til AI senere.
const MEMORY_MAX       = 10;
const GRUDGE_THRESHOLD = 7;

function addMemory(inm, mem) {
  inm.memories.unshift({ day: GS.day, ...mem });
  if (inm.memories.length > MEMORY_MAX) inm.memories.length = MEMORY_MAX;
}

function topMemories(inm, n) {
  return [...inm.memories]
    .sort((a, b) => b.weight - a.weight || b.day - a.day)
    .slice(0, n);
}

function memoryLabel(m) {
  const name = m.otherName || '(ukjent)';
  switch (m.type) {
    case 'loss':                  return `Tapte mot ${name} (D${m.day})`;
    case 'win':                   return `Slo ${name} (D${m.day})`;
    case 'friend_died':           return `Mistet ${name} (D${m.day})`;
    case 'isolation_after_fight': return `Isolat etter kamp mot ${name} (D${m.day})`;
    default:                      return `Hendelse (D${m.day})`;
  }
}

function getGrudgeTargets(inm) {
  const scores = new Map();
  for (const m of inm.memories) {
    if (m.otherId == null) continue;
    if (m.type === 'loss' || m.type === 'isolation_after_fight') {
      scores.set(m.otherId, (scores.get(m.otherId) || 0) + m.weight);
    }
  }
  const out = [];
  for (const [id, score] of scores) {
    if (score >= GRUDGE_THRESHOLD) out.push({ id, score });
  }
  return out.sort((a, b) => b.score - a.score);
}

function hasGrudgeAgainst(inm, otherId) {
  return getGrudgeTargets(inm).some(g => g.id === otherId);
}

// ================================================================
// PERSONLIGE MÅL (AMBITIONS)
// ================================================================
function goalLabel(g) {
  switch (g) {
    case 'survive':        return 'Overleve soningen';
    case 'climb':          return 'Bli fryktet';
    case 'make_friend':    return 'Finne en venn';
    case 'no_isolation':   return 'Unngå isolat';
    case 'prove_strength': return 'Vinne 3 kamper';
    case 'take_over':      return 'Utfordre lederen';
    default:               return null;
  }
}

function goalChanceMod(inm) {
  if (inm.ambitionAchieved) return 1.0;
  switch (inm.ambition) {
    case 'survive':        return 0.85;
    case 'no_isolation':   return 0.80;
    case 'climb':          return 1.15;
    case 'prove_strength': return 1.10;
    default:               return 1.0;
  }
}

function checkAmbitionAchieved(inm) {
  if (!inm.ambition || inm.ambitionAchieved) return;
  let done = false;
  switch (inm.ambition) {
    case 'climb':          done = inm.respekt >= 70; break;
    case 'prove_strength': done = inm.fightsWon >= 3; break;
    case 'make_friend':    done = inm.friendId != null; break;
  }
  if (done) {
    inm.ambitionAchieved = true;
    addHistory(inm, `🎯 Nådde mål: ${goalLabel(inm.ambition)}.`);
    addPowerEvent('ambition', `🎯 ${inm.name} nådde sitt mål: ${goalLabel(inm.ambition)}.`);
  }
}

const POWER_LOG_MAX = 10;
function addPowerEvent(kind, text) {
  GS.powerLog.unshift({ day: GS.day, kind, text });
  if (GS.powerLog.length > POWER_LOG_MAX) GS.powerLog.length = POWER_LOG_MAX;
}

const DEPARTED_MAX = 40;
function addDeparted(inm, reason) {
  GS.departed.unshift({ id: inm.id, name: inm.name, day: GS.day, reason });
  if (GS.departed.length > DEPARTED_MAX) GS.departed.length = DEPARTED_MAX;
  // Rydd opp ambisjoner som pekte på denne innsatte
  for (const other of GS.inmates) {
    if (other.targetId === inm.id) {
      other.ambition = null;
      other.targetId = null;
    }
  }
}
function countPastDuels(a, b) {
  if (!a.history || !b.name) return 0;
  let n = 0;
  for (const entry of a.history) {
    const t = historyText(entry);
    if (t.includes('⚔') && t.includes(b.name)) n++;
  }
  return n;
}
function countRivalWinStreak(inm) {
  if (!inm.history) return 0;
  let streak = 0;
  for (const entry of inm.history) {
    const t = historyText(entry);
    if (!t.includes('⚔')) continue;
    if (t.startsWith('⚔ Dominerte') || t.startsWith('⚔ Holdt') || t.startsWith('⚔ Knuste')) streak++;
    else break;
  }
  return streak;
}
function countRivalLossStreak(inm) {
  if (!inm.history) return 0;
  let streak = 0;
  for (const entry of inm.history) {
    const t = historyText(entry);
    if (!t.includes('⚔')) continue;
    if (t.startsWith('⚔ Tapte') || t.startsWith('⚔ Ble banket') || t.startsWith('⚔ Gikk ned')) streak++;
    else break;
  }
  return streak;
}

function tp(tx, ty) { return { px: tx*TILE + TILE/2, py: ty*TILE + TILE/2 }; }
function rInt(a, b) { return a + Math.floor(Math.random() * (b-a+1)); }

// ================================================================
// ROUTING CONSTANTS
// ================================================================
const HORIZ_R = 12;   // horizontal panoptikon spine (east-west axis)
const VERT_X  = 21;   // vertical panoptikon spine (north-south axis)
const CROSS_R = 23;   // bottom cross-corridor (alternative east-west route)
const L_INNER = 9;    // left inner corridor col (cell access + gym entry)
const R_INNER = 35;   // right inner corridor col (cell access + shower entry)

// ================================================================
// SPOTS + OCCUPANCY
// ================================================================
const SPOTS = (() => {
  const spots = {};

  // Cafeteria: counter spots (food service area, row 7) + seat spots (rows 5 and 7 along tables)
  // Counter spots — where inmates briefly stop to collect food

  [
    [4,5],[6,5],[8,5],[10,5],[12,5],[14,5],[16,5],[18,5],   // left north
    [4,7],[6,7],[8,7],[20,7],                                // left south
    [23,5],[25,5],[27,5],[29,5],[31,5],[33,5],[35,5],[37,5], // right north
    [22,7],[34,7],[36,7],[38,7],                             // right south
  ].forEach(([c,r],i) =>

      px:(c*TILE+TILE/2), py:(r*TILE+TILE/2) });

  // Yard: rows 2-3, spread across width
  [[4,2],[9,2],[14,2],[19,2],[24,2],[29,2],[35,2],[40,2],
   [5,3],[11,3],[17,3],[22,3],[27,3],[33,3],[38,3]].forEach(([c,r],i) =>
    spots[`yard_${i}`] = { id:`yard_${i}`, zone:'yard', px:(c*TILE+TILE/2), py:(r*TILE+TILE/2) });

  // Gym: spots near equipment (clusters of 2 per machine) + spread fill spots
  // Equipment at rows 17,19,21 cols 11,15/16,19 — place adjacent walkable spots
  // Near-equipment: 1 spot beside each machine (offset toward room centre)
  // Spread spots: use rows 18,20 and edges for natural spread
  const jit = () => (Math.random()*4 - 2); // ±2px activity jitter
  [
    [10,17],[12,17],[14,17],[16,17],[18,17],[20,17],  // row 17 — near top equipment row
    [10,18],[13,18],[17,18],[20,18],                   // row 18 — open working row
    [12,19],[14,19],[18,19],[20,19],                   // row 19 — near mid equipment row
    [10,20],[13,20],[17,20],[20,20],                   // row 20 — open working row
    [12,21],[14,21],[18,21],[20,21],                   // row 21 — near bottom equipment row
  ].forEach(([c,r],i) =>
    spots[`gym_${i}`] = { id:`gym_${i}`, zone:'gym', px:(c*TILE+TILE/2+jit()), py:(r*TILE+TILE/2+jit()) });

  // Shower: primary spots at/near shower heads, fill spots spread through room
  [
    [25,18],[26,18],[27,18],   // left stall area
    [28,18],[29,18],[30,18],   // centre stall area
    [31,18],[32,18],[33,18],   // right stall area
    [24,17],[28,17],[32,17],   // back row spread
    [25,19],[29,19],[33,19],   // front row spread
    [24,20],[28,20],[32,20],   // lower spread
  ].forEach(([c,r],i) =>
    spots[`shower_${i}`] = { id:`shower_${i}`, zone:'shower', px:(c*TILE+TILE/2), py:(r*TILE+TILE/2) });

  // Gang rally spots — A: left, B: center, C: right (yard rows 2–3)
  [
    ['A', [[4,2],[5,3],[7,2],[8,3],[6,2],[9,3]]],
    ['B', [[18,2],[19,3],[21,2],[22,3],[20,2],[23,3]]],
    ['C', [[33,2],[34,3],[36,2],[37,3],[35,2],[38,3]]],
  ].forEach(([gid, coords]) =>
    coords.forEach(([c,r],i) =>
      spots[`gang_${gid}_${i}`] = { id:`gang_${gid}_${i}`, zone:'gang', groupId:gid,
        px:(c*TILE+TILE/2+(Math.random()*4-2)), py:(r*TILE+TILE/2+(Math.random()*4-2)) }
    )

  // Cell spots from CELL_DEFS walkPos
  for (const def of CELL_DEFS)
    def.walkPos.forEach((p,i) => {

        px:(p.x*TILE+TILE/2), py:(p.y*TILE+TILE/2) };
    });

  // Isolasjon: 6 spredte spots
  [[3,24],[3,25],[5,25],[6,24],[6,25],[4,25]].forEach(([x,y],i) => {

  [[13,24],[14,25],[15,25],[16,24],[17,25]].forEach(([x,y],i) => {

  });

  [[25,24],[26,25],[27,24],[28,25],[29,24],[30,25],[31,24],[32,25]].forEach(([x,y],i) => {

// occupancy: spotId → inmateId
const occupancy = new Map();

function releaseSpot(inmateId) {
  for (const [spotId, owner] of occupancy) {
    if (owner === inmateId) { occupancy.delete(spotId); return; }
  }
}

function claimSpot(zone, cellDef, inmateId, subzone = null) {
  releaseSpot(inmateId);
  const candidates = Object.values(SPOTS).filter(s => {
    if (s.zone !== zone) return false;
    if (subzone && s.subzone !== subzone) return false;
    if (zone === 'cell' && s.cellId !== cellDef.id) return false;
    if (zone === 'gang') {
      const owner = GS.inmates.find(i => i.id === inmateId);
      if (owner && !owner.groupId) return false;             // ikke i gjeng → ingen gjeng-spot
      if (owner && s.groupId !== owner.groupId) return false;
    }
    return !occupancy.has(s.id);
  });
  if (candidates.length === 0) return null;

  // Soft scoring: nærhet + gjeng + rivaler + traits + litt tilfeldighet.
  // Cellen er fast (ikke et personlig valg); counter i cafeteria er kø-plass → enkel random.
  const self = GS.inmates.find(i => i.id === inmateId);
  const useScoring = self && zone !== 'cell' && subzone !== 'counter';

  let spot;
  if (useScoring) {
    // Tunable vekter — juster her ved playtesting
    const SAME_KAT_W  = 0.30;
    const SAME_GANG_W = 0.45;
    const RIVAL_W     = 0.55;
    const SOCIAL_W    = 0.25;
    const NEAR_R      = TILE * 4;
    const MIN_SCORE   = 0.15;

    const tempMul = { calm: 1.35, normal: 1.0, aggressive: 0.35 };
    const socSign  = { introvert: -1, normal: 0, dominant: +1 };
    const socMag   = { introvert: 1.0, normal: 0.0, dominant: 1.0 };

    const tMul  = tempMul[self.temperament] ?? 1.0;
    const sSign = socSign[self.sosial] ?? 0;
    const sMag  = socMag[self.sosial]  ?? 0;
    const isGangZone = zone === 'gang';

    const others = GS.inmates.filter(o => o.id !== inmateId);

    const scored = candidates.map(s => {
      let katBonus = 0, gangBonus = 0, rivalMalus = 0, crowd = 0;
      for (const o of others) {
        const dx = s.px - o.px, dy = s.py - o.py;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d >= NEAR_R) continue;
        const prox = 1 - d / NEAR_R; // 0..1
        if (o.kategori === self.kategori) katBonus  += SAME_KAT_W  * prox;
        if (self.groupId && o.groupId === self.groupId) gangBonus += SAME_GANG_W * prox;
        else if (self.groupId && o.groupId && !isGangZone) rivalMalus += RIVAL_W * prox * tMul;
        crowd += prox;
      }
      // Cap så ingen faktor dominerer fullstendig
      katBonus   = Math.min(katBonus,   1.0);
      gangBonus  = Math.min(gangBonus,  1.2);
      rivalMalus = Math.min(rivalMalus, 1.5);
      // Aggressive oppsøker konflikt → flipp malus til svak bonus
      if (self.temperament === 'aggressive') rivalMalus *= -0.4;

      const socialTerm = SOCIAL_W * sSign * sMag * Math.min(crowd, 3) / 3;

      const raw = 1.0 + katBonus + gangBonus - rivalMalus + socialTerm;
      return { s, score: Math.max(MIN_SCORE, raw) };
    });

    const total = scored.reduce((sum, x) => sum + x.score, 0);
    let r = Math.random() * total;
    spot = scored[scored.length - 1].s; // fallback
    for (const { s, score } of scored) {
      r -= score;
      if (r <= 0) { spot = s; break; }
    }
  } else {
    spot = candidates[Math.floor(Math.random() * candidates.length)];
  }

  occupancy.set(spot.id, inmateId);
  return spot;
}

function fallbackPos(zone, cellDef, groupId = null) {
  if (zone === 'cell') {
    const p = cellDef.walkPos[Math.floor(Math.random() * cellDef.walkPos.length)];
    return { px: p.x*TILE+TILE/2, py: p.y*TILE+TILE/2, id: null };
  }
  if (zone === 'cafeteria') return { px: (2+rInt(0,18))*TILE+TILE/2, py: (5+rInt(0,2))*TILE+TILE/2, id: null };
  if (zone === 'yard')      return { px: (2+rInt(0,39))*TILE+TILE/2, py: rInt(2,3)*TILE+TILE/2, id: null };
  if (zone === 'gang') {
    const gs = Object.values(SPOTS).filter(s => s.zone === 'gang' && (!groupId || s.groupId === groupId));
    if (gs.length) return gs[Math.floor(Math.random() * gs.length)];
    return { px: rInt(4,38)*TILE+TILE/2, py: rInt(2,3)*TILE+TILE/2, id: null };
  }
  if (zone === 'gym')       return { px: (10+rInt(0,10))*TILE+TILE/2, py: (17+rInt(0,4))*TILE+TILE/2, id: null };
  if (zone === 'shower')    return { px: (24+rInt(0,10))*TILE+TILE/2, py: (17+rInt(0,4))*TILE+TILE/2, id: null };
  if (zone === 'isolation')  return { px: 4*TILE+TILE/2,  py: 25*TILE+TILE/2, id: null };
  if (zone === 'counseling') return { px: 15*TILE+TILE/2, py: 25*TILE+TILE/2, id: null };
  if (zone === 'library')    return { px: 28*TILE+TILE/2, py: 25*TILE+TILE/2, id: null };
  if (zone === 'workshop')   return { px: 37*TILE+TILE/2, py: 25*TILE+TILE/2, id: null };
  return { px: rInt(9,35)*TILE+TILE/2, py: rInt(12,23)*TILE+TILE/2, id: null };
}

// ================================================================
// WAYPOINT PATH BUILDER
// ================================================================
function buildPath(inmate, targetZone, destSpot = null) {
  const def = getCellDef(inmate.cellId);
  const { doorCol, doorRow, innerCol, side } = def;
  const pts = [];

  const spot = destSpot || claimSpot(targetZone, def, inmate.id) || fallbackPos(targetZone, def, inmate.groupId);
  inmate.currentSpotId = spot.id || null;
  const dest = { px: spot.px, py: spot.py };

  if (targetZone === inmate.zone) { pts.push(dest); return pts; }

  // Choose east-west level: HORIZ_R (row 12) or CROSS_R (row 23, bottom).
  // Lower blocks and gym/shower exits prefer the cross-corridor.
  // Cafeteria and yard must use HORIZ_R (to reach col 21 vertical corridor).
  const bottomProb = doorRow >= 20 ? 0.70 : doorRow >= 17 ? 0.50 : doorRow >= 13 ? 0.28 : 0.12;
  const useBottom = Math.random() < bottomProb
    && targetZone !== 'cafeteria' && targetZone !== 'yard' && targetZone !== 'gang';
  let atRow = useBottom ? CROSS_R : HORIZ_R;

  // ── EXIT ────────────────────────────────────────────────────────
  if (inmate.zone === 'cell') {
    pts.push(tp(doorCol, doorRow));
    pts.push(tp(innerCol, doorRow));
    pts.push(tp(innerCol, atRow));    // walk inner corridor up (HORIZ_R) or down (CROSS_R)

  } else if (inmate.zone === 'yard' || inmate.zone === 'gang') {
    // Exit yard/gang: 3-way weighted choice of gate used
    const yExitR = Math.random();
    const yExitVia = side === 'L'
      ? (yExitR < 0.42 ? 'left' : yExitR < 0.80 ? 'center' : 'right')
      : (yExitR < 0.42 ? 'right' : yExitR < 0.80 ? 'center' : 'left');
    if (yExitVia === 'left') {
      pts.push(tp(L_INNER, 3));
      pts.push(tp(L_INNER, HORIZ_R));
      atRow = HORIZ_R;
    } else if (yExitVia === 'right') {
      pts.push(tp(R_INNER, 3));
      pts.push(tp(R_INNER, HORIZ_R));
      atRow = HORIZ_R;
    } else {
      pts.push(tp(VERT_X, 3));
      pts.push(tp(VERT_X, HORIZ_R));
      atRow = HORIZ_R;
    }

  } else if (inmate.zone === 'cafeteria') {
    // Exit cafeteria: 3-way weighted choice of exit used
    const cExitR = Math.random();
    const cExitVia = side === 'L'
      ? (cExitR < 0.42 ? 'left' : cExitR < 0.80 ? 'center' : 'right')
      : (cExitR < 0.42 ? 'right' : cExitR < 0.80 ? 'center' : 'left');
    if (cExitVia === 'left') {
      pts.push(tp(L_INNER, 6));
      pts.push(tp(L_INNER, HORIZ_R));
    } else if (cExitVia === 'right') {
      pts.push(tp(R_INNER, 6));
      pts.push(tp(R_INNER, HORIZ_R));
    } else {
      pts.push(tp(VERT_X, HORIZ_R));
    }
    atRow = HORIZ_R;

  } else if (inmate.zone === 'gym') {
    // Exit via left inner corridor; randomly choose top or bottom level
    const gymExit = Math.random() < 0.45 ? CROSS_R : HORIZ_R;
    pts.push(tp(L_INNER, 17));        // step out of gym to inner corridor
    pts.push(tp(L_INNER, gymExit));
    atRow = gymExit;

  } else if (inmate.zone === 'shower') {
    // Exit via right inner corridor
    const shwExit = Math.random() < 0.45 ? CROSS_R : HORIZ_R;
    pts.push(tp(R_INNER, 17));
    pts.push(tp(R_INNER, shwExit));
    atRow = shwExit;

  } else if (inmate.zone === 'isolation') {
    pts.push(tp(5, 24));
    pts.push(tp(5, CROSS_R));
    atRow = CROSS_R;
  } else if (inmate.zone === 'counseling') {
    pts.push(tp(15, 24));
    pts.push(tp(15, CROSS_R));
    atRow = CROSS_R;
  } else if (inmate.zone === 'library') {
    pts.push(tp(28, 24));
    pts.push(tp(28, CROSS_R));
    atRow = CROSS_R;
  } else {
    // corridor — atRow already set
  }

  // ── ENTER ─────────────────────────────────────────────────────
  if (targetZone === 'cell') {
    // Navigate to inmate's own inner corridor, then walk to door row
    pts.push(tp(innerCol, atRow));
    pts.push(tp(innerCol, doorRow));
    pts.push(tp(doorCol, doorRow));
    pts.push(dest);

  } else if (targetZone === 'cafeteria') {
    // 3-way weighted entry: left (col 9) | center (col 21) | right (col 35)
    const cEntR = Math.random();
    const cEntVia = side === 'L'
      ? (cEntR < 0.42 ? 'left' : cEntR < 0.80 ? 'center' : 'right')
      : (cEntR < 0.42 ? 'right' : cEntR < 0.80 ? 'center' : 'left');
    if (atRow === CROSS_R) pts.push(tp(cEntVia === 'center' ? VERT_X : (cEntVia === 'left' ? L_INNER : R_INNER), CROSS_R));
    if (cEntVia === 'left') {
      pts.push(tp(L_INNER, HORIZ_R));
      pts.push(tp(L_INNER, 6));
    } else if (cEntVia === 'right') {
      pts.push(tp(R_INNER, HORIZ_R));
      pts.push(tp(R_INNER, 6));
    } else {
      pts.push(tp(VERT_X, HORIZ_R));
      pts.push(tp(VERT_X, 6));
    }
    pts.push(dest);

  } else if (targetZone === 'yard') {
    // 3-way weighted entry: left (col 9) | center (col 21) | right (col 35)
    const yEntR = Math.random();
    const yEntVia = side === 'L'
      ? (yEntR < 0.42 ? 'left' : yEntR < 0.80 ? 'center' : 'right')
      : (yEntR < 0.42 ? 'right' : yEntR < 0.80 ? 'center' : 'left');
    if (atRow === CROSS_R) pts.push(tp(yEntVia === 'center' ? VERT_X : (yEntVia === 'left' ? L_INNER : R_INNER), CROSS_R));
    if (yEntVia === 'left') {
      pts.push(tp(L_INNER, HORIZ_R));
      pts.push(tp(L_INNER, 4));
      pts.push(tp(L_INNER, 2));
    } else if (yEntVia === 'right') {
      pts.push(tp(R_INNER, HORIZ_R));
      pts.push(tp(R_INNER, 4));
      pts.push(tp(R_INNER, 2));
    } else {
      pts.push(tp(VERT_X, HORIZ_R));
      pts.push(tp(VERT_X, 5));
      pts.push(tp(VERT_X, 3));
    }
    pts.push(dest);

  } else if (targetZone === 'gang') {
    // Enter gang rally point — same routing as yard (same physical space)
    const gEntR = Math.random();
    const gEntVia = side === 'L'
      ? (gEntR < 0.42 ? 'left' : gEntR < 0.80 ? 'center' : 'right')
      : (gEntR < 0.42 ? 'right' : gEntR < 0.80 ? 'center' : 'left');
    if (atRow === CROSS_R) pts.push(tp(gEntVia === 'center' ? VERT_X : (gEntVia === 'left' ? L_INNER : R_INNER), CROSS_R));
    if (gEntVia === 'left') {
      pts.push(tp(L_INNER, HORIZ_R));
      pts.push(tp(L_INNER, 4));
      pts.push(tp(L_INNER, 2));
    } else if (gEntVia === 'right') {
      pts.push(tp(R_INNER, HORIZ_R));
      pts.push(tp(R_INNER, 4));
      pts.push(tp(R_INNER, 2));
    } else {
      pts.push(tp(VERT_X, HORIZ_R));
      pts.push(tp(VERT_X, 5));
      pts.push(tp(VERT_X, 3));
    }
    pts.push(dest);

  } else if (targetZone === 'gym') {
    // Enter gym via left inner corridor (col 9 → col 10 at row 17)
    // Does NOT route through col 21 — avoids vertical corridor bottleneck
    pts.push(tp(L_INNER, atRow));          // walk to left inner at chosen level
    pts.push(tp(L_INNER, 17));             // down inner to gym row
    const gx = 10 + Math.floor(Math.random() * 5);
    pts.push(tp(gx, 17));                  // step right into gym top
    pts.push(dest);

  } else if (targetZone === 'shower') {
    // Enter shower via right inner corridor (col 35 → col 34 at row 17)
    // Does NOT route through col 21
    pts.push(tp(R_INNER, atRow));          // walk to right inner at chosen level
    pts.push(tp(R_INNER, 17));             // down inner to shower row
    const sx = 29 + Math.floor(Math.random() * 5);
    pts.push(tp(sx, 17));                  // step left into shower top
    pts.push(dest);

  } else if (targetZone === 'isolation') {
    if (atRow !== CROSS_R) pts.push(tp(VERT_X, CROSS_R));
    pts.push(tp(5, CROSS_R));
    pts.push(tp(5, 24));
    pts.push(dest);
  } else if (targetZone === 'counseling') {
    if (atRow !== CROSS_R) pts.push(tp(VERT_X, CROSS_R));
    pts.push(tp(15, CROSS_R));
    pts.push(tp(15, 24));
    pts.push(dest);
  } else if (targetZone === 'library') {
    if (atRow !== CROSS_R) pts.push(tp(VERT_X, CROSS_R));
    pts.push(tp(28, CROSS_R));
    pts.push(tp(28, 24));
    pts.push(dest);
  }

  return pts;
}

// Tilfeldig fornavn+etternavn fra en pool. Faller tilbake til tall-suffiks ved kollisjon.
function pickUniqueName() {
  const taken = new Set(GS.inmates.map(i => i.name));
  const pools = Object.values(NAME_POOLS);
  for (let attempt = 0; attempt < 500; attempt++) {
    const pool = pools[Math.floor(Math.random() * pools.length)];
    const first = pool.first[Math.floor(Math.random() * pool.first.length)];
    const last  = pool.last[Math.floor(Math.random() * pool.last.length)];
    const name = `${first} ${last}`;
    if (!taken.has(name)) return name;
  }
  for (let k = 2; k < 100; k++) {
    for (const pool of pools) {
      for (const first of pool.first) {
        for (const last of pool.last) {
          const cand = `${first} ${last} ${k}`;
          if (!taken.has(cand)) return cand;
        }
      }
    }
  }
  return `Innsatt ${GS.inmates.length + 1}`;
}

function pickAmbition(temperament, kvirk) {
  const buckets = [];
  if (kvirk === 'karismatisk')      buckets.push(['make_friend', 3]);
  if (kvirk === 'fanatisk')         buckets.push(['climb', 3]);
  if (kvirk === 'nervøs')           buckets.push(['no_isolation', 3]);
  if (temperament === 'aggressive') buckets.push(['climb', 2], ['prove_strength', 2]);
  if (temperament === 'calm')       buckets.push(['survive', 2], ['make_friend', 2]);
  buckets.push(
    ['survive', 1], ['make_friend', 1], ['no_isolation', 1],
    ['climb', 1], ['prove_strength', 1]
  );
  const total = buckets.reduce((s, [, w]) => s + w, 0);
  let r = Math.random() * total;
  for (const [g, w] of buckets) { r -= w; if (r <= 0) return g; }
  return 'survive';
}

const CLOTH_COLORS = ['#c85020','#3858a0','#a02020','#607838','#703898','#a0943a'];
const SKIN_TONES   = ['#f0c888','#d4906a','#b06838','#7c4020'];
const HAIR_COLORS  = ['#181008','#4c3018','#787878','#b09838'];
const BODY_TYPES = {
  tynn:   { buildMult: 0.78, tallMult: 1.06, hrMult: 1.00 },
  normal: { buildMult: 1.00, tallMult: 1.00, hrMult: 1.00 },
  bred:   { buildMult: 1.28, tallMult: 0.95, hrMult: 1.00 },
  tank:   { buildMult: 1.35, tallMult: 0.92, hrMult: 0.84 },
