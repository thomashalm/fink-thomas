const KATEGORIER   = ['vold','økonomi','narkotika','tyveri','annet'];

// Kvirk — én valgfri personlighetsflavor per innsatt (ca. 40% har en)
const KVIRK_OPTS = [
  ['none',        0.60],
  ['paranoid',    0.08],
  ['impulsiv',    0.08],
  ['karismatisk', 0.08],
  ['nervøs',      0.08],
  ['fanatisk',    0.08],
];

// Aktivitet — settes ved fase-skifte, påvirker uro per tick
const AKTIVITETER = ['ingen','trening','sosial','lesing','dusj','samling'];

class Inmate {
  constructor(cellId) {
    this.id            = UID++;
    this.name          = pickUniqueName();
    this.cellId        = cellId;
    this.cellSlot      = 0;
    this.groupId       = (isArenaMode())
                         ? null
                         : (Math.random() < 0.65 ? ['A','B','C'][this.id % 3] : null);
    this.zone          = 'cell';
    this.targetZone    = 'cell';
    this.waypoints     = [];
    this.speed         = 0.52 + Math.random()*0.28;
    this.currentSpotId    = null;
    this.phaseDelay       = 0;
    this.pendingZone      = null;
    this.cafState         = null;  // null | 'to_counter' | 'to_seat' | 'seated'
    this.cafSeat          = null;
    this.cafCounterDelay  = 0;
    this.cafCounterTarget = 0;
    this.sleepState          = null;   // null | 'to_bed' | 'going_to_bed' | 'in_bed' | 'to_floor' | 'on_floor'
    this.isBeingIntervened   = false;
    this.isFloorSleeper      = false;
    this.hasDominatedForBed  = false;
    this.bedChallengeVs      = null;   // id på motstander i spawn-seng-kamp; null ellers
    this.ambition            = null;   // settes nedenfor basert på traits (kan overskrives av spawnNewcomer til 'take_over')
    this.ambitionAchieved    = false;  // bool — markert når målet er nådd
    this.targetId            = null;   // id på valgt motstander når ambition === 'take_over'
    this.lastFightOpponent   = null;   // navn på sist motstander (for context i Forsvunnet)
    this.lastFightDay        = null;   // GS.day da sist kamp endte
    this.memories            = [];     // {type, day, otherId, otherName, weight} — maks MEMORY_MAX

    // Core stats
    this.unrest   = (GS.mode === 'lastManStandingShower')
                    ? 40 + Math.random() * 20
                    : isArenaMode()
                      ? 25 + Math.random() * 20
                      : 10 + Math.random() * 20;
    this.health   = (GS.mode === 'lastManStandingShower')
                    ? 30 + Math.random() * 15   // 30–45 — party mode
                    : isArenaMode()
                      ? 50 + Math.random() * 15 // 50–65
                      : 80 + Math.random() * 20;
    this.energi   = 40 + Math.random()*60;   // 0–100, drains when active, recharges at night
    this.hygiene  = 40 + Math.random()*60;   // 0–100, drains over time, recharges in shower
    this.disiplin = 20 + Math.random()*80;   // 0–100, erodes when unrest is high
    this.dominans = 10 + Math.random()*90;   // 0–100, drifts slowly toward mean

    // Sentence in simulated days
    this.soningstidTotalt = 20 + Math.floor(Math.random()*61);  // 20–80 dager
    this.soningstidIgjen  = this.soningstidTotalt;

    // Traits — stabile personlighetstrekk (påvirker spot-valg og konflikt)
    const pickWeighted = (opts) => {
      const r = Math.random(); let acc = 0;
      for (const [val, w] of opts) { acc += w; if (r < acc) return val; }
      return opts[opts.length-1][0];
    };
    this.temperament      = pickWeighted([['calm',0.30],['normal',0.50],['aggressive',0.20]]);
    this.sosial           = pickWeighted([['introvert',0.30],['normal',0.50],['dominant',0.20]]);
    this.stressTolerance  = pickWeighted([['low',0.25],['medium',0.50],['high',0.25]]);
    this.isolationResponse = pickWeighted([['positive',0.30],['neutral',0.50],['negative',0.20]]);
    this.kvirk            = pickWeighted(KVIRK_OPTS);   // 'none'|'paranoid'|'impulsiv'|'karismatisk'|'nervøs'|'fanatisk'
    this.idolId           = null;                        // kun fanatisk: ID til karismatisk idol
    this.aktivitet        = 'ingen';                     // settes ved fase-skifte

    // Personlig mål — settes etter traits så pickAmbition kan bruke dem
    this.ambition = (isArenaMode())
                    ? null
                    : pickAmbition(this.temperament, this.kvirk);

    // Conflict state
    this.inConflict       = false;
    this.conflictFlashMs  = 0;    // visuell markør, telles ned per tick
    this.conflictCooldown = 0;    // ms til neste konflikt kan triggres
    this.conflictCount    = 0;    // teller konflikter siden siste isolat-slutt
    this.isolationTicks   = 0;    // gjenværende isolat-tid i ticks (0 = fri)
    this.isolatCount      = 0;    // totalt antall ganger i isolat
    this.respekt          = 0;    // omdømme — +2 kamp-seier, +1 venn i egen gjeng, -3 isolat
    this.fightsWon        = 0;
    this.fightsLost       = 0;
    this.friendshipsMade  = 0;    // kumulativ — teller alle venn-bindinger, på tvers av gjeng
    this.counselingCount  = 0;

    // Fight state (v0.9.1 kamp-logikk)
    this.strength         = 40 + Math.random() * 40;   // 40–80
    this.inFight          = false;
    this.fightMs          = 0;     // gjenværende kamp-varighet
    this.fightOpponent    = null;  // id til motstander
    this.downedMs         = 0;     // ms igjen liggende etter tapt kamp (0 = reist)
    this.guardNoticedFight = true; // rulles per kamp ved triggerConflict
    this.bloodPoolMs      = 0;     // ms igjen blodpøl-visning etter tap (0 = ingen)
    this.fightPushX       = 0;     // visuell push-offset etter tap (fades i tick)
    this.fightPushY       = 0;

    // Render-state: retning + bevegelsesflagg (brukes av detaljert render)
    this._facing          = Math.PI / 2;   // radianer, default = sør (mot kamera)
    this._isMoving        = false;
    this._walkPhase       = 0;             // akkumulert forflytning (px) — driver stride-animasjon

    // Rom-opphold etter kamp: hvilken type sone vi er i
    // 'isolation' | 'counseling' | 'library' | null
    this.postFightRoom    = null;

    // Personlig historikk — korte hendelser, nyeste først
    this.history          = [];

    // Relasjoner (v0.9.4)
    this.friendId              = null;
    this.notifiedFriendInRoom  = null;  // dedupe: lagrer friendId siste gang historikk ble logget for "venn i rom"

    // Frivillige biblioteksbesøk (v0.9.6) — teller kun opp når inm har gått dit av eget valg
    this.libraryVisits  = 0;
    this._wasInLibrary  = false;

    // Verksted — hverdagsrutine (iterasjon 1)
    this.workshopCount   = 0;
    this.lastWorkshopDay = null;
    this.isBored         = false;
    this._wasInWorkshop  = false;

    // Småprat-boble (v0.9.32) — visuelt kun, ingen stats-effekt
    this._chatMs         = 0;

    // Starting position — spawnNewcomer konstruerer med null cellId og setter px/py selv
    const def = getCellDef(cellId);
    if (def) {
      const pos = def.walkPos[0];
      this.px = pos.x * TILE + TILE/2;
      this.py = pos.y * TILE + TILE/2;
    } else {
      this.px = 0;
      this.py = 0;
    }

    // Crime category
    this.kategori = KATEGORIER[Math.floor(Math.random()*KATEGORIER.length)];

    // Visual look — generated once, stays with this inmate
    const pick = arr => arr[Math.floor(Math.random()*arr.length)];
    const hs = Math.random();
    const bs = Math.random();
    const bt = Math.random();
    const bodyType = bt < 0.20 ? 'tynn'
                   : bt < 0.70 ? 'normal'
                   : bt < 0.90 ? 'bred'
                   :             'tank';
    const bPreset = BODY_TYPES[bodyType];
    this.look = {
      clothColor:   pick(CLOTH_COLORS),
      pantsColor:   pick(['#3a2e22','#2a3548','#454030','#1e1e24','#50382a','#2a2418']),
      jacketColor:  Math.random() < 0.30 ? pick(['#2a2e38','#3a2618','#1e2e22','#402828','#283a3a','#3e3822']) : null,
      skinTone:     pick(SKIN_TONES),
      // 0=skallete 1=buzzcut 2=hette 3=hood-up 4=langt 5=afro 6=flat top
      hairStyle:    hs < 0.12 ? 0
                  : hs < 0.32 ? 1
                  : hs < 0.47 ? 2
                  : hs < 0.60 ? 3
                  : hs < 0.72 ? 4
                  : hs < 0.88 ? 5
                  :             6,
      hairColor:    pick(HAIR_COLORS),
      beardStyle:   bs < 0.50 ? 'none' : bs < 0.80 ? 'stubble' : 'full',
      sizeFactor:   0.85 + Math.random()*0.30,
      bodyType,
      // build/height: diskret preset × smal random-varians oppå
      build:        (0.92 + Math.random()*0.16) * bPreset.buildMult,
      heightFactor: (0.94 + Math.random()*0.12) * bPreset.tallMult,
      shoeColor:    pick(['#141414', '#2a2018', '#3a3a40', '#1c1410']),
    };
  }

  // Called by tick() — staggerMs delays before the path is actually built
  setTargetZone(zone, staggerMs = 0) {
    if (staggerMs > 0) {
      this.pendingZone = zone;
      this.phaseDelay  = staggerMs;
      return;
    }
    this._applyZoneChange(zone);
  }

  _applyZoneChange(zone) {
    if (zone === this.targetZone && zone === this.zone) return;
    // Snap current zone from tile position
    const tx = (this.px / TILE) | 0;
    const ty = (this.py / TILE) | 0;
    const tile = GS.map[ty]?.[tx];
    if (tile) {
      const z = tile.zone;
      if      (z === 'cell'       ) this.zone = 'cell';
      else if (z === 'cafeteria'  ) this.zone = 'cafeteria';
      else if (z === 'yard'       ) this.zone = 'yard';
      else if (z === 'gym'        ) this.zone = 'gym';
      else if (z === 'shower'     ) this.zone = 'shower';
      else if (z === 'isolation'  ) this.zone = 'isolation';
      else if (z === 'counseling' ) this.zone = 'counseling';
      else if (z === 'library'    ) this.zone = 'library';
      else if (z === 'workshop'   ) this.zone = 'workshop';
      else                          this.zone = 'corridor';
    }
    this.targetZone  = zone;
    this.pendingZone = null;

    if (zone === 'cafeteria') {
      // Two-step: counter (food pick-up) → seat
      const def = getCellDef(this.cellId);
      const counterSpot = claimSpot('cafeteria', def, this.id, 'counter')
                       || fallbackPos('cafeteria', def);
      this.cafState         = 'to_counter';
      this.cafSeat          = null;
      this.cafCounterDelay  = 0;
      this.cafCounterTarget = 1000 + Math.random() * 1000; // 1–2 s pause at counter
      this.currentSpotId    = counterSpot.id || null;
      this.waypoints        = buildPath(this, 'cafeteria', counterSpot);
      this.sleepState       = null;
    } else if (zone === 'cell') {
      this.cafState   = null;
      this.cafSeat    = null;
      // Night: will walk to bed (or floor) after arriving in cell
      this.sleepState = PHASES[GS.phaseIndex] === 'Natt'
        ? (this.isFloorSleeper ? 'to_floor' : 'to_bed')
        : null;
      this.waypoints  = buildPath(this, 'cell');
    } else {
      this.cafState   = null;
      this.cafSeat    = null;
      this.sleepState = null;
      this.waypoints  = buildPath(this, zone);
    }
  }

  move(dt) {
    this._isMoving = false;
    // Handle stagger delay
    if (this.phaseDelay > 0) {
      this.phaseDelay -= dt;
      if (this.phaseDelay <= 0 && this.pendingZone) {
        this._applyZoneChange(this.pendingZone);
      }
      return;
    }

    // Stopp bevegelse under kamp — de står og slåss
    // Stopp også bevegelse når innsatt ligger nede etter tap
    if (this.inFight || this.downedMs > 0) return;

    if (this.waypoints.length === 0) {
      // Cafeteria sub-state machine
      if (this.cafState === 'to_counter') {
        this.cafCounterDelay += dt;
        if (this.cafCounterDelay >= this.cafCounterTarget) {
          const def  = getCellDef(this.cellId);
          const seat = claimSpot('cafeteria', def, this.id, 'seat')
                    || fallbackPos('cafeteria', def);
          this.cafSeat   = seat;
          this.waypoints = [{ px: seat.px, py: seat.py }];
          this.cafState  = 'to_seat';
        }
        return;
      }
      if (this.cafState === 'to_seat') {
        this.cafState = 'seated';
        return;
      }

      // Sleep state machine — walk to bed, then lie down
      if (this.sleepState === 'to_bed' && this.zone === 'cell') {
        const def = getCellDef(this.cellId);
        const bed = def.beds[this.cellSlot] || def.beds[0];
        this.waypoints = [{ px: bed.x * TILE + TILE / 2, py: bed.y * TILE + TILE / 2 }];
        this.sleepState = 'going_to_bed';
        return;
      }
      if (this.sleepState === 'going_to_bed') {
        this.sleepState = 'in_bed';
        return;
      }
      // Floor sleeper — walk to floorPos
      if (this.sleepState === 'to_floor' && this.zone === 'cell') {
        const def = getCellDef(this.cellId);
        const fp  = def.floorPos;
        this.waypoints = [{ px: fp.x * TILE + TILE / 2, py: fp.y * TILE + TILE / 2 }];
        this.sleepState = 'on_floor';
        return;
      }

      // No wander during night, shower, or while seated eating
      const isNight  = PHASES[GS.phaseIndex] === 'Natt';
      const isShower = this.zone === 'shower';
      const isSeated     = this.cafState === 'seated';
      const isInBed      = this.sleepState === 'in_bed';
      const isOnFloor    = this.sleepState === 'on_floor';
      const isIntervened = this.isBeingIntervened;
      // Idle micro-wander (v0.9.32): sporadisk liten forflytning innen samme sone.
      // Bruker fallbackPos som gir walkable tile — ingen ny path-logikk.
      const canWander = !isNight && !isShower && !isSeated && !isInBed && !isOnFloor && !isIntervened;
      if (canWander && Math.random() < 0.0018) {
        const def = getCellDef(this.cellId);
        const target = fallbackPos(this.zone, def, this.groupId);
        if (target && Math.hypot(target.px - this.px, target.py - this.py) > TILE * 0.8) {
          this.waypoints = [{ px: target.px, py: target.py }];
        }
      }
      return;
    }
    const wp = this.waypoints[0];
    const dx = wp.px - this.px, dy = wp.py - this.py;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < 2) {
      this.px = wp.px; this.py = wp.py;
      this.waypoints.shift();
      if (this.waypoints.length === 0) this.zone = this.targetZone;
    } else {
      const speedMult = (GS.mode === 'lastManStandingShower') ? 2.5
                      : isArenaMode()                         ? 1.8
                      :                                         1;
      const spd = this.speed * dt * 0.054 * speedMult;
      this.px += dx/d * spd;
      this.py += dy/d * spd;
      this._facing  = Math.atan2(dy, dx);
      this._isMoving = true;
      this._walkPhase += spd;
    }
  }
}

// ================================================================
// GUARD CLASS
// ================================================================
class Guard {
  constructor(patrol, pi = 0) {
    this.patrol            = patrol;
    this.pi                = pi;
    this.px                = patrol[pi].x * TILE + TILE/2;
    this.py                = patrol[pi].y * TILE + TILE/2;
    this.speed             = 0.75;
    this.target            = null;  // Inmate being targeted, or null
    this.interventionTimer = 0;     // ms spent intervening
    this.scanTimer         = 0;     // ms until next target scan
    this._isMoving         = false; // settes av move() for patrulje-aura
    this.pauseUntil        = 0;     // ms-timestamp — stå stille til denne
    this.facing            = 0;     // radianer, for render + glance-retning
    this._walkPhase        = 0;     // akkumulert forflytning (px) — driver stride-animasjon
    this._seed             = Math.random() * 1000; // stabil seed for breath/idle-sway
  }

  move(dt) {
    this._isMoving = false;
    const lastMan = isArenaMode();
    // Periodically scan for high-unrest target
    this.scanTimer -= dt;
    if (this.scanTimer <= 0 && !this.target && !lastMan) {
      // Adaptiv scan-rate: dobler tempo ved høy uro i fengselet
      const anyHigh = GS.inmates.some(i => i.unrest > 70);
      this.scanTimer = anyHigh ? 1000 : 2000;
      let best = null, bestScore = -1;
      for (const inm of GS.inmates) {
        if (!inm.inConflict && inm.unrest < 78) continue;   // konflikt → alltid kandidat
        if (inm.inConflict && !inm.guardNoticedFight) continue;  // vakter "ser ikke" denne kampen
        const dx = inm.px - this.px, dy = inm.py - this.py;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < TILE * 10) {
          const base = inm.inConflict ? inm.unrest + 60 : inm.unrest; // konflikt-pri styrket
          const score = base - d * 0.05;
          if (score > bestScore) { best = inm; bestScore = score; }
        }
      }
      this.target = best;

      // Glance — hvis ingen target, se på en mildt urolig innsatt i nærheten
      if (!this.target) {
        for (const inm of GS.inmates) {
          if (inm.unrest <= 55) continue;
          const dx = inm.px - this.px, dy = inm.py - this.py;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < TILE * 5 && Math.random() < 0.30) {
            this.facing = Math.atan2(dy, dx);
            this.pauseUntil = Date.now() + 1400;
            break;
          }
        }
      }
    }

    if (this.target && !lastMan) {
      // Drop target if inmate has calmed down
      if (this.target.unrest < 40) {
        this.target.isBeingIntervened = false;
        this.target = null; this.interventionTimer = 0;
      } else {
        const dx = this.target.px - this.px, dy = this.target.py - this.py;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < TILE * 1.2) {
          // Intervening: stand still, calm the inmate
          this.target.isBeingIntervened = true;
          this.target.waypoints = [];
          this.target.unrest = Math.max(0, this.target.unrest - 2.5);
          // Vakt avbryter pågående kamp — la resolve trigge neste tick
          if (this.target.inFight) this.target.fightMs = Math.min(this.target.fightMs, 200);
          this.interventionTimer += dt;
          this.facing = Math.atan2(dy, dx);
          if (this.interventionTimer >= 4000) {
            this.target.isBeingIntervened = false;
            this.target = null; this.interventionTimer = 0;
          }
        } else {
          // Pursue — move directly toward inmate
          const spd = this.speed * dt * 0.054;
          this.px += dx/d * spd;
          this.py += dy/d * spd;
          this._isMoving = true;
          this.facing = Math.atan2(dy, dx);
          this._walkPhase += spd;
        }
      }
      return;
    }

    // Pause-gate — stå stille hvis vi er midt i en waypoint-pause eller glance
    if (Date.now() < this.pauseUntil) return;

    // Normal patrol
    const g = this.patrol[this.pi];
    const tx = g.x*TILE + TILE/2, ty = g.y*TILE + TILE/2;
    const dx = tx - this.px, dy = ty - this.py;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < 3) {
      this.pi = (this.pi + 1) % this.patrol.length;
      // 35 % sjanse for kort pause ved hver waypoint-ankomst
      if (Math.random() < 0.35) {
        this.pauseUntil = Date.now() + 900 + Math.random() * 1500;
      }
      // Smartere patrulje: når vi runder, sikt mot waypoint nærmest høyeste-uro-innsatt (hvis uro > 55)
      if (this.pi === 0) {
        let hotInm = null, hotUnrest = 55;
        for (const inm of GS.inmates) {
          if (inm.unrest > hotUnrest && inm.isolationTicks === 0 && inm.zone !== 'cell') {
            hotUnrest = inm.unrest; hotInm = inm;
          }
        }
        if (hotInm) {
          let bestI = 0, bestD = Infinity;
          for (let i = 0; i < this.patrol.length; i++) {
            const wx = this.patrol[i].x*TILE + TILE/2;
            const wy = this.patrol[i].y*TILE + TILE/2;
            const wd = Math.hypot(wx - hotInm.px, wy - hotInm.py);
            if (wd < bestD) { bestD = wd; bestI = i; }
          }
          this.pi = bestI;
        }
      }
    } else {
      const spd = this.speed * dt * 0.054;
      this.px += dx/d * spd;
      this.py += dy/d * spd;
      this._isMoving = true;
      this.facing = Math.atan2(dy, dx);
      this._walkPhase += spd;
    }
  }
}

// ================================================================
// SPAWN
// ================================================================
function spawn() {
  for (const def of CELL_DEFS) {
    for (let slot = 0; slot < 2; slot++) {
      const inm = new Inmate(def.id);
      inm.cellSlot = slot;
      const wp = def.walkPos[slot] || def.walkPos[0];
      inm.px = wp.x * TILE + TILE / 2;
      inm.py = wp.y * TILE + TILE / 2;
      GS.inmates.push(inm);
    }
  }

  // Guard 1: horizontal spine patrol (east-west sweep along row 12)
  GS.guards.push(new Guard([{x:5,y:12},{x:21,y:12},{x:38,y:12},{x:21,y:12}]));
  // Guard 2: inner corridors + bottom cross (full perimeter loop)
  GS.guards.push(new Guard([{x:9,y:9},{x:9,y:23},{x:35,y:23},{x:35,y:9}]));
  // Guard 3: cafeteria + yard via vertical corridor
  GS.guards.push(new Guard([{x:21,y:6},{x:8,y:6},{x:21,y:6},{x:21,y:2},{x:21,y:6},{x:34,y:6}]));
  // Guard 4: vertical spine + gym/shower observer (panoptikon guard)
  GS.guards.push(new Guard([{x:21,y:12},{x:21,y:5},{x:21,y:12},{x:21,y:19},{x:21,y:12}]));

  assignIdols();
}

// Berømt nykommer — power-spawn med overstyrt profil + dominans-basert seng-kamp
function positionInmateAt(inm, tx, ty) {
  inm.px = tx * TILE + TILE / 2;
  inm.py = ty * TILE + TILE / 2;
}

// Velger en innsatt nykommer skal utfordre: helst en gjengleder, ellers høyest respekt.
function pickTakeOverTarget() {
  const leaders   = computeLeaders();
  const leaderIds = Object.values(leaders).filter(Boolean);
  const candidates = GS.inmates.filter(i => i.isolationTicks === 0);
  if (candidates.length === 0) return null;
  const leaderCands = candidates.filter(i => leaderIds.includes(i.id));
  const pool = leaderCands.length > 0 ? leaderCands : candidates;
  pool.sort((a, b) => b.respekt - a.respekt);
  return pool[0].id;
}

function spawnNewcomer() {
  if (isArenaMode()) return null;
  // Tell opp per celle
  const cellCounts = {};
  const cellFloorOccupied = {};
  for (const inm of GS.inmates) {
    if (inm.cellId) {
      cellCounts[inm.cellId] = (cellCounts[inm.cellId] || 0) + 1;
      if (inm.isFloorSleeper) cellFloorOccupied[inm.cellId] = true;
    }
  }

  const inm = new Inmate(null);           // cellId settes nedenfor
  inm.respekt     = 70;
  inm.temperament = 'aggressive';
  inm.groupId     = null;
  inm.strength    = 70 + Math.random() * 15;

  // Ambisjon: utfordre den sterkeste / en gjengleder
  inm.ambition = 'take_over';
  inm.targetId = pickTakeOverTarget();
  const target = inm.targetId != null ? GS.inmates.find(x => x.id === inm.targetId) : null;
  if (target) {
    addHistory(inm, `🎯 Har blinket ut ${target.name} som mål.`);
    addPowerEvent('arrival', `🎯 ${inm.name} sikter mot ${target.name}.`);
  }

  // Gjengledere skjermes fra å miste seng via spawn-logikk
  const leaders   = computeLeaders();
  const leaderIds = new Set(Object.values(leaders));

  // Gyldige dominans-celler: full (2 innsatte), ingen floor sleeper, minst én ikke-leder kandidat
  const validCells = CELL_DEFS.filter(c => {
    if ((cellCounts[c.id] || 0) < 2) return false;
    if (cellFloorOccupied[c.id])     return false;
    return GS.inmates.some(i =>
      i.cellId === c.id && !i.isFloorSleeper && !leaderIds.has(i.id));
  });

  if (validCells.length === 0) {
    // Fallback: nykommer blir floor sleeper. Prioriter celle med minst én ikke-leder.
    let fallbackCells = CELL_DEFS.filter(c => {
      if (cellFloorOccupied[c.id]) return false;
      return GS.inmates.some(i => i.cellId === c.id && !leaderIds.has(i.id));
    });
    if (fallbackCells.length === 0) {
      fallbackCells = CELL_DEFS.filter(c => !cellFloorOccupied[c.id]);
    }
    if (fallbackCells.length === 0) {
      GS.powerCooldowns.newcomer = 0;
      return null;
    }
    const target = fallbackCells[Math.floor(Math.random() * fallbackCells.length)];
    inm.cellId         = target.id;
    inm.cellSlot       = null;
    inm.isFloorSleeper = true;
    addHistory(inm, `🛏 Måtte ta gulvet — ingen å utfordre.`);
    addPowerEvent('bed', `🛏 ${inm.name} måtte ta gulvet — ingen motstand å overvinne.`);
    const fp = target.floorPos;
    positionInmateAt(inm, fp.x, fp.y);
  } else {
    // Dominans-kamp i tilfeldig gyldig celle — weakest er alltid ikke-leder og ledig
    const targetCell = validCells[Math.floor(Math.random() * validCells.length)];
    const candidates = GS.inmates
      .filter(i => i.cellId === targetCell.id
                   && !i.isFloorSleeper
                   && !leaderIds.has(i.id)
                   && !i.inFight
                   && i.isolationTicks === 0)
      .sort((a, b) => a.respekt - b.respekt);

    if (candidates.length === 0) {
      // Alle kandidater i targetCell er opptatt — fall tilbake til floor sleeper (samme mønster som ingen gyldig celle)
      inm.cellId         = targetCell.id;
      inm.cellSlot       = null;
      inm.isFloorSleeper = true;
      addHistory(inm, `🛏 Måtte ta gulvet — ingen å utfordre.`);
      addPowerEvent('bed', `🛏 ${inm.name} måtte ta gulvet — ingen motstand å overvinne.`);
      const fp = targetCell.floorPos;
      positionInmateAt(inm, fp.x, fp.y);
      inm.conflictFlashMs = FLASH_DURATION;
      inm.setTargetZone('cafeteria');
      GS.inmates.push(inm);
      return inm;
    }

    const weakest = candidates[0];
    // Plasser nykommer i cellen for kampen — ingen seng/slot tildelt ennå
    inm.cellId         = targetCell.id;
    inm.cellSlot       = null;
    inm.isFloorSleeper = false;                 // midlertidig; avgjøres i resolveFight-hook
    positionInmateAt(inm, weakest.px, weakest.py);

    // Koble de to til en spawn-seng-kamp
    inm.bedChallengeVs     = weakest.id;
    weakest.bedChallengeVs = inm.id;

    GS.inmates.push(inm);                       // må være i lista før triggerConflict
    triggerConflict(inm, weakest);              // ekte kamp: flash + 3,5–5s timer + resolveFight
    return inm;
  }

  inm.conflictFlashMs = FLASH_DURATION;
  inm.setTargetZone('cafeteria');
  GS.inmates.push(inm);
  return inm;
}

// Gjengleder per A/B/C: høyest respekt → høyest strength → lavest id.
function computeLeaders() {
  const leaders = {};
  for (const gang of ['A','B','C']) {
    let best = null;
    for (const inm of GS.inmates) {
      if (inm.groupId !== gang) continue;
      if (!best) { best = inm; continue; }
      if (inm.respekt > best.respekt) best = inm;
      else if (inm.respekt === best.respekt) {
        if (inm.strength > best.strength) best = inm;
        else if (inm.strength === best.strength && inm.id < best.id) best = inm;
      }
    }
    if (best) leaders[gang] = best.id;
  }
  return leaders;
}

// Fanatiske får en karismatisk idol etter spawn. Null hvis ingen karismatisk eksisterer.
function assignIdols() {
  const karismatiske = GS.inmates.filter(i => i.kvirk === 'karismatisk');
  for (const inm of GS.inmates) {
    if (inm.kvirk !== 'fanatisk') continue;
    if (karismatiske.length === 0) { inm.idolId = null; continue; }
    inm.idolId = karismatiske[Math.floor(Math.random()*karismatiske.length)].id;
  }
}

// Bygger en beskrivende dødsårsak basert på siste kamp og rom-kontekst.
function buildDeathReason(inm) {
  const opp    = inm.lastFightOpponent;
  const recent = inm.lastFightDay != null && (GS.day - inm.lastFightDay) <= 1;
  if (inm.isolationTicks > 0 && inm.postFightRoom === 'isolation') {
    return opp ? `Døde i isolat etter kamp mot ${opp}` : 'Døde i isolat';
  }
  if (recent && opp) return `Døde etter kamp mot ${opp}`;
  if (opp)           return `Døde av skader — sist i kamp mot ${opp}`;
  return 'Ukjent årsak';
}

// Fjerner innsatt på indeks i, rydder referanser, spawner erstatning.
function removeInmate(i, reasonOverride = null) {
  const inm = GS.inmates[i];
  const cellId = inm.cellId;
  const removedId = inm.id;
  const wasKarismatisk = inm.kvirk === 'karismatisk';
  const reason = reasonOverride || buildDeathReason(inm);

  addDeparted(inm, reason);
  releaseSpot(removedId);
  if (GS.selectedId === removedId) GS.selectedId = null;
  if (GS.hoverId === removedId) GS.hoverId = null;
  if (GS.playerId === removedId) GS.playerId = null;

  for (const other of GS.inmates) {
    if (other === inm) continue;
    if (other.friendId === removedId) {
      addMemory(other, { type: 'friend_died', otherId: removedId, otherName: inm.name, weight: 7 });
      addHistory(other, `Mistet vennen ${inm.name}.`);
      other.friendId = null;
      other.notifiedFriendInRoom = null;
    }
    if (other.idolId === removedId) other.idolId = null;
    if (other.fightOpponent === removedId) {
      other.fightOpponent = null;
      other.inFight = false;
      other.fightMs = 0;
    }
    if (other.notifiedFriendInRoom === removedId) other.notifiedFriendInRoom = null;
  }

  if (GS.mode === 'lastManStandingShower') {
    GS.corpses.push({
      id:    inm.id,
      name:  inm.name,
      px:    inm.px,
      py:    inm.py,
      angle: Math.random() * Math.PI * 2,
      scale: 0.9 + Math.random() * 0.2,
    });
    for (let k = 0; k < 3; k++) {
      GS.bloodSpots.push({
        px: inm.px + (Math.random() - 0.5) * 20,
        py: inm.py + (Math.random() - 0.5) * 14,
        r:  8 + Math.random() * 6,
      });
    }
  }

  GS.stats.disappeared++;
  GS.inmates.splice(i, 1);

  if (isArenaMode()) {
    addPowerEvent('ambition',
      `🩸 ${inm.name} er ute av spillet (${GS.inmates.length} igjen).`);
    if (GS.winnerId == null && GS.inmates.length === 1) {
      GS.winnerId = GS.inmates[0].id;
      addPowerEvent('ambition',
        `👑 ${GS.inmates[0].name} er siste mann stående — vinneren!`);
    }
  } else {
    const fresh = new Inmate(cellId);
    fresh.setTargetZone(PHASE_ZONE[PHASES[GS.phaseIndex]]);
    GS.inmates.push(fresh);
  }

  if (wasKarismatisk) assignIdols();
}

// ================================================================
// CONFLICT MECHANIC
// ================================================================
const CONFLICT_DIST       = TILE * 1.5;   // rivaler trenger ikke være helt inntil
const HEALTH_FLOOR        = 0;            // 0 = innsatt kan forsvinne ved health<=0
const CONFLICT_COOLDOWN   = 12000;        // 12s før samme innsatt kan igjen
const FLASH_DURATION      = 1800;         // 1.8s visuell markør

// stressTolerance → unrest-terskel der innsatt er "på randen"
const STRESS_THRESHOLD = { low: 25, medium: 40, high: 55 };
// temperament → sjanse for å TRIGGE når alle andre krav er møtt
const AGGRESSION_ROLL  = { calm: 0.10, normal: 0.45, aggressive: 0.80 };

// Rivalitet — dominante innsatte oppsøker hverandre og slåss med større utslag
const DOMINANT_THRESHOLD    = 65;     // respekt-grense for "dominant"
const RIVALRY_CHANCE_MULT   = 1.8;    // trigger-sjanse × denne når begge er dominante
const RIVALRY_COOLDOWN_MULT = 0.6;    // kortere cooldown mellom rivaler
const WEAK_SKIP_CHANCE      = 0.5;    // dominant ignorerer svak (resp < 50) så ofte
const RIVALRY_WIN_RESPEKT   = 5;      // rival-seier (vanlig kamp gir +2)
const RIVALRY_LOSS_RESPEKT  = 4;      // rival-tap (vanlig kamp har 0 tap)

// Rom-opphold: konsekvens av gjentatte konflikter. Innsatt "velger" ett av tre rom.
const ISOLATION_THRESHOLD = 3;                                     // konflikter før rom-ruting
const ROOM_DURATION = {
  isolation:  1020,   // full døgnsyklus — straff
  counseling:  340,   // ~1 fase
  library:     680,   // ~2 faser, roligere
};

// Weighted random basert på personlighet + uro
function chooseRoomAfterFight(inm) {
  const w = { isolation: 1.0, counseling: 1.0, library: 1.0 };

  if (inm.unrest > 70) w.isolation *= 2.0;
  if (inm.unrest > 85) w.isolation *= 1.5;

  if (inm.kvirk === 'nervøs')       { w.counseling *= 2.5; w.isolation  *= 0.7; }
  if (inm.kvirk === 'karismatisk')  { w.isolation  *= 0.4; w.library    *= 1.3; }
  if (inm.kvirk === 'paranoid')     { w.counseling *= 0.4; w.library    *= 1.3; }
  if (inm.kvirk === 'fanatisk')     { w.counseling *= 0.6; }

  if (inm.stressTolerance === 'low')    w.counseling *= 2.0;
  if (inm.temperament   === 'calm')     w.library    *= 1.8;
  if (inm.temperament   === 'aggressive'){ w.isolation *= 1.4; w.library *= 0.5; }
  if (inm.sosial        === 'introvert') w.library    *= 1.4;
  if (inm.health        < 50)            w.counseling *= 1.4;

  const total = w.isolation + w.counseling + w.library;
  let r = Math.random() * total;
  if ((r -= w.isolation)  <= 0) return 'isolation';
  if ((r -= w.counseling) <= 0) return 'counseling';
  return 'library';
}

function sendToRoomAfterFight(inm) {
  if (GS.mode === 'lastManStandingShower') return;   // party mode — ingen pause
  if (inm.isolationTicks > 0) return;      // allerede på opphold
  const room = chooseRoomAfterFight(inm);
  inm.postFightRoom      = room;
  inm.isolationTicks     = ROOM_DURATION[room];
  inm.conflictCount      = 0;
  if (room === 'isolation')      GS.stats.isolation++;
  else if (room === 'counseling') GS.stats.counseling++;
  else if (room === 'library')    GS.stats.library++;
  if (room === 'counseling') inm.counselingCount++;
  if (room === 'isolation') {
    inm.isolatCount++;
    inm.respekt         -= 3;
    inm.soningstidIgjen  += 1;
    inm.soningstidTotalt += 1;
  }
  inm.waypoints   = [];
  inm.pendingZone = null;
  releaseSpot(inm.id);
  inm.setTargetZone(room);
  addHistory(inm,
    room === 'isolation'  ? '🔒 Sendt til isolat.' :
    room === 'counseling' ? 'Sendt til samtale' :
                            'Sendt til biblioteket');
}

const HISTORY_ROOM_LINES = {
  isolation:  { pos: ['Kom rolig ut av isolatet', 'Roet seg i isolatet'],
                neg: ['Kom verre ut av isolatet', 'Brøt ned i isolatet'] },
  counseling: { pos: ['Roet seg i samtalen', 'Åpnet seg i samtalen'],
                neg: ['Samtalen hjalp ikke', 'Sa ingenting i samtalen'] },
  library:    { pos: ['Fant ro i biblioteket', 'Roet seg blant bøkene'],
                neg: ['Rastløs i biblioteket', 'Fant ikke ro blant bøkene'] },
};

// Ferdig-effekt: kalles når timeren går til 0
function applyRoomEffect(inm) {
  const room = inm.postFightRoom;
  if (!room) return;
  let d = 0, neg = false;

  if (room === 'isolation') {
    d = -25;
    if (inm.isolationResponse === 'positive')      d -= 10;
    else if (inm.isolationResponse === 'negative') { d = 15; neg = true; }
    if (inm.kvirk === 'nervøs') { d += 10; if (d > 0) neg = true; }
    if (inm.kvirk === 'fanatisk') {
      const idol = GS.inmates.find(x => x.id === inm.idolId);
      if (!idol || idol.isolationTicks > 0) { d += 8; if (d > -5) neg = true; }
    }
    addHistory(inm, pickRandom(HISTORY_ROOM_LINES.isolation[neg ? 'neg' : 'pos']));
  } else if (room === 'counseling') {
    d = -12;
    if (inm.kvirk          === 'nervøs')      d -= 10;
    if (inm.stressTolerance === 'low')        d -= 6;
    if (inm.temperament    === 'aggressive') { d += 4; neg = true; }
    if (inm.kvirk          === 'paranoid')   { d += 3; neg = true; }
    addHistory(inm, pickRandom(HISTORY_ROOM_LINES.counseling[neg ? 'neg' : 'pos']));
  } else if (room === 'library') {
    d = -8;
    if (inm.temperament === 'calm' || inm.sosial === 'introvert') d -= 5;
    if (inm.temperament === 'aggressive') { d += 2; neg = true; }
    inm.disiplin = Math.min(100, inm.disiplin + 3);
    addHistory(inm, pickRandom(HISTORY_ROOM_LINES.library[neg ? 'neg' : 'pos']));
  }

  inm.unrest = Math.max(0, Math.min(100, inm.unrest + d));
  inm.postFightRoom = null;
}

// Kamp-varighet: 3.5–5s så spilleren rekker å se den
const FIGHT_MS_MIN = 3500;
const FIGHT_MS_MAX = 5000;

function triggerConflict(a, b) {
  // Start kamp — skade/utfall bestemmes i resolveFight når timeren er ute
  const shower = (GS.mode === 'lastManStandingShower');
  const fMin = shower ? 700  : isArenaMode() ? 1800 : FIGHT_MS_MIN;
  const fMax = shower ? 1200 : isArenaMode() ? 2500 : FIGHT_MS_MAX;
  const dur = fMin + Math.random() * (fMax - fMin);
  a.inFight = b.inFight = true;
  a.fightMs = b.fightMs = dur;
  a.fightOpponent = b.id;
  b.fightOpponent = a.id;
  // 60 % sjanse for at vakter legger merke til denne kampen
  a.guardNoticedFight = b.guardNoticedFight = Math.random() < 0.60;
  a.waypoints = [];
  b.waypoints = [];
  a.inConflict = b.inConflict = true;
  a.conflictFlashMs = b.conflictFlashMs = FLASH_DURATION;
  const rivalry = a.respekt > DOMINANT_THRESHOLD && b.respekt > DOMINANT_THRESHOLD;
  const cdMult  = rivalry ? RIVALRY_COOLDOWN_MULT : 1.0;
  const baseCD = shower ? 1500 : isArenaMode() ? 4000 : CONFLICT_COOLDOWN;
  a.conflictCooldown = (a.kvirk === 'impulsiv' ? baseCD/2 : baseCD) * cdMult;
  b.conflictCooldown = (b.kvirk === 'impulsiv' ? baseCD/2 : baseCD) * cdMult;
  a.conflictCount++;
  b.conflictCount++;
  // Isolat-sjekk er flyttet til resolveFight — applies etter at kampen er over
}

function resolveFight(a, b) {
  GS.stats.fights++;
  // Vinner = høyere (strength + tilfeldig 0–20)
  const scoreA = a.strength + Math.random() * 20;
  const scoreB = b.strength + Math.random() * 20;
  const winner = scoreA >= scoreB ? a : b;
  const loser  = winner === a ? b : a;

  // Taper: helseskade + uro opp (dobbel skade i lastMan — 14–28)
  const dmg = (GS.mode === 'lastManStandingShower')
    ? 35 + Math.random() * 25   // 35–60 — party mode
    : isArenaMode()
      ? 22 + Math.random() * 20 // 22–42
      : 8  + Math.random() * 7; // 8–15
  loser.health = Math.max(HEALTH_FLOOR, loser.health - dmg);
  loser.unrest = Math.min(100, loser.unrest + 15);

  // Lagre kamp-kontekst for Forsvunnet-panelet
  loser.lastFightOpponent  = winner.name;
  loser.lastFightDay       = GS.day;
  winner.lastFightOpponent = loser.name;
  winner.lastFightDay      = GS.day;

  // Vinner: litt lavere uro, ingen skade
  if (GS.mode !== 'lastManStandingShower') {
    winner.unrest = Math.max(0, winner.unrest - 5);
  }

  // Rivalitet — to dominante som slåss gir større respekt-utslag + egen historikk
  const rivalry = winner.respekt > DOMINANT_THRESHOLD && loser.respekt > DOMINANT_THRESHOLD;
  const loserWasDominant = loser.respekt > DOMINANT_THRESHOLD;

  // Hevn: sjekk FØR vi legger til nye minner (grudge avledes fra prior losses)
  const wasRevenge = hasGrudgeAgainst(winner, loser.id);

  // Minner: strukturert logg av kamputfall (grunnlag for grudges + AI-kontekst)
  const lossWeight = 4 + (rivalry ? 1 : 0) + (winner.respekt >= 75 ? 1 : 0);
  const winWeight  = 2 + (loser.respekt  >= 75 ? 1 : 0);
  addMemory(loser,  { type: 'loss', otherId: winner.id, otherName: winner.name, weight: lossWeight });
  addMemory(winner, { type: 'win',  otherId: loser.id,  otherName: loser.name,  weight: winWeight  });

  if (rivalry) {
    winner.respekt = Math.min(100, winner.respekt + RIVALRY_WIN_RESPEKT);
    loser.respekt  = Math.max(0,   loser.respekt  - RIVALRY_LOSS_RESPEKT);
  } else {
    winner.respekt += 2;
  }
  winner.fightsWon++;
  loser.fightsLost++;

  // Ambisjons-kamp: ekstra utslag hvis kampen var mot målet
  const ambitionWin  = winner.ambition === 'take_over' && winner.targetId === loser.id;
  const ambitionLoss = loser.ambition  === 'take_over' && loser.targetId  === winner.id;
  if (ambitionWin) {
    winner.respekt = Math.min(100, winner.respekt + 5);
    winner.ambition = null;
    winner.targetId = null;
    addHistory(winner, `🎯 Tok over — ${loser.name} er slått.`);
    addPowerEvent('throne', `🎯 ${winner.name} nådde målet sitt.`);
  } else if (ambitionLoss) {
    loser.respekt = Math.max(0, loser.respekt - 8);
    loser.ambition = null;
    loser.targetId = null;
    addHistory(loser, `🎯 Mistet ansikt mot ${winner.name} — ambisjonen falt.`);
    addPowerEvent('fall', `🎯 ${loser.name} tapte mot sitt mål.`);
  }

  // Hevn: vinneren bar grudge mot taperen → liten respekt-bonus og egen logg
  if (wasRevenge) {
    winner.respekt = Math.min(100, winner.respekt + 3);
    addHistory(winner, `⚡ Fikk sin hevn mot ${loser.name}.`);
    addPowerEvent('rivalry', `⚡ ${winner.name} tok hevn mot ${loser.name}.`);
  }

  // Rydd opp kamp-flagg på begge
  a.inFight = b.inFight = false;
  a.fightMs = b.fightMs = 0;
  a.fightOpponent = b.fightOpponent = null;
  a.guardNoticedFight = b.guardNoticedFight = true;   // nullstill så neste kamp ruller på nytt

  // Taper ligger nede i 2–4 sekunder
  loser.downedMs = 2000 + Math.random() * 2000;

  // Blodpøl under taperen — litt lengre enn downedMs så den vedvarer etter stand-up
  loser.bloodPoolMs = 3500;

  // Shower-modus: akkumuler blodflekker som blir værende på gulvet
  if (GS.mode === 'lastManStandingShower') {
    for (let k = 0; k < 2; k++) {
      GS.bloodSpots.push({
        px: loser.px + (Math.random() - 0.5) * 22,
        py: loser.py + (Math.random() - 0.5) * 16,
        r:  6 + Math.random() * 5,
      });
    }
  }

  // Push-offset: taperen skyves ~8 px bort fra vinneren (visuelt, fades i tick)
  const dxP = loser.px - winner.px, dyP = loser.py - winner.py;
  const dP  = Math.hypot(dxP, dyP) || 1;
  loser.fightPushX = (dxP/dP) * 8;
  loser.fightPushY = (dyP/dP) * 8;

  // Historikk — kort hendelse per innsatt
  if (rivalry) {
    // Utvikling over tid: les ut av historikken FØR nye linjer skrives
    const duelCount    = countPastDuels(winner, loser);
    const winnerStreak = countRivalWinStreak(winner);
    const loserStreak  = countRivalLossStreak(loser);

    let wText;
    if (duelCount >= 2)         wText = `⚔ Knuste ${loser.name} igjen — ${loser.name} har ingen sjanse.`;
    else if (winnerStreak >= 2) wText = `⚔ Dominerte ${loser.name} — begynner å ta over.`;
    else if (duelCount === 1)   wText = `⚔ Dominerte ${loser.name} på nytt.`;
    else                         wText = `⚔ Dominerte rivalen ${loser.name} — respekten steg.`;

    let lText;
    if (duelCount >= 2)         lText = `⚔ Tapte mot ${winner.name} igjen — underlegen.`;
    else if (loserStreak >= 2)  lText = `⚔ Ble banket av ${winner.name} — et tydelig fall.`;
    else if (duelCount === 1)   lText = `⚔ Tapte mot ${winner.name} nok en gang.`;
    else                         lText = `⚔ Tapte mot ${winner.name} — mistet ansikt.`;

    addHistory(winner, wText);
    addHistory(loser,  lText);

    let mText;
    if (duelCount >= 2)         mText = `⚔ ${winner.name} knuste ${loser.name} igjen.`;
    else if (winnerStreak >= 2) mText = `⚔ ${winner.name} tar over — slo ${loser.name}.`;
    else if (duelCount === 1)   mText = `⚔ ${winner.name} vs ${loser.name} — andre runde til ${winner.name}.`;
    else                         mText = `⚔ ${winner.name} slo ned ${loser.name}.`;
    addPowerEvent('rivalry', mText);
  } else {
    addHistory(winner, pickRandom([
      `Vant kamp mot ${loser.name}`,
      `Banka ${loser.name}`,
      `Ble stående — ${loser.name} gikk ned`,
    ]));
    addHistory(loser, pickRandom([
      `Tapte mot ${winner.name}`,
      `Ble slått ned av ${winner.name}`,
      `Kom dårlig ut mot ${winner.name}`,
    ]));
  }

  // Fall fra toppen: utløses kun ved overgang
  if (loserWasDominant && loser.respekt <= DOMINANT_THRESHOLD) {
    addPowerEvent('fall', `📉 ${loser.name} falt fra toppen.`);
    addHistory(loser, `📉 Mistet sin posisjon — ikke lenger respektert.`);
  }

  // Rom-ruting hvis de har nådd terskel (innsatt "velger" isolation/counseling/library)
  if (a.conflictCount >= ISOLATION_THRESHOLD) sendToRoomAfterFight(a);
  if (b.conflictCount >= ISOLATION_THRESHOLD) sendToRoomAfterFight(b);

  // Isolat-etter-kamp-minne: legges til kun hvis ruting endte i isolat
  if (a.postFightRoom === 'isolation') {
    const oppId = (a === winner) ? loser.id   : winner.id;
    const oppNm = (a === winner) ? loser.name : winner.name;
    addMemory(a, { type: 'isolation_after_fight', otherId: oppId, otherName: oppNm, weight: 5 });
  }
  if (b.postFightRoom === 'isolation') {
    const oppId = (b === winner) ? loser.id   : winner.id;
    const oppNm = (b === winner) ? loser.name : winner.name;
    addMemory(b, { type: 'isolation_after_fight', otherId: oppId, otherName: oppNm, weight: 5 });
  }

  // Spawn-seng-kamp: hvis en av sidene hadde bedChallengeVs, avgjør seng nå.
  if (winner.bedChallengeVs === loser.id || loser.bedChallengeVs === winner.id) {
    const newcomer = winner.bedChallengeVs === loser.id ? winner : loser;
    const defender = newcomer === winner ? loser : winner;
    const won      = winner === newcomer;
    const cellDef  = getCellDef(defender.cellId);

    if (won) {
      newcomer.cellId   = defender.cellId;
      newcomer.cellSlot = defender.cellSlot;
      newcomer.isFloorSleeper = false;
      defender.isFloorSleeper = true;
      defender.cellSlot       = null;
      defender.sleepState     = null;
      if (!newcomer.hasDominatedForBed) {
        newcomer.respekt = Math.min(100, newcomer.respekt + 3);
        newcomer.hasDominatedForBed = true;
      }
      addHistory(newcomer, `🛏 Tok sengen fra ${defender.name}. Markerte seg fra første dag.`);
      addHistory(defender, `🛏 Mistet sengen til ${newcomer.name}. Flyttet ned på gulvet.`);
      addPowerEvent('bed', `🛏 ${newcomer.name} kastet ${defender.name} på gulvet.`);

      // Posisjon: vinner til seng-slot, taper til gulv
      if (cellDef) {
        const wp = cellDef.walkPos[newcomer.cellSlot] || cellDef.walkPos[0];
        positionInmateAt(newcomer, wp.x, wp.y);
        positionInmateAt(defender, cellDef.floorPos.x, cellDef.floorPos.y);
      } else {
        console.warn('[bedChallenge] Mangler cellDef for', defender.cellId);
      }
    } else {
      newcomer.cellId         = defender.cellId;
      newcomer.cellSlot       = null;
      newcomer.isFloorSleeper = true;
      addHistory(newcomer, `🛏 Måtte ta gulvet — ${defender.name} holdt stand.`);
      addPowerEvent('bed', `🛏 ${newcomer.name} måtte ta gulvet — ikke sterk nok.`);

      // Posisjon: nykommer til gulv; defender står urørt på sin walkPos
      if (cellDef) {
        positionInmateAt(newcomer, cellDef.floorPos.x, cellDef.floorPos.y);
      } else {
        console.warn('[bedChallenge] Mangler cellDef for', defender.cellId);
      }
    }
    newcomer.bedChallengeVs = null;
    defender.bedChallengeVs = null;
  }

  // Sjekk oppnådde personlige mål etter kampen
  checkAmbitionAchieved(winner);
  checkAmbitionAchieved(loser);
}

// Gjengkrig — massiv unrest-injeksjon i to gjenger
function triggerGangWar(gA, gB) {
  for (const inm of GS.inmates) {
    if (inm.groupId !== gA && inm.groupId !== gB) continue;
    if (inm.isolationTicks > 0 || inm.inFight) continue;
    inm.unrest = Math.max(inm.unrest, 85);
    inm.conflictCooldown = 0;
    inm.conflictFlashMs = FLASH_DURATION;
    addHistory(inm, `Gjengkrig — ${gA} mot ${gB}.`);
  }
}

function runConflictCheck() {
  const n = GS.inmates.length;
  const shower = (GS.mode === 'lastManStandingShower');
  for (let i = 0; i < n; i++) {
    const a = GS.inmates[i];
    if (a.isolationTicks > 0) continue;
    if (a.conflictCooldown > 0) continue;
    let aThresh = STRESS_THRESHOLD[a.stressTolerance];
    if (a.kvirk === 'fanatisk' && a.idolId != null) {
      const aIdol = GS.inmates.find(x => x.id === a.idolId);
      if (aIdol && aIdol.inConflict) aThresh -= 15;
    }
    if (!shower && a.unrest < aThresh) continue;
    if (a.isBeingIntervened) continue;
    if (a.zone === 'cell') continue;

    for (let j = i+1; j < n; j++) {
      const b = GS.inmates[j];
      if (b.isolationTicks > 0) continue;
      if (b.conflictCooldown > 0) continue;
      if (a.groupId && b.groupId === a.groupId) continue;       // rivaler = annen gjeng (skippes kun for gjeng-medlem-par)
      if (b.id === a.friendId) continue;                        // ikke angrip venn
      if (b.isBeingIntervened) continue;
      if (b.zone === 'cell') continue;

      const dx = a.px - b.px, dy = a.py - b.py;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (!shower && d > CONFLICT_DIST) continue;

      // Ambisjons-par: nykommer møter sitt mål → hopp over weak-skip, tving chance=1.0
      const ambitionPair =
        (a.ambition === 'take_over' && a.targetId === b.id) ||
        (b.ambition === 'take_over' && b.targetId === a.id);

      // Grudge-par: minst én part bærer en grudge mot den andre
      const grudgePair = hasGrudgeAgainst(a, b.id) || hasGrudgeAgainst(b, a.id);

      // Leder-utfordring: sterk innsatt (ikke selv leder) møter en gjengleder
      const leadersMap = GS._leaders || {};
      const aIsLeader = a.groupId && leadersMap[a.groupId] === a.id;
      const bIsLeader = b.groupId && leadersMap[b.groupId] === b.id;
      const leaderChallengePair =
        (bIsLeader && !aIsLeader && a.respekt > 60) ||
        (aIsLeader && !bIsLeader && b.respekt > 60);

      if (!ambitionPair && !grudgePair && !shower) {
        // Dominant mot svak: skip halvparten av gangene — gir rivaler tid til å finne hverandre
        if (a.respekt > DOMINANT_THRESHOLD && b.respekt < 50 && Math.random() < WEAK_SKIP_CHANCE) continue;
        if (b.respekt > DOMINANT_THRESHOLD && a.respekt < 50 && Math.random() < WEAK_SKIP_CHANCE) continue;
      }

      // Trigger-sjanse = høyeste av de to sine aggresjon
      let chance = Math.max(AGGRESSION_ROLL[a.temperament], AGGRESSION_ROLL[b.temperament]);
      // Rivalitet — begge dominante → økt sjanse
      if (a.respekt > DOMINANT_THRESHOLD && b.respekt > DOMINANT_THRESHOLD) {
        chance = Math.min(1.0, chance * RIVALRY_CHANCE_MULT);
      }
      if (grudgePair && !ambitionPair) chance = Math.min(1.0, chance * 1.6);
      if (leaderChallengePair) chance = Math.min(1.0, chance * 1.5);
      if (ambitionPair) chance = 1.0;
      else chance = Math.min(1.0, chance * goalChanceMod(a) * goalChanceMod(b));
      if (Math.random() > chance) continue;

      triggerConflict(a, b);
      break; // a er ferdig — maks én konflikt per sjekk per person
    }
  }
}

// SIMULATION TICK
