const GANG_COLOR = { A: '#c83030', B: '#2858c8', C: '#28a040' };

function renderInmates() {
  for (const inm of GS.inmates) {
    // Gjeng-highlight: dim innsatte som ikke matcher aktivt filter.
    // Valgt innsatt dimmes aldri — den må alltid være tydelig.
    const dimmed     = GS.listFilter !== 'all'
                    && inm.id !== GS.selectedId
                    && !matchesFilter(inm, GS.listFilter);
    const highlighted = GS.listFilter !== 'all'
                    && matchesFilter(inm, GS.listFilter);
    if (dimmed) { ctx.save(); ctx.globalAlpha = 0.18; }

    const { look } = inm;
    const base = TILE * 0.29 * look.sizeFactor;
    const br   = base * 0.56;   // body radius
    const hr   = base * 0.40;   // head radius
    const bx   = inm.px, by = inm.py + base * 0.18;   // body centre
    const hx   = inm.px, hy = inm.py - base * 0.44;   // head centre
    const gangColor = GANG_COLOR[inm.groupId] || '#888';
    const inGang = inm.groupId != null;

    // Highlight-ring for matchende innsatte når et gjeng-filter er aktivt.
    // Tegnes først, havner bak alt annet. Bruker gjeng-farge (eller nøytralt grå for "Ingen").
    if (highlighted) {
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = gangColor;
      ctx.beginPath(); ctx.arc(inm.px, inm.py, base + 6, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.85;
      ctx.strokeStyle = gangColor;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(inm.px, inm.py, base + 6, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // Gang glow — kun for gjeng-medlemmer
    if (inGang) {
      ctx.save();
      ctx.globalAlpha = 0.13;
      ctx.fillStyle = gangColor;
      ctx.beginPath(); ctx.arc(inm.px, inm.py, base + 3.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Hover ring
    if (inm.id === GS.hoverId && inm.id !== GS.selectedId) {
      ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(inm.px, inm.py, base + 3, 0, Math.PI*2); ctx.stroke();
    }

    // Selection ring
    if (inm.id === GS.selectedId) {
      ctx.strokeStyle = '#d8c058'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(inm.px, inm.py, base + 4, 0, Math.PI*2); ctx.stroke();
    }

    // Body (clothing colour)
    ctx.fillStyle = look.clothColor;
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();

    // Gang chest symbol — kun for gjeng-medlemmer
    if (inGang) {
      ctx.save();
      ctx.fillStyle = gangColor; ctx.globalAlpha = 0.82;
      const ss = br * 0.48;
      if (inm.groupId === 'A') {
        ctx.beginPath(); ctx.moveTo(bx, by-ss); ctx.lineTo(bx+ss*0.85, by+ss*0.5); ctx.lineTo(bx-ss*0.85, by+ss*0.5); ctx.closePath(); ctx.fill();
      } else if (inm.groupId === 'B') {
        ctx.beginPath(); ctx.arc(bx, by, ss*0.6, 0, Math.PI*2); ctx.fill();
      } else if (inm.groupId === 'C') {
        ctx.fillRect(bx-ss*0.6, by-ss*0.6, ss*1.2, ss*1.2);
      }
      ctx.restore();
    }

    // Head (skin tone)
    ctx.fillStyle = look.skinTone;
    ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI*2); ctx.fill();

    // Hair
    if (look.hairStyle > 0) {
      ctx.fillStyle = look.hairColor;
      const capR = look.hairStyle === 2 ? hr * 1.18 : hr;
      ctx.beginPath(); ctx.arc(hx, hy, capR, Math.PI, 0); ctx.fill();
    }

    // Beard
    if (look.beard) {
      ctx.fillStyle = look.hairColor;
      ctx.beginPath(); ctx.arc(hx, hy + hr * 0.52, hr * 0.52, 0, Math.PI); ctx.fill();
    }

    // Scar
    if (look.scar) {
      ctx.save();
      ctx.strokeStyle = 'rgba(200,110,70,0.75)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(hx - hr*0.35, hy - hr*0.25);
      ctx.lineTo(hx + hr*0.20, hy + hr*0.35);
      ctx.stroke();
      ctx.restore();
    }

    // Gang bandana — kun for gjeng-medlemmer
    if (inGang) {
      ctx.save();
      ctx.fillStyle = gangColor; ctx.globalAlpha = 0.70;
      ctx.fillRect(hx - hr*1.05, hy - hr*0.18, hr*2.1, 2);
      ctx.restore();
    }

    // Shower effect — animated water droplets above head
    if (inm.zone === 'shower') {
      ctx.save();
      ctx.fillStyle = '#80c8f8';
      ctx.globalAlpha = 0.55 + Math.sin(Date.now()*0.003 + inm.id) * 0.20;
      for (let i = -1; i <= 1; i++) {
        const dy = ((Date.now()*0.0015 + inm.id*0.5 + i*0.5) % 1) * hr*2;
        ctx.beginPath(); ctx.arc(hx + i*hr*0.7, hy - hr*1.1 - dy, 1, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    // Unrest indicator dot
    const uc = inm.unrest>70 ? '#cc3030' : inm.unrest>40 ? '#c07828' : '#30904c';
    ctx.fillStyle = uc;
    ctx.beginPath(); ctx.arc(inm.px + base*0.55, inm.py - base*0.62, 2.5, 0, Math.PI*2); ctx.fill();

    // Status-emoji over hodet — rom-opphold > kamp > konflikt-flash > høy uro
    if (inm.isolationTicks > 0) {
      const icon = inm.postFightRoom === 'counseling' ? '💬'
                 : inm.postFightRoom === 'library'    ? '📖'
                 : '🔒';
      ctx.save();
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(icon, inm.px, inm.py - base*1.9);
      ctx.restore();
    } else if (inm.inFight) {
      // Kamp-markør: pulserende ⚔️ + rød ring rundt innsatt
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.03);
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.font = '18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚔️', inm.px, inm.py - base*1.9);
      ctx.strokeStyle = `rgba(255,60,40,${0.4 + 0.5 * pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(inm.px, inm.py, base * 1.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    } else if (inm.conflictFlashMs > 0) {
      const t = inm.conflictFlashMs / 1800;                      // 1..0 fade
      const pulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.02);
      ctx.save();
      ctx.globalAlpha = t * pulse;
      ctx.font = '16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💥', inm.px, inm.py - base*1.9);
      ctx.restore();
    } else if (inm.unrest > 70) {
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('😰', inm.px, inm.py - base*1.9);
      ctx.restore();
    }

    // Sleep indicator — visible only when actually lying in bed
    if (inm.sleepState === 'in_bed') {
      const floatY = Math.sin(Date.now() * 0.0015 + inm.id) * 2;
      ctx.save();
      ctx.globalAlpha = 0.55 + Math.sin(Date.now() * 0.002 + inm.id * 1.3) * 0.20;
      ctx.fillStyle = '#b8d4f0';
      ctx.font = `bold ${TILE*0.55|0}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('z', hx + base*0.5, hy - hr - base*0.7 + floatY);
      ctx.restore();
    }

    // Eating indicator — visible only when fully seated at table
    if (PHASE_ZONE[PHASES[GS.phaseIndex]] === 'cafeteria' && inm.cafState === 'seated') {
      ctx.save();
      ctx.globalAlpha = 0.60;
      ctx.fillStyle = '#e8c878';
      ctx.font = `bold ${TILE*0.50|0}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('\u2227', hx, hy - hr - base*0.6);
      ctx.restore();
    }

    if (dimmed) ctx.restore();
  }
}

function renderGuards() {
  for (const g of GS.guards) {
    // Target ring — pulsing orange circle around targeted inmate
    if (g.target) {
      const pulse = 0.35 + Math.sin(Date.now() * 0.007) * 0.25;
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.strokeStyle = '#e06828';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(g.target.px, g.target.py, TILE * 0.58, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    const base = TILE * 0.33;
    const br   = base * 0.58;
    const hr   = base * 0.40;
    const bx   = g.px, by = g.py + base * 0.18;
    const hx   = g.px, hy = g.py - base * 0.44;

    // Body — navy uniform
    ctx.fillStyle = '#1e3a6e';
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#2a5090'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.stroke();

    // Belt — gold stripe across body centre
    ctx.fillStyle = '#c8a840';
    ctx.fillRect(bx - br * 0.9, by - 1.5, br * 1.8, 2.5);

    // Head — neutral skin tone
    ctx.fillStyle = '#c09060';
    ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI*2); ctx.fill();

    // Cap — dark dome over top half of head
    ctx.fillStyle = '#0f1e40';
    ctx.beginPath(); ctx.arc(hx, hy, hr * 1.22, Math.PI, 0); ctx.fill();
    // Cap brim — thin horizontal stripe at base of cap
    ctx.fillRect(hx - hr * 1.35, hy - 1, hr * 2.7, 2);

    // Intervention emoji — synlig når vakten faktisk står og griper inn
    if (g.target && g.interventionTimer > 0) {
      ctx.save();
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('👮', g.px, g.py - base*1.9);
      ctx.restore();
    }
  }
}

function renderTint() {
  const tint = PHASE_TINT[PHASES[GS.phaseIndex]];
  if (tint) {
    ctx.fillStyle = tint;
    ctx.fillRect(0, 0, W, H);
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  renderMap();
  renderLabels();
  renderInmates();
  renderGuards();
  renderTint();
}

function unrestReasons(inm) {
  const r = [];
  if (inm.hygiene  < 30) r.push('Dårlig hygiene');
  if (inm.energi   < 25) r.push('Utmattet');
  if (inm.disiplin < 25) r.push('Lav disiplin');
  const rival = inm.groupId && GS.inmates.some(o =>
    o.id !== inm.id && o.groupId && o.groupId !== inm.groupId &&
    Math.hypot(o.px - inm.px, o.py - inm.py) < TILE * 4);
  if (rival) r.push('Nær rival');
  if (inm.isBeingIntervened) r.push('Vakt griper inn');
  // Kvirk-spesifikke årsaker
  if (inm.kvirk === 'paranoid') {
    const near = GS.inmates.filter(o =>
      o.id !== inm.id && Math.hypot(o.px - inm.px, o.py - inm.py) < TILE * 3).length;
    if (near >= 3) r.push('Paranoia i folkemengde');
  }
  if (inm.kvirk === 'nervøs') {
    const guardNear = GS.guards.some(g =>
      Math.hypot(g.px - inm.px, g.py - inm.py) < TILE * 5);
    if (guardNear) r.push('Skremt av vakt');
  }
  if (inm.kvirk === 'fanatisk' && inm.idolId != null) {
    const idol = GS.inmates.find(x => x.id === inm.idolId);
    if (idol && idol.isolationTicks > 0) r.push('Idol borte');
  }
  if (inm.aktivitet === 'samling') r.push('I samling');
  return r.slice(0, 3);
}
let uiTimer = 0;

// ================================================================
// INNSATT-LISTE: in-place rendering + filter + throttlet sortering
// ================================================================
const listNodes = new Map();   // inmateId → {root, nameEl, cellEl, barFill, badgeEl}
let currentOrder = [];         // id-rekkefølgen som er i DOM nå
let lastSortTs   = 0;

function matchesFilter(inm, f) {
  switch (f) {
    case 'gA':    return inm.groupId === 'A';
    case 'gB':    return inm.groupId === 'B';
    case 'gC':    return inm.groupId === 'C';
    case 'gNone': return inm.groupId == null;
    default:      return true;
  }
}

function sortForFilter(ids /*, f */) {
  // Alltid sortert etter uro (synkende), stabil på id
  const byId = new Map(GS.inmates.map(i => [i.id, i]));
  return ids.slice().sort((a, b) => {
    const ia = byId.get(a), ib = byId.get(b);
    return (-ia.unrest) - (-ib.unrest) || a - b;
  });
}

function computeDesiredOrder() {
  const filtered = GS.inmates.filter(inm => matchesFilter(inm, GS.listFilter)).map(i => i.id);
  const sorted = sortForFilter(filtered, GS.listFilter);
  const sel = GS.selectedId;
  if (sel != null && !filtered.includes(sel) && GS.inmates.some(i => i.id === sel)) {
    return [sel, ...sorted];
  }
  return sorted;
}

function getOrCreateCard(inm) {
  let entry = listNodes.get(inm.id);
  if (entry) return entry;
  const root = document.createElement('div');
  root.className = 'ir';
  root.dataset.id = inm.id;
  root.innerHTML = `
    <div class="ir-top">
      <span class="ir-name"></span>
      <span class="ir-cell"></span>
    </div>
    <div class="ub"><div class="uf"></div></div>
    <div class="ir-badge" style="display:none"></div>`;
  entry = {
    root,
    nameEl:  root.querySelector('.ir-name'),
    cellEl:  root.querySelector('.ir-cell'),
    barFill: root.querySelector('.uf'),
    badgeEl: root.querySelector('.ir-badge'),
  };
  listNodes.set(inm.id, entry);
  return entry;
}

function updateCardContent(inm, isPinned) {
  const e = getOrCreateCard(inm);
  const u2 = Math.round(inm.unrest);
  const fc = u2>70?'#c83030':u2>40?'#b07828':'#308848';
  const cls = 'ir'
            + (inm.id === GS.selectedId ? ' sel' : '')
            + (isPinned ? ' pinned' : '');
  if (e.root.className !== cls) e.root.className = cls;
  const isLeader = GS._leaders && inm.groupId && GS._leaders[inm.groupId] === inm.id;
  const displayName = (isLeader ? '♛ ' : '') + inm.name;
  if (e.nameEl.textContent !== displayName) e.nameEl.textContent = displayName;
  if (e.cellEl.textContent !== inm.cellId) e.cellEl.textContent = inm.cellId;
  const w = u2 + '%';
  if (e.barFill.style.width !== w) e.barFill.style.width = w;
  if (e.barFill.style.background !== fc) e.barFill.style.background = fc;

  let bTxt = '', bCol = '';
  if (inm.isolationTicks > 0) {
    bTxt = `🔒 ISOLAT (${Math.ceil(inm.isolationTicks/1020*24)}t igjen)`;
    bCol = '#c83030';
  } else if (inm.conflictCooldown > 0) {
    bTxt = '💥 KONFLIKT';
    bCol = '#e07040';
  }
  if (bTxt) {
    if (e.badgeEl.textContent !== bTxt) e.badgeEl.textContent = bTxt;
    if (e.badgeEl.style.color !== bCol) e.badgeEl.style.color = bCol;
    if (e.badgeEl.style.display === 'none') e.badgeEl.style.display = '';
  } else if (e.badgeEl.style.display !== 'none') {
    e.badgeEl.style.display = 'none';
  }
}

function applyOrder(list, desired) {
  // Fjern noder som ikke er ønsket lenger
  for (const [id, entry] of listNodes) {
    if (!desired.includes(id) || !GS.inmates.some(i => i.id === id)) {
      entry.root.remove();
      listNodes.delete(id);
    }
  }
  // appendChild på eksisterende node flytter den — ingen rebuild
  const byId = new Map(GS.inmates.map(i => [i.id, i]));
  for (const id of desired) {
    const inm = byId.get(id);
    if (!inm) continue;
    const entry = getOrCreateCard(inm);
    list.appendChild(entry.root);
  }
  currentOrder = desired.slice();
}

function updateGangCounts() {
  const counts = { all: GS.inmates.length, gA: 0, gB: 0, gC: 0, gNone: 0 };
  for (const inm of GS.inmates) {
    if      (inm.groupId === 'A') counts.gA++;
    else if (inm.groupId === 'B') counts.gB++;
    else if (inm.groupId === 'C') counts.gC++;
    else                          counts.gNone++;
  }
  document.querySelectorAll('#gang-strip .gs').forEach(t => {
    const span = t.querySelector('.gs-count');
    const txt = `(${counts[t.dataset.f]})`;
    if (span.textContent !== txt) span.textContent = txt;
  });
}

function renderInmateList() {
  const list = document.getElementById('ilist');
  const desired = computeDesiredOrder();

  if (desired.length === 0) {
    // Tøm DOM og vis placeholder
    for (const [, entry] of listNodes) entry.root.remove();
    listNodes.clear();
    currentOrder = [];
    list.innerHTML = '<div class="ir-empty">Ingen i denne kategorien</div>';
    return;
  }

  // Hvis vi nettopp viste placeholder, tøm den
  const placeholder = list.querySelector('.ir-empty');
  if (placeholder) placeholder.remove();

  // Medlemskaps-endring eller selected-id endring → reorder umiddelbart.
  // Rangerings-endring innen samme sett → throttles til 2s.
  const sameSet = desired.length === currentOrder.length
    && desired.every(id => currentOrder.includes(id));
  const now = performance.now();
  const shouldReorder = !sameSet || (
    desired.some((id, i) => currentOrder[i] !== id) && now - lastSortTs > 2000
  );

  if (shouldReorder) {
    applyOrder(list, desired);
    lastSortTs = now;
  }

  // Oppdater innhold på alle synlige kort (både nye og gamle)
  const byId = new Map(GS.inmates.map(i => [i.id, i]));
  const filteredSet = new Set(
    GS.inmates.filter(inm => matchesFilter(inm, GS.listFilter)).map(i => i.id)
  );
  for (const id of currentOrder) {
    const inm = byId.get(id);
    if (!inm) continue;
    updateCardContent(inm, !filteredSet.has(id));
  }
}

function updateUI() {
  const phase = PHASES[GS.phaseIndex];
  document.getElementById('phase-display').textContent = phase;
  document.getElementById('day-display').textContent   = `Dag ${GS.day}`;
  document.querySelectorAll('.pb').forEach(b => b.classList.toggle('on', b.dataset.p === phase));

  const u = Math.round(GS.totalUnrest);
  const uEl = document.getElementById('s-unrest');
  uEl.textContent = u + '%';
  uEl.className = 'val ' + (u>70?'hi':u>40?'md':'lo');
  document.getElementById('s-count').textContent  = GS.inmates.length;
  document.getElementById('s-guards').textContent = GS.guards.length;
  document.getElementById('s-fights').textContent      = GS.stats.fights;
  document.getElementById('s-friendships').textContent = GS.stats.friendships;
  document.getElementById('s-isolation').textContent   = GS.stats.isolation;
  document.getElementById('s-counseling').textContent  = GS.stats.counseling;
  document.getElementById('s-library').textContent     = GS.stats.library;
  document.getElementById('s-disappeared').textContent = GS.stats.disappeared;

  // Gjengledere beregnes én gang per UI-tick; leses av liste og detail-panel
  GS._leaders = computeLeaders();

  // Inmate list — in-place render, filter og stabil sortering
  renderInmateList();
  updateGangCounts();

  // Detail panel
  const sel = GS.inmates.find(i => i.id===GS.selectedId);
  const dp  = document.getElementById('detail');
  if (sel) {
    const u3 = Math.round(sel.unrest);
    dp.innerHTML = `
      <h4>${sel.name} <span style="color:#556;font-size:0.65rem;font-weight:normal">${sel.cellId}</span><span id="detail-close" style="float:right;cursor:pointer;color:#667;font-size:0.9rem;padding:0 4px" title="Lukk (Esc)">×</span></h4>
      <div class="dr"><span class="dl">Uro</span><span class="dv">${u3}%</span></div>
      <div class="dr"><span class="dl">Helse</span><span class="dv">${Math.round(sel.health)}%</span></div>
      <div class="dr"><span class="dl">Styrke</span><span class="dv">${sel.strength >= 65 ? 'sterk' : sel.strength >= 50 ? 'middels' : 'svak'}</span></div>
      ${sel.inFight ? `<div class="dr"><span class="dl">Status</span><span class="dv" style="color:#e05040">I kamp</span></div>` : ''}
      ${(!sel.inFight && sel.postFightRoom) ? `<div class="dr"><span class="dl">Status</span><span class="dv" style="color:#c8b460">${sel.postFightRoom === 'isolation' ? 'På isolatet' : sel.postFightRoom === 'counseling' ? 'På samtale' : 'I biblioteket'}</span></div>` : ''}
      <div class="dr"><span class="dl">Soning</span><span class="dv">${sel.soningstidIgjen}/${sel.soningstidTotalt} dager</span></div>
      <div class="dr"><span class="dl">Isolat</span><span class="dv">${sel.isolatCount} ganger</span></div>
      <div class="dr"><span class="dl">Ry</span><span class="dv">${sel.ry}${GS._leaders && sel.groupId && GS._leaders[sel.groupId] === sel.id ? ' <span style="color:#c8b460">♛ Gjengleder</span>' : ''}</span></div>
      <div class="dr" style="margin-top:6px"><span class="dl">Personlighet</span></div>
      <div class="dr"><span class="dl">Temperament</span><span class="dv">${sel.temperament}</span></div>
      <div class="dr"><span class="dl">Sosial</span><span class="dv">${sel.sosial}</span></div>
      <div class="dr"><span class="dl">Stress</span><span class="dv">${sel.stressTolerance}</span></div>
      ${sel.kvirk && sel.kvirk !== 'none' ? `<div class="dr"><span class="dl">Kvirk</span><span class="dv" style="color:#c8b460">${sel.kvirk}</span></div>` : ''}
      <div class="dr"><span class="dl">Aktivitet</span><span class="dv">${sel.aktivitet || 'ingen'}</span></div>
      <div class="dr" style="margin-top:6px"><span class="dl">Relasjoner</span></div>
      <div class="dr"><span class="dl">Gjeng</span><span class="dv">${
        sel.groupId
          ? `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${GANG_COLOR[sel.groupId]};vertical-align:middle;margin-right:5px"></span>${sel.groupId}`
          : '<span style="color:#556">Ingen</span>'
      }</span></div>
      <div class="dr"><span class="dl">Venn</span><span class="dv">${
        (() => {
          if (sel.friendId == null) return '<span style="color:#556">Ingen</span>';
          const f = GS.inmates.find(x => x.id === sel.friendId);
          return f ? f.name : '<span style="color:#556">Ingen</span>';
        })()
      }</span></div>
      ${(() => {
        const rs = unrestReasons(sel);
        if (!rs.length) return '';
        return `<div class="dr" style="margin-top:6px"><span class="dl">Uro-årsak</span></div>` +
          rs.map(r => `<div class="dr"><span class="dv" style="color:#b06838">&#x2191; ${r}</span></div>`).join('');
      })()}
      ${sel.history && sel.history.length ? `
        <div class="dr" style="margin-top:6px"><span class="dl">Historikk</span></div>
        ${sel.history.map(h => `<div class="dr"><span class="dv" style="color:#8a9098;font-size:0.72rem">&bull; ${h}</span></div>`).join('')}
      ` : ''}`;
  } else {
    dp.innerHTML = '<span style="color:#2a3040;font-size:0.73rem">Klikk på innsatt for detaljer.</span>';
  }
}

// ================================================================
// CONTROLS
// ================================================================
document.querySelectorAll('.sb').forEach(btn => {
  btn.addEventListener('click', () => {
    GS.speed = parseInt(btn.dataset.s);
    document.querySelectorAll('.sb').forEach(b => b.classList.toggle('on', b===btn));
  });
});

document.querySelectorAll('.pb').forEach(btn => {
  btn.addEventListener('click', () => {
    const idx = PHASES.indexOf(btn.dataset.p);
    if (idx === -1) return;
    GS.phaseIndex = idx;
    GS.phaseTick  = 0;
    const newZone = PHASE_ZONE[PHASES[idx]];
    for (let i = 0; i < GS.inmates.length; i++) {
      const delay = i * 350 + Math.random() * 200;
      GS.inmates[i].setTargetZone(newZone, delay);
    }
  });
});

// Canvas — click to select inmate, mousemove to hover
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width  / rect.width;
  const sy = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top)  * sy;
  let closest = null, closestD = TILE;
  for (const inm of GS.inmates) {
    const d = Math.hypot(inm.px - mx, inm.py - my);
    if (d < closestD) { closest = inm; closestD = d; }
  }
  if (closest) GS.selectedId = closest.id === GS.selectedId ? null : closest.id;
});
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width  / rect.width;
  const sy = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top)  * sy;
  let closest = null, closestD = TILE * 1.2;
  for (const inm of GS.inmates) {
    const d = Math.hypot(inm.px - mx, inm.py - my);
    if (d < closestD) { closest = inm; closestD = d; }
  }
  GS.hoverId = closest ? closest.id : null;
  canvas.style.cursor = closest ? 'pointer' : 'default';
});
canvas.addEventListener('mouseleave', () => { GS.hoverId = null; canvas.style.cursor = 'default'; });

// Gjeng-strip — permanent delegation-lytter
document.getElementById('gang-strip').addEventListener('click', e => {
  const tab = e.target.closest('.gs');
  if (!tab) return;
  const f = tab.dataset.f;
  // Klikk på aktiv gjeng-knapp → tilbake til "alle". Klikk "alle" igjen → ingen effekt.
  const next = (f === GS.listFilter && f !== 'all') ? 'all' : f;
  if (next === GS.listFilter) return;
  GS.listFilter = next;
  document.querySelectorAll('#gang-strip .gs').forEach(t => {
    t.classList.toggle('on', t.dataset.f === next);
  });
  lastSortTs = 0;               // tving reorder umiddelbart
  updateUI();
});

// Delegert klikk på innsatt-liste — én permanent lytter som overlever
// rerender av listen (tidligere bug: per-kort lytter ble ødelagt mellom
// mousedown og mouseup av updateUI-løkken hver 180 ms).
document.getElementById('ilist').addEventListener('click', e => {
  const card = e.target.closest('.ir');
  if (!card) return;
  const id = Number(card.dataset.id);
  GS.selectedId = (GS.selectedId === id) ? null : id;
  updateUI();
});

// Lukk-knapp i detaljpanel
document.getElementById('detail').addEventListener('click', e => {
  if (e.target.id === 'detail-close') { GS.selectedId = null; updateUI(); }
});

// ESC → deselect
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { GS.selectedId = null; updateUI(); }
});

// ================================================================
// MAIN LOOP
// ================================================================
let lastTs = 0;

function loop(ts) {
  const dt = Math.min(ts - lastTs, 50);
  lastTs = ts;

  for (const inm of GS.inmates) inm.move(dt);
  for (const g   of GS.guards)   g.move(dt);

  tickTimer += dt;
  if (tickTimer >= TICK_MS) { tickTimer = 0; tick(); }

  render();

  uiTimer += dt;
  if (uiTimer >= 180) { uiTimer = 0; updateUI(); }

  requestAnimationFrame(loop);
}

// ================================================================
// SAVE / LOAD
// ================================================================
const SAVE_KEY = 'fengselsimulator_save';

function saveGame() {
  const data = {
    day: GS.day, phaseIndex: GS.phaseIndex, phaseTick: GS.phaseTick, speed: GS.speed,
    inmates: GS.inmates.map(inm => ({
      id: inm.id, name: inm.name, cellId: inm.cellId, cellSlot: inm.cellSlot,
      groupId: inm.groupId, kategori: inm.kategori, look: inm.look,
      px: inm.px, py: inm.py, zone: inm.zone, targetZone: inm.targetZone,
      unrest: inm.unrest, health: inm.health, energi: inm.energi,
      hygiene: inm.hygiene, disiplin: inm.disiplin, dominans: inm.dominans,
      soningstidTotalt: inm.soningstidTotalt, soningstidIgjen: inm.soningstidIgjen,
      cafState: inm.cafState, sleepState: inm.sleepState,
      isolationTicks: inm.isolationTicks, postFightRoom: inm.postFightRoom,
      isolatCount: inm.isolatCount,
      ry: inm.ry,
      history: inm.history.slice(0, HISTORY_MAX),
      friendId: inm.friendId, notifiedFriendInRoom: inm.notifiedFriendInRoom,
      libraryVisits: inm.libraryVisits,
    })),
    guards: GS.guards.map(g => ({ patrol: g.patrol, pi: g.pi })),
    stats: { ...GS.stats },
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  const data = JSON.parse(raw);
  GS.map = buildMap();
  GS.day = data.day; GS.phaseIndex = data.phaseIndex;
  GS.phaseTick = data.phaseTick; GS.speed = data.speed;
  GS.stats = Object.assign(defaultStats(), data.stats || {});
  GS.inmates = []; GS.guards = [];
  UID = 1;
  for (const d of data.inmates) {
    const inm = new Inmate(d.cellId);
    Object.assign(inm, d);
    if (!Array.isArray(inm.history)) inm.history = [];
    if (inm.friendId === undefined) inm.friendId = null;
    if (inm.notifiedFriendInRoom === undefined) inm.notifiedFriendInRoom = null;
    if (typeof inm.libraryVisits !== 'number') inm.libraryVisits = 0;
    if (typeof inm.ry !== 'number') inm.ry = 0;
    inm._wasInLibrary = inm.zone === 'library';
    inm.waypoints = [];
    inm.currentSpotId = null;
    inm.phaseDelay = 0; inm.pendingZone = null;
    GS.inmates.push(inm);
  }
  UID = Math.max(...GS.inmates.map(i => i.id)) + 1;
  for (const d of data.guards) GS.guards.push(new Guard(d.patrol, d.pi));
  const zone = PHASE_ZONE[PHASES[GS.phaseIndex]];
  for (const inm of GS.inmates) inm.setTargetZone(zone);
  return true;
}

// ================================================================
// MENU / INIT
// ================================================================
function checkSaveExists() {
  const has = !!localStorage.getItem(SAVE_KEY);
  document.getElementById('btn-continue').disabled = !has;
  document.getElementById('btn-load').disabled = !has;
}

function startGame(fromSave = false) {
  if (fromSave) {
    if (!loadGame()) { alert('Ingen lagret data funnet.'); return; }
  } else {
    GS.map = buildMap();
    GS.day = 1; GS.phaseIndex = 0; GS.phaseTick = 0;
    GS.stats = defaultStats();
    GS.inmates = []; GS.guards = [];
    spawn();
    const initZone = PHASE_ZONE[PHASES[GS.phaseIndex]];
    for (const inm of GS.inmates) inm.setTargetZone(initZone);
  }
  document.getElementById('menu').style.display = 'none';
  requestAnimationFrame(loop);
}

document.getElementById('btn-new').addEventListener('click', () => startGame(false));
document.getElementById('btn-continue').addEventListener('click', () => startGame(true));
document.getElementById('btn-load').addEventListener('click', () => startGame(true));
document.getElementById('btn-save').addEventListener('click', saveGame);
document.getElementById('btn-menu').addEventListener('click', () => {
  document.getElementById('menu').style.display = 'flex';
  checkSaveExists();
});

checkSaveExists();
</script>
