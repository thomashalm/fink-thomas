function renderShowerDebris() {
  // Akkumulert blod — mørkere, mer transparent
  if (GS.bloodSpots && GS.bloodSpots.length) {
    ctx.save();
    ctx.fillStyle = '#4a0a0a';
    ctx.globalAlpha = 0.45;
    for (const s of GS.bloodSpots) {
      ctx.beginPath();
      ctx.ellipse(s.px, s.py, s.r, s.r * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  // Lik — mørke solide silhuetter, offset fra blod så de ikke smelter sammen
  if (GS.corpses && GS.corpses.length) {
    for (const c of GS.corpses) {
      const ox = Math.cos(c.angle) * 5;
      const oy = Math.sin(c.angle) * 5;
      const s  = c.scale || 1;
      ctx.save();
      ctx.translate(c.px + ox, c.py + oy);
      ctx.rotate(c.angle);
      ctx.scale(s, s);
      // Base (kropp) — mørk nøytral ellipse
      ctx.globalAlpha = 0.88;
      ctx.fillStyle = '#1e1e24';
      ctx.beginPath();
      ctx.ellipse(0, 0, 9, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Overkropp/hode — litt lysere og mindre, forskjøvet mot "hodet"
      ctx.fillStyle = '#2e2e36';
      ctx.beginPath();
      ctx.ellipse(-4, 0, 4.5, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      // Svak outline for lesbarhet
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = '#0a0a0d';
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.ellipse(0, 0, 9, 4, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }
}

function renderInmates() {
  for (const inm of GS.inmates) {
    // Gjeng-highlight: dim innsatte som ikke matcher aktivt filter.
    // Valgt innsatt dimmes aldri — den må alltid være tydelig.
    const dimmed     = GS.listFilter !== 'all'
                    && inm.id !== GS.selectedId
                    && !matchesFilter(inm, GS.listFilter);
    const highlighted = GS.listFilter !== 'all'
                    && matchesFilter(inm, GS.listFilter);
    if (dimmed) { ctx.save(); ctx.globalAlpha = 0.18; }

    const { look } = inm;
    const base = TILE * 0.58 * look.sizeFactor;
    const br   = base * 0.56;   // body radius
    const hr   = base * 0.48;   // head radius
    // Push-offset etter tap (fades i tick)
    const px = inm.px + inm.fightPushX;
    const py = inm.py + inm.fightPushY;
    // Lunge-offset — kun fighters "jabber" mot motstander
    let lungeX = 0, lungeY = 0;
    if (inm.inFight) {
      const oppL = GS.inmates.find(x => x.id === inm.fightOpponent);
      if (oppL) {
        const ldx = oppL.px - inm.px, ldy = oppL.py - inm.py;
        const ld  = Math.hypot(ldx, ldy) || 1;
        const phase = Math.sin(Date.now() * 0.014 + inm.id * 1.7);
        const amp = Math.max(0, phase) * 3.5;
        lungeX = (ldx/ld) * amp;
        lungeY = (ldy/ld) * amp;
      }
    }
    const bx   = px + lungeX, by = py + lungeY + base * 0.18;   // body centre
    const hx   = px + lungeX, hy = py + lungeY - base * 0.44;   // head centre
    const gangColor = GANG_COLOR[inm.groupId] || '#888';
    const inGang = inm.groupId != null;

    // Blodpøl under taper — tegnes først, ligger på gulvet under alt
    if (inm.bloodPoolMs > 0) {
      const bt = Math.min(1, inm.bloodPoolMs / 3500);
      ctx.save();
      ctx.globalAlpha = 0.55 * bt;
      ctx.fillStyle = '#8a1818';
      ctx.beginPath();
      ctx.ellipse(px, py + base * 0.6, base * 0.85, base * 0.35, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    drawShadow(px, py, base * 0.55 + 2);

    // Liggende figur: roter 90° rundt senter, bevar klær/hud/hår. Hopper over
    // dangerous-aura, status-emojis, fight-ring og søvn/mat-indikatorer.
    if (inm.downedMs > 0) {
      // Hover ring
      if (inm.id === GS.hoverId && inm.id !== GS.selectedId) {
        ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(px, py, base + 3, 0, Math.PI*2); ctx.stroke();
      }
      // Selection ring
      if (inm.id === GS.selectedId) {
        ctx.strokeStyle = '#d8c058'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(px, py, base + 4, 0, Math.PI*2); ctx.stroke();
      }

      const bx = px, by = py + base * 0.18;
      const hx = px, hy = py - base * 0.44;

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(Math.PI / 2);
      ctx.translate(-px, -py);

      // Body
      ctx.fillStyle = look.clothColor;
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.stroke();

      // Head
      ctx.fillStyle = look.skinTone;
      ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI*2); ctx.stroke();

      // Hair
      if (look.hairStyle > 0) {
        ctx.fillStyle = look.hairColor;
        const capR = look.hairStyle === 2 ? hr * 1.18 : hr;
        ctx.beginPath(); ctx.arc(hx, hy, capR, Math.PI, 0); ctx.fill();
      }

      // Beard (any style viser som solid semicircle i downed-mode)
      if (look.beardStyle && look.beardStyle !== 'none') {
        ctx.fillStyle = _darken(look.hairColor, 0.15);
        ctx.beginPath(); ctx.arc(hx, hy + hr * 0.52, hr * 0.52, 0, Math.PI); ctx.fill();
      }

      ctx.restore();

      if (dimmed) ctx.restore();
      continue;
    }

    // Dangerous-aura: subtil rød puls for høy respekt / nylig vold / impulsive med uro.
    // Undertrykkes under aktiv kamp slik at kampmarkøren har visuell prioritet.
    if (!inm.inFight) {
      const dangerous = inm.respekt > 70
                     || inm.conflictCooldown > 0
                     || (inm.temperament === 'impulsiv' && inm.unrest > 50);
      if (dangerous) {
        ctx.save();
        const pulse = 0.10 + 0.05 * Math.sin(Date.now() * 0.004 + inm.id);
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#c03028';
        ctx.beginPath(); ctx.arc(px, py, base + 5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    // Highlight-ring for matchende innsatte når et gjeng-filter er aktivt.
    // Tegnes først, havner bak alt annet. Bruker gjeng-farge (eller nøytralt grå for "Ingen").
    if (highlighted) {
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = gangColor;
      ctx.beginPath(); ctx.arc(px, py, base + 6, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.85;
      ctx.strokeStyle = gangColor;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(px, py, base + 6, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // Hover ring
    if (inm.id === GS.hoverId && inm.id !== GS.selectedId) {
      ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(px, py, base + 3, 0, Math.PI*2); ctx.stroke();
    }

    // Selection ring
    if (inm.id === GS.selectedId) {
      ctx.strokeStyle = '#d8c058'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px, py, base + 4, 0, Math.PI*2); ctx.stroke();
    }

    renderInmateDetailed(inm, px + lungeX, py + lungeY, base, deriveFacing(inm));

    // Shower effect — animated water droplets above head
    if (inm.zone === 'shower' && GS.mode !== 'lastManStandingShower') {
      ctx.save();
      ctx.fillStyle = '#80c8f8';
      ctx.globalAlpha = 0.55 + Math.sin(Date.now()*0.003 + inm.id) * 0.20;
      for (let i = -1; i <= 1; i++) {
        const dy = ((Date.now()*0.0015 + inm.id*0.5 + i*0.5) % 1) * hr*2;
        ctx.beginPath(); ctx.arc(hx + i*hr*0.7, hy - hr*1.1 - dy, 1, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    // Status-emoji over hodet — rom-opphold > kamp > konflikt-flash > høy uro
    if (inm.isolationTicks > 0) {
      const icon = inm.postFightRoom === 'counseling' ? '💬'
                 : inm.postFightRoom === 'library'    ? '📖'
                 : '🔒';
      ctx.save();
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(icon, px, py - base*1.9);
      ctx.restore();
    } else if (inm.inFight) {
      // Kamp-markør: pulserende ⚔️ + rød ring rundt innsatt
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.03);
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.font = '18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚔️', px, py - base*1.9);
      ctx.strokeStyle = `rgba(255,60,40,${0.4 + 0.5 * pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(px, py, base * 1.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      // Lokal impact-burst mellom de to fighterne — tegnes kun én gang per par
      const opp = GS.inmates.find(x => x.id === inm.fightOpponent);
      if (opp && inm.id < opp.id) {
        const mx = (inm.px + opp.px) / 2;
        const my = (inm.py + opp.py) / 2;
        const beat = (Date.now() % 300) / 300;
        if (beat < 0.40) {
          const bt = 1 - (beat / 0.40);
          ctx.save();
          ctx.globalAlpha = 0.55 * bt;
          ctx.fillStyle = '#e04028';
          ctx.beginPath(); ctx.arc(mx, my, 10 + 6 * (1 - bt), 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = 0.85 * bt;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath(); ctx.arc(mx, my, 3 + 2 * (1 - bt), 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }
      }
    } else if (inm.conflictFlashMs > 0) {
      const t = inm.conflictFlashMs / 1800;                      // 1..0 fade
      const pulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.02);
      ctx.save();
      ctx.globalAlpha = t * pulse;
      ctx.font = '16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💥', px, py - base*1.9);
      ctx.restore();
    } else if (inm.unrest > 70) {
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('😰', px, py - base*1.9);
      ctx.restore();
    } else if (inm._chatMs > 0) {
      // Småprat-boble (v0.9.32): lav prioritet, fades ut, ingen stats-effekt
      const t = inm._chatMs / 1800;
      ctx.save();
      ctx.globalAlpha = 0.85 * t;
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💬', px, py - base*1.9);
      ctx.restore();
    }

    // Sleep indicator — visible only when actually lying in bed
    if (inm.sleepState === 'in_bed') {
      const floatY = Math.sin(Date.now() * 0.0015 + inm.id) * 2;
      ctx.save();
      ctx.globalAlpha = 0.55 + Math.sin(Date.now() * 0.002 + inm.id * 1.3) * 0.20;
      ctx.fillStyle = '#b8d4f0';
      ctx.font = `bold ${TILE*0.55|0}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('z', hx + base*0.5, hy - hr - base*0.7 + floatY);
      ctx.restore();
    }

    if (dimmed) ctx.restore();
  }
}

function renderGuards() {
  for (const g of GS.guards) {
    // Target ring — pulsing orange circle around targeted inmate
    if (g.target) {
      const pulse = 0.35 + Math.sin(Date.now() * 0.007) * 0.25;
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.strokeStyle = '#e06828';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(g.target.px, g.target.py, TILE * 0.58, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    const base   = TILE * 0.70;
    const br     = base * 0.46;    // smalere kropp (var 0.58)
    const hr     = base * 0.44;    // smalere hode (var 0.40)
    const px     = g.px, py = g.py;
    const facing = g.facing || 0;

    drawShadow(g.px, g.py, base * 0.55);

    const now    = Date.now();
    const moving = !!g._isMoving;
    const verticality = moving ? Math.abs(Math.sin(facing)) : 1;
    const animScale   = 0.4 + 0.6 * verticality;
    const seed   = g._seed || 0;
    const phase  = (g._walkPhase || 0) * 0.18;
    const breath = 1 + 0.020 * Math.sin(now * 0.002 + seed);
    const bob    = moving ? Math.sin(phase) * 0.45 * animScale : 0;
    const lean   = moving
      ? Math.sin(facing - Math.PI/2) * 0.035 * animScale
      : Math.sin(now * 0.0009 + seed) * 0.006;

    const pivotY = py + base * 0.85;
    ctx.save();
    ctx.translate(px, pivotY);
    ctx.rotate(lean);
    ctx.scale(breath, breath);
    ctx.translate(-px, -pivotY);

    const bx = px,        by = py + base * 0.18 + bob;
    const hx = px,        hy = py - base * 0.44 + bob;

    const fwd   = facing - Math.PI/2;
    const faceX = Math.sin(fwd);

    const uniformColor = '#1e3a6e';
    const pantsColor   = '#0e1a30';

    // ========== BEIN ==========
    const walkPhase = moving ? Math.sin(phase) : 0;
    const legBaseY  = py + base * 0.78;
    const lLift = moving ? Math.max(0, walkPhase) * 0.65 * animScale : 0;
    const rLift = moving ? Math.max(0, -walkPhase) * 0.65 * animScale : 0;
    ctx.save();
    ctx.fillStyle = pantsColor;
    ctx.beginPath();
    ctx.ellipse(px - br * 0.42, legBaseY - lLift, br * 0.33, br * 0.60, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(px + br * 0.42, legBaseY - rLift, br * 0.33, br * 0.60, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.ellipse(px - br * 0.42, legBaseY - lLift, br * 0.33, br * 0.60, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(px + br * 0.42, legBaseY - rLift, br * 0.33, br * 0.60, 0, 0, Math.PI*2); ctx.stroke();
    ctx.restore();

    // ========== SKO ==========
    const shoeW = br * 0.38;
    const shoeH = br * 0.22;
    const shoeY = legBaseY + br * 0.50;
    ctx.save();
    ctx.fillStyle = '#141414';
    ctx.beginPath(); ctx.ellipse(px - br * 0.42, shoeY - lLift, shoeW, shoeH, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(px + br * 0.42, shoeY - rLift, shoeW, shoeH, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.ellipse(px - br * 0.42, shoeY - lLift, shoeW, shoeH, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(px + br * 0.42, shoeY - rLift, shoeW, shoeH, 0, 0, Math.PI*2); ctx.stroke();
    ctx.restore();

    // ========== BAKRE ARM ==========
    const armSway = moving ? Math.sin(phase + Math.PI) * 0.8 * animScale : 0;
    const armY    = by + br * 0.05;
    const armLen  = br * 0.55;
    const armWid  = br * 0.30;
    const backArmX = bx + faceX * br * 1.05 * -1;
    const backArmY = armY - armSway;
    ctx.save();
    ctx.fillStyle = _darken(uniformColor, 0.12);
    ctx.beginPath();
    ctx.ellipse(backArmX, backArmY, armWid, armLen, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.restore();

    // ========== TORSO ==========
    const torsoGrad = ctx.createRadialGradient(
      bx - br * 0.25, by - br * 0.5, 0,
      bx,             by,              br * 1.15
    );
    torsoGrad.addColorStop(0,   _lighten(uniformColor, 0.18));
    torsoGrad.addColorStop(0.6, uniformColor);
    torsoGrad.addColorStop(1,   _darken(uniformColor, 0.25));
    ctx.fillStyle = torsoGrad;
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
    // Skulder-stripe (mørkere navy)
    ctx.save();
    ctx.fillStyle = '#14264a';
    ctx.fillRect(bx - br * 0.95, by - br * 0.65, br * 1.9, br * 0.32);
    ctx.restore();
    // Rim-light
    ctx.save();
    ctx.strokeStyle = 'rgba(255,245,220,0.30)'; ctx.lineWidth = 1.0;
    ctx.beginPath(); ctx.arc(bx, by, br - 0.3, Math.PI * 1.05, Math.PI * 1.35); ctx.stroke();
    ctx.restore();
    // Outline
    ctx.strokeStyle = '#050a18'; ctx.lineWidth = 1.0;
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.stroke();

    // ========== KNAPPER (vertikal rad opp torso) ==========
    ctx.fillStyle = '#e8c850';
    const btnR = Math.max(0.9, br * 0.14);
    for (let k = 0; k < 3; k++) {
      const btnY = by - br * 0.50 + k * br * 0.35;
      ctx.beginPath(); ctx.arc(bx, btnY, btnR, 0, Math.PI*2); ctx.fill();
    }

    // ========== BELTE + SKILT ==========
    ctx.fillStyle = '#c8a840';
    ctx.fillRect(bx - br * 0.92, by + br * 0.55 - 1.3, br * 1.84, Math.max(2.2, br * 0.24));
    ctx.fillStyle = '#e8c850';
    ctx.beginPath(); ctx.arc(bx + br * 0.35, by + br * 0.55, Math.max(1.6, br * 0.18), 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.beginPath(); ctx.arc(bx + br * 0.35 - 0.5, by + br * 0.55 - 0.5, Math.max(0.6, br * 0.07), 0, Math.PI*2); ctx.fill();

    // ========== FREMRE ARM ==========
    const frontArmX = bx + faceX * br * 1.05;
    const frontArmY = armY + armSway;
    ctx.save();
    ctx.fillStyle = uniformColor;
    ctx.beginPath();
    ctx.ellipse(frontArmX, frontArmY, armWid, armLen, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.restore();

    // ========== NAKKE ==========
    ctx.save();
    ctx.fillStyle = _darken('#c09060', 0.25);
    ctx.fillRect(hx - 1.2, hy + hr * 0.55, 2.4, base * 0.20);
    ctx.restore();

    // ========== HODE ==========
    const skinTone = '#c09060';
    const headGrad = ctx.createRadialGradient(
      hx - hr * 0.3, hy - hr * 0.5, 0,
      hx,            hy,             hr * 1.15
    );
    headGrad.addColorStop(0,   _lighten(skinTone, 0.15));
    headGrad.addColorStop(0.6, skinTone);
    headGrad.addColorStop(1,   _darken(skinTone, 0.22));
    ctx.fillStyle = headGrad;
    ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 0.9;
    ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI*2); ctx.stroke();

    // ========== CAP ==========
    ctx.fillStyle = '#0e1a30';
    ctx.beginPath(); ctx.arc(hx, hy, hr * 1.25, Math.PI, 0); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.70)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(hx, hy, hr * 1.25, Math.PI, 0); ctx.stroke();
    // Brim
    ctx.fillStyle = '#000000';
    ctx.fillRect(hx - hr * 1.35, hy - 1, hr * 2.7, 2);

    ctx.restore(); // end breath/lean transform

    // Intervention emoji — synlig når vakten faktisk står og griper inn
    if (g.target && g.interventionTimer > 0) {
      ctx.save();
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('👮', g.px, g.py - base*1.9);
      ctx.restore();
    }
  }
}

function renderDecor() {
  const T = TILE;
  const phase = PHASES[GS.phaseIndex];
  for (const d of STATIC_DECOR) {
    if (d.activeWhenPhase && !d.activeWhenPhase.includes(phase)) continue;
    switch (d.type) {
      case 'bookshelf': {
        // Anchor (x, y) = top-left of tile. Hyllen lener seg mot nordveggen.
        const w = T - 4, h = T * 0.55;
        const bx = d.x + 2, by = d.y + 1;
        // Kabinettramme
        ctx.fillStyle = '#3a2410';
        ctx.fillRect(bx, by, w, h);
        ctx.strokeStyle = '#5a3820'; ctx.lineWidth = 1;
        ctx.strokeRect(bx + 0.5, by + 0.5, w - 1, h - 1);
        // To hyller
        const shelfY1 = by + h * 0.33, shelfY2 = by + h * 0.66;
        ctx.fillStyle = '#2a1808';
        ctx.fillRect(bx + 1, shelfY1 - 0.5, w - 2, 1);
        ctx.fillRect(bx + 1, shelfY2 - 0.5, w - 2, 1);
        // Bok-striper på hver hylle (4 per hylle)
        const bookColors = ['#c8a040', '#a02828', '#3a6a3a', '#3050a0', '#883080'];
        const bookW = (w - 4) / 4;
        const seed = (d.x + d.y) | 0;
        for (let row = 0; row < 3; row++) {
          const y0 = by + 2 + row * (h * 0.33);
          const y1 = y0 + h * 0.30;
          for (let i = 0; i < 4; i++) {
            const cIdx = (seed + row * 7 + i * 3) % bookColors.length;
            ctx.fillStyle = bookColors[cIdx];
            ctx.fillRect(bx + 2 + i * bookW, y0, bookW - 1, y1 - y0);
          }
        }
        break;
      }
      case 'workbench': {
        // Anchor (x, y) = top-left. Width via d.w (typisk 2*T). Lener seg mot nordveggen.
        const w = d.w, h = T * 0.48;
        const bx = d.x + 2, by = d.y + 2;
        // Skygge under benken
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.fillRect(bx + 2, by + h - 1, w - 8, 2);
        // Ramme (mørk grå metall)
        ctx.fillStyle = '#2e3238';
        ctx.fillRect(bx, by, w - 4, h);
        ctx.strokeStyle = '#1a1c20'; ctx.lineWidth = 0.8;
        ctx.strokeRect(bx + 0.5, by + 0.5, w - 5, h - 1);
        // Benkeplate (mørk tre)
        ctx.fillStyle = '#4a3822';
        ctx.fillRect(bx, by, w - 4, h * 0.35);
        // Refleks på topplaten
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(bx + 1, by + 1, w - 6, 1);
        // Verktøy-silhouetter (små prikker i kontrastfarge)
        const seed2 = ((d.x + d.y) | 0);
        const toolColors = ['#c8b460', '#a04820', '#708080'];
        for (let i = 0; i < 3; i++) {
          ctx.fillStyle = toolColors[(seed2 + i) % 3];
          ctx.fillRect(bx + 3 + i * 6, by + h * 0.55, 2, h * 0.30);
        }
        break;
      }
      case 'sofa': {
        // Anchor (x, y) = top-left. Width via d.w.
        const w = d.w, h = T * 0.45;
        // Skygge
        ctx.fillStyle = 'rgba(0,0,0,0.20)';
        ctx.fillRect(d.x + 2, d.y + h - 1, w - 4, 3);
        // Sofa-base (mørk turkis)
        ctx.fillStyle = '#3a5258';
        ctx.fillRect(d.x, d.y, w, h);
        ctx.strokeStyle = '#2a3e44'; ctx.lineWidth = 1;
        ctx.strokeRect(d.x + 0.5, d.y + 0.5, w - 1, h - 1);
        // Rygg (øvre 1/3, lysere)
        ctx.fillStyle = '#4a6268';
        ctx.fillRect(d.x + 1, d.y + 1, w - 2, h * 0.32);
        // Pute-skille (delelinje midt på sete)
        ctx.strokeStyle = '#2a3e44'; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(d.x + w/2, d.y + h * 0.4); ctx.lineTo(d.x + w/2, d.y + h - 2); ctx.stroke();
        // Armlener
        ctx.fillStyle = '#2e424a';
        ctx.fillRect(d.x, d.y + h * 0.2, 3, h * 0.8);
        ctx.fillRect(d.x + w - 3, d.y + h * 0.2, 3, h * 0.8);
        break;
      }
      case 'armchair': {
        const w = T * 0.7, h = T * 0.55;
        ctx.fillStyle = 'rgba(0,0,0,0.20)';
        ctx.fillRect(d.x + 2, d.y + h - 1, w - 4, 2.5);
        ctx.fillStyle = '#3a5258';
        ctx.fillRect(d.x, d.y, w, h);
        ctx.strokeStyle = '#2a3e44'; ctx.lineWidth = 1;
        ctx.strokeRect(d.x + 0.5, d.y + 0.5, w - 1, h - 1);
        ctx.fillStyle = '#4a6268';
        ctx.fillRect(d.x + 1, d.y + 1, w - 2, h * 0.35);
        ctx.fillStyle = '#2e424a';
        ctx.fillRect(d.x, d.y + h * 0.25, 2.5, h * 0.75);
        ctx.fillRect(d.x + w - 2.5, d.y + h * 0.25, 2.5, h * 0.75);
        break;
      }
      case 'lowtable': {
        const w = T * 0.55, h = T * 0.30;
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(d.x + 1, d.y + h - 1, w - 2, 2);
        ctx.fillStyle = '#4a3220';
        ctx.fillRect(d.x, d.y, w, h);
        ctx.strokeStyle = '#2a1d10'; ctx.lineWidth = 0.8;
        ctx.strokeRect(d.x + 0.5, d.y + 0.5, w - 1, h - 1);
        // Refleks-glimt
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fillRect(d.x + 1, d.y + 1, w - 2, 1.5);
        break;
      }
      case 'counter': {
        const w = d.w, h = T * 0.32;
        // Skygge under
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(d.x + 2, d.y + h, w - 4, 2);
        // Disk-base (mørk)
        ctx.fillStyle = '#2a2e34';
        ctx.fillRect(d.x, d.y + 3, w, h - 3);
        // Sølvgrå topp
        ctx.fillStyle = '#a8b0b8';
        ctx.fillRect(d.x, d.y, w, 4);
        // Front-linje
        ctx.strokeStyle = '#1a1d20'; ctx.lineWidth = 0.6;
        ctx.beginPath(); ctx.moveTo(d.x, d.y + 4); ctx.lineTo(d.x + w, d.y + 4); ctx.stroke();
        // Refleks
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.fillRect(d.x + 1, d.y + 1, w - 2, 1);
        break;
      }
      case 'lamp': {
        // Deterministisk variasjon per lampe (stabil, ingen flimring).
        const _s = Math.sin(d.x * 12.9898 + d.y * 78.233) * 43758.5453;
        const _r = _s - Math.floor(_s);
        const _sz = 0.85 + _r * 0.30;
        const _a  = (0.82 + ((_r * 7) % 1) * 0.25) * 0.88;
        const _R = T * 0.85 * _sz;
        const grad = ctx.createRadialGradient(d.x, d.y, 1, d.x, d.y, _R);
        grad.addColorStop(0, `rgba(255, 230, 150, ${0.18 * _a})`);
        grad.addColorStop(0.6, `rgba(255, 220, 130, ${0.06 * _a})`);
        grad.addColorStop(1, 'rgba(255, 220, 130, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(d.x, d.y, _R, 0, Math.PI*2); ctx.fill();
        // Lyspære-kjerne
        ctx.fillStyle = '#fff2b8';
        ctx.beginPath(); ctx.arc(d.x, d.y, 2.2, 0, Math.PI*2); ctx.fill();
        // Liten skygge-ring (lampe-fatning)
        ctx.strokeStyle = 'rgba(40,30,10,0.4)'; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.arc(d.x, d.y, 3, 0, Math.PI*2); ctx.stroke();
        break;
      }
      case 'window': {
        const w = T * 0.72, h = T * 0.60;
        const wx = d.x + (T - w) / 2;
        const wy = d.y + (T - h) / 2;
        // Karm (lysere stripe under)
        ctx.fillStyle = '#7a6a58';
        ctx.fillRect(wx - 2, wy + h - 1, w + 4, 3);
        // Ramme (mørk)
        ctx.fillStyle = '#1a1410';
        ctx.fillRect(wx - 1, wy - 1, w + 2, h + 2);
        // Glass (vertikal gradient)
        const gg = ctx.createLinearGradient(wx, wy, wx, wy + h);
        gg.addColorStop(0, '#6a8aa8');
        gg.addColorStop(1, '#2e4664');
        ctx.fillStyle = gg;
        ctx.fillRect(wx, wy, w, h);
        // Sprosser (kors)
        ctx.strokeStyle = '#1a1410'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(wx + w/2, wy); ctx.lineTo(wx + w/2, wy + h);
        ctx.moveTo(wx, wy + h/2); ctx.lineTo(wx + w, wy + h/2);
        ctx.stroke();
        // Refleks-stripe
        ctx.fillStyle = 'rgba(220,235,250,0.28)';
        ctx.fillRect(wx + 2, wy + 2, 2.5, h - 5);
        break;
      }
      case 'isoBunk': {
        const w = T - 4, h = T * 0.55;
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.fillRect(d.x + 3, d.y + h + 1, w - 2, 2);
        // Betong-ramme
        ctx.fillStyle = '#404448';
        ctx.fillRect(d.x + 2, d.y + 2, w, h);
        // Madrass
        ctx.fillStyle = '#2c3848';
        ctx.fillRect(d.x + 3, d.y + 3, w - 2, h - 4);
        ctx.strokeStyle = '#1c2430'; ctx.lineWidth = 0.8;
        ctx.strokeRect(d.x + 3, d.y + 3, w - 2, h - 4);
        // Pute
        ctx.fillStyle = '#5a6070';
        ctx.fillRect(d.x + 4, d.y + 4, 6, h - 6);
        break;
      }
      case 'isoStool': {
        const r = T * 0.20;
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.beginPath();
        ctx.ellipse(d.x, d.y + r * 0.5, r, r * 0.35, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#585858';
        ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.14)';
        ctx.beginPath(); ctx.arc(d.x - r * 0.25, d.y - r * 0.3, r * 0.4, 0, Math.PI*2); ctx.fill();
        break;
      }
      case 'isoDrain': {
        const r = T * 0.26;
        ctx.fillStyle = '#181818';
        ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI*2); ctx.stroke();
        ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 0.7;
        ctx.beginPath();
        for (let i = -2; i <= 2; i++) {
          ctx.moveTo(d.x - r * 0.75, d.y + i * r * 0.3);
          ctx.lineTo(d.x + r * 0.75, d.y + i * r * 0.3);
        }
        ctx.stroke();
        break;
      }
      case 'weightRack': {
        const w = T * 0.9, h = T * 0.48;
        const bx = d.x + (T - w) / 2, by = d.y + 3;
        ctx.fillStyle = 'rgba(0,0,0,0.30)';
        ctx.fillRect(bx, by + h, w, 2);
        // Stativ-bein
        ctx.fillStyle = '#2c2c2c';
        ctx.fillRect(bx, by, 2.5, h);
        ctx.fillRect(bx + w - 2.5, by, 2.5, h);
        // Stang (tydeligere, svart med refleks)
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(bx - 3, by + 3, w + 6, 2.5);
        ctx.fillStyle = 'rgba(220,220,230,0.35)';
        ctx.fillRect(bx - 3, by + 3, w + 6, 0.6);
        // Skiver — to store pr side
        const plate = (cx, cy) => {
          ctx.fillStyle = '#141414';
          ctx.fillRect(cx - 1.2, cy - 4, 2.4, 8);
          ctx.fillStyle = '#a82020';
          ctx.fillRect(cx - 0.9, cy - 3.2, 1.8, 6.4);
        };
        plate(bx - 4.5, by + 4);
        plate(bx - 2,   by + 4);
        plate(bx + w + 2, by + 4);
        plate(bx + w + 4.5, by + 4);
        // Nedre hvile-stang
        ctx.fillStyle = '#404040';
        ctx.fillRect(bx - 1, by + h - 3, w + 2, 2);
        break;
      }
      case 'gymBench': {
        const w = T * 0.8, h = T * 0.32;
        const bx = d.x + (T - w) / 2, by = d.y + (T - h) / 2;
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.fillRect(bx + 1, by + h, w - 2, 2);
        // Ramme
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(bx, by, w, h);
        // Polstring
        ctx.fillStyle = '#8a2a28';
        ctx.fillRect(bx + 1, by + 1, w - 2, h - 3);
        // Refleks
        ctx.fillStyle = 'rgba(255,255,255,0.10)';
        ctx.fillRect(bx + 1, by + 1, w - 2, 1);
        // Bein
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(bx + 2, by + h - 2, 2, 3);
        ctx.fillRect(bx + w - 4, by + h - 2, 2, 3);
        // Parkert stang over benken (bench press-hint)
        const barY = by - 2;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(bx - 2, barY, w + 4, 1.6);
        ctx.fillStyle = '#141414';
        ctx.fillRect(bx - 3, barY - 1.5, 2, 4.5);
        ctx.fillRect(bx + w + 1, barY - 1.5, 2, 4.5);
        break;
      }
      case 'mirror': {
        const w = T * 0.85, h = T * 0.28;
        const bx = d.x + (T - w) / 2, by = d.y + 2;
        // Ramme
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(bx - 1, by - 1, w + 2, h + 2);
        // Speil (vertikal gradient)
        const mg = ctx.createLinearGradient(bx, by, bx, by + h);
        mg.addColorStop(0, '#a0b0c0');
        mg.addColorStop(0.5, '#6880a0');
        mg.addColorStop(1, '#4a5a78');
        ctx.fillStyle = mg;
        ctx.fillRect(bx, by, w, h);
        // Refleks-stripe (diagonal)
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.fillRect(bx + w * 0.28, by + 1, w * 0.08, h - 2);
        ctx.fillRect(bx + w * 0.70, by + 1, w * 0.05, h - 2);
        break;
      }
      case 'dumbbellRack': {
        const w = T * 0.85, h = T * 0.50;
        const bx = d.x + (T - w) / 2, by = d.y + (T - h) / 2;
        // Stativ (to horisontale hyller)
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(bx, by, w, 1.5);
        ctx.fillRect(bx, by + h*0.55, w, 1.5);
        // Stativ-bein
        ctx.fillRect(bx, by, 1.5, h);
        ctx.fillRect(bx + w - 1.5, by, 1.5, h);
        // Hankler (par på hver hylle)
        const dumbbell = (cx, cy) => {
          ctx.fillStyle = '#141414';
          ctx.fillRect(cx - 2.5, cy - 1.2, 1.6, 2.4);
          ctx.fillRect(cx + 0.9, cy - 1.2, 1.6, 2.4);
          ctx.fillStyle = '#3a3a3a';
          ctx.fillRect(cx - 0.9, cy - 0.6, 1.8, 1.2);
        };
        dumbbell(bx + w*0.28, by - 1);
        dumbbell(bx + w*0.72, by - 1);
        dumbbell(bx + w*0.28, by + h*0.55 - 1);
        dumbbell(bx + w*0.72, by + h*0.55 - 1);
        break;
      }
      case 'showerBench': {
        const w = T * 0.85, h = T * 0.20;
        const bx = d.x + (T - w) / 2, by = d.y + (T - h) / 2;
        // Skygge
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.fillRect(bx + 1, by + h, w - 2, 1.5);
        // Benk-topp (lys plast/plank)
        ctx.fillStyle = '#6e7a86';
        ctx.fillRect(bx, by, w, h);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(bx, by, w, 1);
        // Bein
        ctx.fillStyle = '#2e3642';
        ctx.fillRect(bx + 2, by + h, 1.5, 2.5);
        ctx.fillRect(bx + w - 3.5, by + h, 1.5, 2.5);
        break;
      }
      case 'showerDrain': {
        // Dropshadow
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.beginPath(); ctx.arc(d.x, d.y + 0.8, 7, 0, Math.PI*2); ctx.fill();
        // Metallisk ytterring
        const rg = ctx.createRadialGradient(d.x - 1.5, d.y - 1.5, 0, d.x, d.y, 6.5);
        rg.addColorStop(0,   '#5a6a78');
        rg.addColorStop(0.5, '#3a4a58');
        rg.addColorStop(1,   '#1a2028');
        ctx.fillStyle = rg;
        ctx.beginPath(); ctx.arc(d.x, d.y, 6.5, 0, Math.PI*2); ctx.fill();
        // Mørk kjerne
        ctx.fillStyle = '#080c10';
        ctx.beginPath(); ctx.arc(d.x, d.y, 4.5, 0, Math.PI*2); ctx.fill();
        // Pluss-rutenett
        ctx.strokeStyle = 'rgba(140,165,190,0.55)'; ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(d.x - 4, d.y); ctx.lineTo(d.x + 4, d.y);
        ctx.moveTo(d.x, d.y - 4); ctx.lineTo(d.x, d.y + 4);
        ctx.stroke();
        // Våt glint
        ctx.fillStyle = 'rgba(180,210,240,0.30)';
        ctx.beginPath(); ctx.arc(d.x - 2, d.y - 2, 1, 0, Math.PI*2); ctx.fill();
        break;
      }
      case 'tray': {
        const w = T * 0.55, h = T * 0.38;
        const bx = d.x + (T - w) / 2, by = d.y + (T - h) / 2;
        // Brett
        ctx.fillStyle = '#887868';
        ctx.fillRect(bx, by, w, h);
        ctx.strokeStyle = '#4a3e34'; ctx.lineWidth = 0.7;
        ctx.strokeRect(bx + 0.5, by + 0.5, w - 1, h - 1);
        // Mat
        ctx.fillStyle = '#5a3820';
        ctx.beginPath(); ctx.arc(bx + w * 0.34, by + h * 0.55, Math.min(w, h) * 0.22, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#a8703a';
        ctx.beginPath(); ctx.arc(bx + w * 0.34, by + h * 0.50, Math.min(w, h) * 0.11, 0, Math.PI*2); ctx.fill();
        // Glass
        ctx.fillStyle = '#e8e8e8';
        ctx.fillRect(bx + w * 0.72, by + h * 0.22, 3, h * 0.55);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillRect(bx + w * 0.74, by + h * 0.26, 1, h * 0.38);
        break;
      }
      case 'exitSign': {
        const w = T * 0.62, h = T * 0.28;
        const bx = d.x + (T - w) / 2, by = d.y + 3;
        // Ramme
        ctx.fillStyle = '#0a2a14';
        ctx.fillRect(bx - 1, by - 1, w + 2, h + 2);
        // LED grønn
        ctx.fillStyle = '#28a858';
        ctx.fillRect(bx, by, w, h);
        // Tekst
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(6, (h * 0.72)|0)}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('EXIT', bx + w / 2, by + h / 2 + 0.5);
        // Glow under
        ctx.fillStyle = 'rgba(40,180,80,0.18)';
        ctx.fillRect(bx - 2, by + h, w + 4, 2);
        break;
      }
      case 'clock': {
        const r = T * 0.30;
        // Ramme
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath(); ctx.arc(d.x, d.y, r + 1, 0, Math.PI*2); ctx.fill();
        // Skive
        ctx.fillStyle = '#f4f0e4';
        ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI*2); ctx.fill();
        // Time-markeringer
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
        for (let i = 0; i < 12; i++) {
          const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
          const x1 = d.x + Math.cos(a) * r * 0.82;
          const y1 = d.y + Math.sin(a) * r * 0.82;
          const x2 = d.x + Math.cos(a) * r * 0.95;
          const y2 = d.y + Math.sin(a) * r * 0.95;
          ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }
        // Visere basert på phaseIndex (5 faser fordelt over hele klokkerunden)
        const frac = GS.phaseIndex / 5;
        const hourA = frac * Math.PI * 2 - Math.PI / 2;
        const minA  = (frac * 12) * Math.PI * 2 / 12 - Math.PI / 2;
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x + Math.cos(hourA) * r * 0.48, d.y + Math.sin(hourA) * r * 0.48);
        ctx.stroke();
        ctx.strokeStyle = '#c83030'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x + Math.cos(minA) * r * 0.75, d.y + Math.sin(minA) * r * 0.75);
        ctx.stroke();
        // Sentrum-punkt
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill();
        break;
      }
      case 'bulletin': {
        const w = T * 0.72, h = T * 0.58;
        const bx = d.x + (T - w) / 2, by = d.y + 2;
        // Kork
        ctx.fillStyle = '#6a4820';
        ctx.fillRect(bx, by, w, h);
        ctx.strokeStyle = '#2a1808'; ctx.lineWidth = 1.2;
        ctx.strokeRect(bx + 0.5, by + 0.5, w - 1, h - 1);
        // Lapper
        const papers = [
          { x: 0.08, y: 0.10, w: 0.38, h: 0.38, c: '#e8d858' },
          { x: 0.55, y: 0.08, w: 0.38, h: 0.30, c: '#f0f0f0' },
          { x: 0.12, y: 0.55, w: 0.32, h: 0.33, c: '#d85858' },
          { x: 0.55, y: 0.48, w: 0.38, h: 0.42, c: '#a0c8a0' },
        ];
        for (const p of papers) {
          ctx.fillStyle = p.c;
          ctx.fillRect(bx + p.x * w, by + p.y * h, p.w * w, p.h * h);
          ctx.fillStyle = '#c0302a';
          ctx.beginPath(); ctx.arc(bx + (p.x + p.w / 2) * w, by + p.y * h + 1, 0.9, 0, Math.PI*2); ctx.fill();
        }
        break;
      }
      case 'extinguisher': {
        const w = T * 0.32, h = T * 0.60;
        const bx = d.x + (T - w) / 2, by = d.y + 2;
        ctx.fillStyle = 'rgba(0,0,0,0.20)';
        ctx.fillRect(bx + 1, by + h, w - 2, 2);
        // Sylinder
        ctx.fillStyle = '#b02020';
        ctx.fillRect(bx, by + 3, w, h - 3);
        // Refleks
        ctx.fillStyle = 'rgba(255,255,255,0.20)';
        ctx.fillRect(bx + 1, by + 4, 1.5, h - 6);
        // Topp-ventil
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(bx + w * 0.3, by, w * 0.4, 3);
        // Slange
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(bx + w, by + 1);
        ctx.quadraticCurveTo(bx + w + 2, by + 4, bx + w - 0.5, by + h * 0.45);
        ctx.stroke();
        // Lite hvitt skilt
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(bx - 2, by + h * 0.35, 2.5, 3);
        break;
      }
      case 'benchWood': {
        const w = T * 1.5, h = T * 0.40;
        const bx = d.x, by = d.y + 3;
        ctx.fillStyle = 'rgba(0,0,0,0.28)';
        ctx.fillRect(bx + 2, by + h, w - 4, 2);
        // Sete
        ctx.fillStyle = '#6a4820';
        ctx.fillRect(bx, by, w, h * 0.55);
        ctx.strokeStyle = '#3a2410'; ctx.lineWidth = 0.8;
        ctx.strokeRect(bx + 0.5, by + 0.5, w - 1, h * 0.55 - 1);
        // Plank-skillelinjer
        ctx.strokeStyle = '#4a3020'; ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(bx + w * 0.33, by); ctx.lineTo(bx + w * 0.33, by + h * 0.55);
        ctx.moveTo(bx + w * 0.67, by); ctx.lineTo(bx + w * 0.67, by + h * 0.55);
        ctx.stroke();
        // Bein
        ctx.fillStyle = '#3a2410';
        ctx.fillRect(bx + 2, by + h * 0.55, 2, h * 0.45);
        ctx.fillRect(bx + w - 4, by + h * 0.55, 2, h * 0.45);
        break;
      }
      case 'basketHoop': {
        // Bakplate
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(d.x - T * 0.30, d.y - T * 0.25, T * 0.60, T * 0.36);
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.8;
        ctx.strokeRect(d.x - T * 0.30, d.y - T * 0.25, T * 0.60, T * 0.36);
        // Indre kvadrat
        ctx.strokeStyle = '#c82020'; ctx.lineWidth = 1;
        ctx.strokeRect(d.x - T * 0.12, d.y - T * 0.15, T * 0.24, T * 0.18);
        // Ring
        ctx.strokeStyle = '#e85020'; ctx.lineWidth = 1.4;
        ctx.beginPath(); ctx.arc(d.x, d.y + T * 0.13, T * 0.15, 0, Math.PI*2); ctx.stroke();
        // Nett
        ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 0.5;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI;
          ctx.moveTo(d.x + Math.cos(a) * T * 0.15, d.y + T * 0.13 + Math.sin(a) * T * 0.15);
          ctx.lineTo(d.x + Math.cos(a) * T * 0.07, d.y + T * 0.25);
        }
        ctx.stroke();
        break;
      }
      case 'yardMarkings': {
        const r = T * 0.95;
        ctx.save();
        ctx.strokeStyle = 'rgba(230,210,80,0.55)'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(d.x, d.y, r, Math.PI, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(d.x - r, d.y); ctx.lineTo(d.x + r, d.y);
        ctx.stroke();
        ctx.restore();
        break;
      }
      case 'yardPole': {
        const h = T * 0.75;
        ctx.fillStyle = 'rgba(0,0,0,0.30)';
        ctx.beginPath();
        ctx.ellipse(d.x, d.y + 2, 4, 1.5, 0, 0, Math.PI*2); ctx.fill();
        // Stang
        ctx.fillStyle = '#5a5a5a';
        ctx.fillRect(d.x - 1, d.y - h, 2, h);
        // Lampehode (kjegle)
        ctx.fillStyle = '#3a3a3a';
        ctx.beginPath();
        ctx.moveTo(d.x - 4, d.y - h);
        ctx.lineTo(d.x + 4, d.y - h);
        ctx.lineTo(d.x + 2.5, d.y - h - 4);
        ctx.lineTo(d.x - 2.5, d.y - h - 4);
        ctx.closePath();
        ctx.fill();
        // Lys-kjerne
        ctx.fillStyle = '#ffe890';
        ctx.fillRect(d.x - 2.5, d.y - h + 0.5, 5, 1.2);
        break;
      }
    }
  }

  // ── DUSJ: romfølelse og levende vann ────────────────────────────
  const sx0 = 24 * TILE, sy0 = 17 * TILE;
  const sw  = 11 * TILE, sh  =  5 * TILE;
  const wallH = 11;

  // BAKVEGG — faktisk flat flate på topp av rad 17
  ctx.fillStyle = '#1a1f26';
  ctx.fillRect(sx0, sy0, sw, wallH);
  // Subtil variasjon (murpuss-følelse)
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  ctx.fillRect(sx0, sy0, sw, 1);
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  ctx.fillRect(sx0, sy0 + wallH - 2, sw, 1);
  // Hard kant der vegg møter gulv
  ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(sx0, sy0 + wallH);
  ctx.lineTo(sx0 + sw, sy0 + wallH);
  ctx.stroke();
  // Myk fall-off under kant (AO)
  const fallOff = ctx.createLinearGradient(sx0, sy0 + wallH, sx0, sy0 + wallH + 4);
  fallOff.addColorStop(0, 'rgba(0,0,0,0.30)');
  fallOff.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = fallOff;
  ctx.fillRect(sx0, sy0 + wallH, sw, 4);

  // VÅTE STRIPER — lys topp → mørk bunn, puddel ved sluk
  for (const sx of [26, 29, 32]) {
    const cx = sx * TILE + TILE/2;
    const wetTop = 18 * TILE + TILE * 0.65;
    const wetBot = 21 * TILE;
    const wetW   = TILE * 1.15;
    const wg = ctx.createLinearGradient(cx, wetTop, cx, wetBot);
    wg.addColorStop(0,   'rgba(5,12,22,0.10)');
    wg.addColorStop(0.5, 'rgba(6,14,24,0.22)');
    wg.addColorStop(1,   'rgba(4,10,18,0.40)');
    ctx.fillStyle = wg;
    ctx.fillRect(cx - wetW/2, wetTop, wetW, wetBot - wetTop);
    // Puddel-halo rundt sluket
    const drainY = 20.5 * TILE;
    const puddleG = ctx.createRadialGradient(cx, drainY, 2, cx, drainY, 12);
    puddleG.addColorStop(0, 'rgba(2,8,14,0.35)');
    puddleG.addColorStop(1, 'rgba(2,8,14,0)');
    ctx.fillStyle = puddleG;
    ctx.fillRect(cx - 14, drainY - 14, 28, 28);
    // Tynn blank refleks
    ctx.fillStyle = 'rgba(180,215,240,0.06)';
    ctx.fillRect(cx - 1.5, wetTop + 4, 3, (wetBot - wetTop) * 0.55);
  }

  // Side- og bunn-skygger (beholdes fra v0.9.28)
  const leftShadow = ctx.createLinearGradient(sx0, sy0, sx0 + 6, sy0);
  leftShadow.addColorStop(0, 'rgba(0,0,0,0.25)');
  leftShadow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = leftShadow; ctx.fillRect(sx0, sy0, 6, sh);
  const rightShadow = ctx.createLinearGradient(sx0 + sw, sy0, sx0 + sw - 6, sy0);
  rightShadow.addColorStop(0, 'rgba(0,0,0,0.25)');
  rightShadow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rightShadow; ctx.fillRect(sx0 + sw - 6, sy0, 6, sh);
  const botShadow = ctx.createLinearGradient(sx0, sy0 + sh, sx0, sy0 + sh - 5);
  botShadow.addColorStop(0, 'rgba(0,0,0,0.20)');
  botShadow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = botShadow; ctx.fillRect(sx0, sy0 + sh - 5, sw, 5);

  // SKILLEVEGGER mellom dusjhodene (visuelt, ingen kollisjon)
  for (const dcol of [27.5, 30.5]) {
    const dx = dcol * TILE;
    const divTop = sy0 + wallH + 2;
    const divBot = 20 * TILE + TILE * 0.2;
    const divW = 3;
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.fillRect(dx + 1, divTop, divW, divBot - divTop);
    ctx.fillStyle = '#2a3038';
    ctx.fillRect(dx - divW/2, divTop, divW, divBot - divTop);
    ctx.fillStyle = 'rgba(180,195,210,0.22)';
    ctx.fillRect(dx - divW/2, divTop, 0.8, divBot - divTop);
    ctx.fillStyle = '#1a2028';
    ctx.fillRect(dx - divW/2 - 0.5, divTop - 1, divW + 1, 1.5);
  }

  // RENNENDE VANN — aktiv per dusjhode hvis en innsatt står i tilen
  const showerHeadTiles = [
    {sx: 26, sy: 18},
    {sx: 29, sy: 18},
    {sx: 32, sy: 18}
  ];
  const nowW = performance.now();
  for (const {sx, sy} of showerHeadTiles) {
    let active = false;
    for (const inm of GS.inmates) {
      if (inm.zone !== 'shower') continue;
      if (Math.floor(inm.px / TILE) === sx && Math.floor(inm.py / TILE) === sy) {
        active = true; break;
      }
    }
    if (!active) continue;
    const pipeX = sx * TILE + TILE/2;
    const nozzleY = sy * TILE + TILE * 0.55 + 2;
    const streamBot = 21 * TILE - 2;
    // Tynne vertikale stråle-linjer med jitter
    for (let i = 0; i < 3; i++) {
      const ox = (i - 1) * 1.4;
      const jitter = Math.sin(nowW * 0.008 + i * 1.7) * 0.4;
      ctx.strokeStyle = `rgba(170,210,240,${0.20 + i * 0.06})`;
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(pipeX + ox + jitter, nozzleY);
      ctx.lineTo(pipeX + ox + jitter * 0.5, streamBot);
      ctx.stroke();
    }
    // Animerte dråper (modulo-tid faller nedover)
    for (let i = 0; i < 5; i++) {
      const phase = ((nowW * 0.12 + i * 35) % 100) / 100;
      const y = nozzleY + phase * (streamBot - nozzleY);
      const x = pipeX + (i - 2) * 1.2 + Math.sin(nowW * 0.01 + i) * 0.3;
      const alpha = 0.50 * (1 - Math.abs(phase - 0.5) * 0.7);
      ctx.fillStyle = `rgba(190,220,245,${alpha})`;
      ctx.beginPath();
      ctx.arc(x, y, 0.9, 0, Math.PI*2); ctx.fill();
    }
    // Splash-ellipse ved bunn (lett pulserende)
    ctx.fillStyle = 'rgba(170,210,240,0.18)';
    ctx.beginPath();
    ctx.ellipse(pipeX, streamBot, 4 + Math.sin(nowW * 0.012) * 0.5, 1.2, 0, 0, Math.PI*2);
    ctx.fill();
    // Steam-halo rundt nozzle
    const steamG = ctx.createRadialGradient(pipeX, nozzleY - 2, 0, pipeX, nozzleY - 2, 6);
    steamG.addColorStop(0, 'rgba(200,225,245,0.12)');
    steamG.addColorStop(1, 'rgba(200,225,245,0)');
    ctx.fillStyle = steamG;
    ctx.fillRect(pipeX - 7, nozzleY - 9, 14, 14);
  }

  // Gym: beholdes svak mørk-varm tint
  ctx.fillStyle = 'rgba(40,20,20,0.06)';
  ctx.fillRect(10*TILE, 17*TILE, 11*TILE, 5*TILE);

  // Rotte-animasjon (kun én aktiv om gangen, krysser dusjen)
  if (GS.activeRat) {
    const r = GS.activeRat;
    const t = (Date.now() - r.startedAt) / r.durationMs;
    if (t >= 1) {
      GS.activeRat = null;
    } else {
      const x = r.sx + (r.ex - r.sx) * t;
      const y = r.sy + (r.ey - r.sy) * t;
      const dir = Math.sign(r.ex - r.sx) || 1;
      // Kropp
      ctx.fillStyle = '#2a1a14';
      ctx.beginPath(); ctx.ellipse(x, y, 3.5, 1.8, 0, 0, Math.PI*2); ctx.fill();
      // Hale
      ctx.strokeStyle = '#2a1a14'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(x - dir*3, y);
      ctx.lineTo(x - dir*6, y + 1);
      ctx.stroke();
      // Øye-prikk
      ctx.fillStyle = 'rgba(255,200,180,0.55)';
      ctx.fillRect(x + dir*2.3, y - 0.6, 0.7, 0.7);
    }
  }
}

function renderStaff() {
  const activeZone = PHASE_ZONE[PHASES[GS.phaseIndex]];
  for (const s of STAFF_POSITIONS) {
    if (s.activeWhenZone !== activeZone) continue;

    const base = TILE * 0.33;
    const br   = base * 0.58;
    const hr   = base * 0.40;
    const bx   = s.x, by = s.y + base * 0.18;
    const hx   = s.x, hy = s.y - base * 0.44;

    drawShadow(s.x, s.y, base * 0.55);

    // Body — hvit forkle
    ctx.fillStyle = '#e8e8e8';
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#b0b0b0'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.stroke();

    // Forkle-knyt — mørk stripe ved livet
    ctx.fillStyle = '#a0a0a0';
    ctx.fillRect(bx - br * 0.7, by - 0.5, br * 1.4, 1.5);

    // Hode
    ctx.fillStyle = '#c09060';
    ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI*2); ctx.fill();

    // Kokkelue — hvit dome over hodet, høyere enn vakt-cap
    ctx.fillStyle = '#f4f4f4';
    ctx.beginPath(); ctx.arc(hx, hy - hr * 0.2, hr * 1.30, Math.PI, 0); ctx.fill();
    ctx.fillRect(hx - hr * 1.05, hy - 1, hr * 2.1, 2);
  }
}

// Subtil outline rundt spesialrom (isolasjon, samtalerom, bibliotek, verksted).
// Holder seg bevisst svak; dempes ytterligere om natten av phase-tint.
function renderZoneOutlines() {
  if (!GS.zoneBorders) return;
  ctx.save();
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.18;
  let currentColor = null;
  ctx.beginPath();
  for (const s of GS.zoneBorders) {
    if (s.color !== currentColor) {
      if (currentColor) ctx.stroke();
      ctx.strokeStyle = s.color;
      ctx.beginPath();
      currentColor = s.color;
    }
    ctx.moveTo(s.x1, s.y1);
    ctx.lineTo(s.x2, s.y2);
  }
  if (currentColor) ctx.stroke();
  ctx.restore();
}

// Tynn mørk stripe under vegg-tiles for dybde mot gulv.
function renderWallShadows() {
  const T = TILE;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  for (let y = 0; y < ROWS - 1; y++) {
    for (let x = 0; x < COLS; x++) {
      const t = GS.map[y]?.[x];
      const tb = GS.map[y + 1]?.[x];
      if (!t || !tb) continue;
      if (t.type === 'wall' && tb.type !== 'wall') {
        ctx.fillRect(x * T, (y + 1) * T, T, 3);
      }
    }
  }
  ctx.restore();
}

function renderTint() {
  const phase = PHASES[GS.phaseIndex];
  const tint = PHASE_TINT[phase];
  if (tint) {
    ctx.fillStyle = tint;
    ctx.fillRect(0, 0, W, H);
  }
  const glow = PHASE_LAMP_GLOW[phase] || 0;
  if (glow > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const baseR = TILE * 1.7;
    for (const d of STATIC_DECOR) {
      if (d.type !== 'lamp' && d.type !== 'yardPole') continue;
      const cx = d.x;
      const cy = d.type === 'yardPole' ? d.y - TILE * 0.75 : d.y;
      const _s = Math.sin(d.x * 12.9898 + d.y * 78.233) * 43758.5453;
      const _r = _s - Math.floor(_s);
      const _sz = 0.85 + _r * 0.30;
      const _a  = (0.82 + ((_r * 7) % 1) * 0.25) * 0.88;
      const R = baseR * _sz;
      const grad = ctx.createRadialGradient(cx, cy, 1, cx, cy, R);
      grad.addColorStop(0, `rgba(255,220,140,${0.48 * glow * _a})`);
      grad.addColorStop(0.4, `rgba(255,205,110,${0.22 * glow * _a})`);
      grad.addColorStop(1, 'rgba(255,205,110,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function renderWinnerBanner() {
  const inm = GS.inmates.find(i => i.id === GS.winnerId);
  if (!inm) return;
  const cx = W / 2, cy = H / 2;
  const falt = GS.stats.disappeared;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.60)';
  ctx.fillRect(cx - 200, cy - 46, 400, 92);
  ctx.strokeStyle = '#ffd86b';
  ctx.lineWidth = 2;
  ctx.strokeRect(cx - 200, cy - 46, 400, 92);
  ctx.fillStyle = '#ffd86b';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('👑 LAST MAN STANDING', cx, cy - 18);
  ctx.fillStyle = '#fff';
  ctx.font = '15px sans-serif';
  ctx.fillText(`${inm.name} vant — ${falt} falt`, cx, cy + 12);
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, W, H);
  renderMap();
  renderWallShadows();
  renderZoneOutlines();
  renderLabels();
  renderDecor();
  if (GS.mode === 'lastManStandingShower') renderShowerDebris();
  renderInmates();
  renderGuards();
  renderStaff();
  renderTint();
  if (GS.gangwarFlashMs > 0) {
    const a = Math.min(0.35, GS.gangwarFlashMs / 600 * 0.35);
    ctx.fillStyle = `rgba(200,48,48,${a})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function respektLevel(r) {
  if (r < 10) return 'Lav';
  if (r < 40) return 'Vanlig';
  if (r < 70) return 'Respektert';
  return 'Fryktet';
}
function respektLevelShort(r) {
  return respektLevel(r);
}
function respektColor(r) {
  if (r < 20) return '#556';
  if (r < 40) return '#778';
  if (r < 60) return '#a8a060';
  if (r < 80) return '#c8b460';
  return '#e07040';
}

function unrestReasons(inm) {
  const r = [];
  if (inm.hygiene  < 30) r.push('Dårlig hygiene');
  if (inm.energi   < 25) r.push('Utmattet');
  if (inm.disiplin < 25) r.push('Lav disiplin');
  const rival = inm.groupId && GS.inmates.some(o =>
    o.id !== inm.id && o.groupId && o.groupId !== inm.groupId &&
    Math.hypot(o.px - inm.px, o.py - inm.py) < TILE * 4);
  if (rival) r.push('Nær rival');
  if (inm.isBeingIntervened) r.push('Vakt griper inn');
  // Kvirk-spesifikke årsaker
  if (inm.kvirk === 'paranoid') {
    const near = GS.inmates.filter(o =>
      o.id !== inm.id && Math.hypot(o.px - inm.px, o.py - inm.py) < TILE * 3).length;
    if (near >= 3) r.push('Paranoia i folkemengde');
  }
  if (inm.kvirk === 'nervøs') {
    const guardNear = GS.guards.some(g =>
      Math.hypot(g.px - inm.px, g.py - inm.py) < TILE * 5);
    if (guardNear) r.push('Skremt av vakt');
  }
  if (inm.kvirk === 'fanatisk' && inm.idolId != null) {
    const idol = GS.inmates.find(x => x.id === inm.idolId);
    if (idol && idol.isolationTicks > 0) r.push('Idol borte');
  }
  if (inm.aktivitet === 'samling') r.push('I samling');
  if (inm.isBored) r.push('Kjedelig hverdag');
  return r.slice(0, 3);
}
let uiTimer = 0;

// ================================================================
// INNSATT-LISTE: in-place rendering + filter + throttlet sortering
// ================================================================
const listNodes = new Map();   // inmateId → {root, nameEl, cellEl, barFill, badgeEl}
let currentOrder = [];         // id-rekkefølgen som er i DOM nå
let lastSortTs   = 0;

function matchesFilter(inm, f) {
  switch (f) {
    case 'gA':    return inm.groupId === 'A';
    case 'gB':    return inm.groupId === 'B';
    case 'gC':    return inm.groupId === 'C';
    case 'gNone': return inm.groupId == null;
    default:      return true;
  }
}

function sortForFilter(ids /*, f */) {
  // Alltid sortert etter uro (synkende), stabil på id
  const byId = new Map(GS.inmates.map(i => [i.id, i]));
  return ids.slice().sort((a, b) => {
    const ia = byId.get(a), ib = byId.get(b);
    return (-ia.unrest) - (-ib.unrest) || a - b;
  });
}

function computeDesiredOrder() {
  const filtered = GS.inmates.filter(inm => matchesFilter(inm, GS.listFilter)).map(i => i.id);
  const sorted = sortForFilter(filtered, GS.listFilter);
  const sel = GS.selectedId;
  if (sel != null && !filtered.includes(sel) && GS.inmates.some(i => i.id === sel)) {
    return [sel, ...sorted];
  }
  return sorted;
}

function getOrCreateCard(inm) {
  let entry = listNodes.get(inm.id);
  if (entry) return entry;
  const root = document.createElement('div');
  root.className = 'ir';
  root.dataset.id = inm.id;
  root.innerHTML = `
    <span class="ir-name"></span>
    <span class="ir-cell"></span>
    <span class="ir-status"></span>
    <span class="ir-resp"></span>
    <div class="ub"><div class="uf"></div></div>
    <span class="ir-unrest"></span>`;
  entry = {
    root,
    nameEl:   root.querySelector('.ir-name'),
    cellEl:   root.querySelector('.ir-cell'),
    statusEl: root.querySelector('.ir-status'),
    respEl:   root.querySelector('.ir-resp'),
    barFill:  root.querySelector('.uf'),
    unrestEl: root.querySelector('.ir-unrest'),
  };
  listNodes.set(inm.id, entry);
  return entry;
}

function updateCardContent(inm, isPinned) {
  const e = getOrCreateCard(inm);
  const u2 = Math.round(inm.unrest);
  const fc = u2>70?'#c83030':u2>40?'#b07828':'#308848';
  const cls = 'ir'
            + (inm.id === GS.selectedId ? ' sel' : '')
            + (isPinned ? ' pinned' : '');
  if (e.root.className !== cls) e.root.className = cls;
  const isLeader = GS._leaders && inm.groupId && GS._leaders[inm.groupId] === inm.id;
  const displayName = (isLeader ? '♛ ' : '') + inm.name;
  if (e.nameEl.textContent !== displayName) e.nameEl.textContent = displayName;
  const cellCount = (GS._cellCounts && inm.cellId) ? (GS._cellCounts[inm.cellId] || 0) : 0;
  const cellLabel = inm.cellId ? (cellCount >= 3 ? `${inm.cellId}*` : inm.cellId) : '–';
  if (e.cellEl.textContent !== cellLabel) e.cellEl.textContent = cellLabel;
  const w = u2 + '%';
  if (e.barFill.style.width !== w) e.barFill.style.width = w;
  if (e.barFill.style.background !== fc) e.barFill.style.background = fc;

  const uStr = String(u2);
  if (e.unrestEl.textContent !== uStr) e.unrestEl.textContent = uStr;

  const rStr = 'R' + inm.respekt;
  const rCol = respektColor(inm.respekt);
  if (e.respEl.textContent !== rStr) e.respEl.textContent = rStr;
  if (e.respEl.style.color !== rCol) e.respEl.style.color = rCol;

  let sTxt = '', sTitle = '', sCol = '';
  if (inm.isolationTicks > 0) {
    sTxt = '🔒';
    sTitle = `Isolat — ${Math.ceil(inm.isolationTicks/1020*24)}t igjen`;
    sCol = '#c83030';
  } else if (inm.conflictCooldown > 0) {
    sTxt = '💥';
    sTitle = 'Konflikt';
    sCol = '#e07040';
  } else if (inm.isFloorSleeper) {
    sTxt = '🛌';
    sTitle = 'Sover på gulv';
    sCol = '#b06838';
  }
  if (e.statusEl.textContent !== sTxt) e.statusEl.textContent = sTxt;
  if (e.statusEl.title !== sTitle) e.statusEl.title = sTitle;
  if (e.statusEl.style.color !== sCol) e.statusEl.style.color = sCol;
}

function applyOrder(list, desired) {
  // Fjern noder som ikke er ønsket lenger
  for (const [id, entry] of listNodes) {
    if (!desired.includes(id) || !GS.inmates.some(i => i.id === id)) {
      entry.root.remove();
      listNodes.delete(id);
    }
  }
  // appendChild på eksisterende node flytter den — ingen rebuild
  const byId = new Map(GS.inmates.map(i => [i.id, i]));
  for (const id of desired) {
    const inm = byId.get(id);
    if (!inm) continue;
    const entry = getOrCreateCard(inm);
    list.appendChild(entry.root);
  }
  currentOrder = desired.slice();
}

function updateGangCounts() {
  const counts = { all: GS.inmates.length, gA: 0, gB: 0, gC: 0, gNone: 0 };
  for (const inm of GS.inmates) {
    if      (inm.groupId === 'A') counts.gA++;
    else if (inm.groupId === 'B') counts.gB++;
    else if (inm.groupId === 'C') counts.gC++;
    else                          counts.gNone++;
  }
  document.querySelectorAll('#gang-strip .gs').forEach(t => {
    const span = t.querySelector('.gs-count');
    const txt = `(${counts[t.dataset.f]})`;
    if (span.textContent !== txt) span.textContent = txt;
  });
}

function renderInmateList() {
  const list = document.getElementById('ilist');
  const desired = computeDesiredOrder();

  if (desired.length === 0) {
    // Tøm DOM og vis placeholder
    for (const [, entry] of listNodes) entry.root.remove();
    listNodes.clear();
    currentOrder = [];
    list.innerHTML = '<div class="ir-empty">Ingen i denne kategorien</div>';
    return;
  }

  // Hvis vi nettopp viste placeholder, tøm den
  const placeholder = list.querySelector('.ir-empty');
  if (placeholder) placeholder.remove();

  // Medlemskaps-endring eller selected-id endring → reorder umiddelbart.
  // Rangerings-endring innen samme sett → throttles til 2s.
  const sameSet = desired.length === currentOrder.length
    && desired.every(id => currentOrder.includes(id));
  const now = performance.now();
  const shouldReorder = !sameSet || (
    desired.some((id, i) => currentOrder[i] !== id) && now - lastSortTs > 2000
  );

  if (shouldReorder) {
    applyOrder(list, desired);
    lastSortTs = now;
  }

  // Oppdater innhold på alle synlige kort (både nye og gamle)
  const byId = new Map(GS.inmates.map(i => [i.id, i]));
  const filteredSet = new Set(
    GS.inmates.filter(inm => matchesFilter(inm, GS.listFilter)).map(i => i.id)
  );
  for (const id of currentOrder) {
    const inm = byId.get(id);
    if (!inm) continue;
    updateCardContent(inm, !filteredSet.has(id));
  }
}

      ` : ''}
      ${(() => {
        if (!sel.memories || !sel.memories.length) return '';
        const counts = { loss:0, win:0, friend_died:0, isolation_after_fight:0 };
        for (const m of sel.memories) if (counts[m.type] != null) counts[m.type]++;
        const parts = [];
        if (counts.loss) parts.push(`${counts.loss} tap`);
        if (counts.win)  parts.push(`${counts.win} seier${counts.win > 1 ? 'e' : ''}`);
        if (counts.friend_died) parts.push(`${counts.friend_died} mistet venn`);
        if (counts.isolation_after_fight) parts.push(`${counts.isolation_after_fight} isolat`);
        if (!parts.length) return '';
        return `<div class="dr" style="margin-top:6px"><span class="dl">Bærer med seg</span><span class="dv" style="color:#a89a78">${parts.join(' · ')}</span></div>`;
      })()}
      ${(() => {
        const grudges = getGrudgeTargets(sel);
        if (!grudges.length) return '';
        return `<div class="dr" style="margin-top:6px"><span class="dl">Grudge mot</span></div>` +
          grudges.slice(0, 2).map(g => {
            const other = GS.inmates.find(x => x.id === g.id);
            const name = other ? other.name : '(borte)';
            return `<div class="dr"><span class="dv" style="color:#c04040;font-size:0.72rem">&bull; ${name}</span></div>`;
          }).join('');
      })()}
      ${(() => {
        if (!sel.ambition) return '';
        const label = goalLabel(sel.ambition);
        if (!label) return '';
        const tick = sel.ambitionAchieved ? ' <span style="color:#8ac060">✓</span>' : '';
        return `<div class="dr" style="margin-top:6px"><span class="dl">Mål</span><span class="dv">${label}${tick}</span></div>`;
      })()}
      ${sel.history && sel.history.length ? `
        <div class="dr" style="margin-top:6px"><span class="dl">Historikk</span></div>
        ${sel.history.map(h => `<div class="dr"><span class="dv" style="color:#8a9098;font-size:0.72rem">&bull; ${historyRender(h)}</span></div>`).join('')}
      ` : ''}`;
  } else {
    dp.innerHTML = '<span style="color:#2a3040;font-size:0.73rem">Klikk på innsatt for detaljer.</span>';
  }
}

document.querySelectorAll('.pb').forEach(btn => {
  btn.addEventListener('click', () => {
    const idx = PHASES.indexOf(btn.dataset.p);
    if (idx === -1) return;
    GS.phaseIndex = idx;
    GS.phaseTick  = 0;
    const newZone = PHASE_ZONE[PHASES[idx]];
    for (let i = 0; i < GS.inmates.length; i++) {
      const inm = GS.inmates[i];
      const pBias = inm.kvirk === 'impulsiv'             ? -800
                  : inm.temperament === 'aggressive'     ? -400
                  : inm.temperament === 'calm'           ? +600
                  : inm.kvirk === 'nervøs'               ? +1100
                  : 0;
      const delay = Math.max(0, Math.random() * 5500 + pBias);
      inm.setTargetZone(newZone, delay);
    }
  });
});

// Powers
function triggerNewcomerPower() {
  if (GS.powerCooldowns.newcomer > 0) return;
  const newcomer = spawnNewcomer();
  if (!newcomer) return;                  // alle fulle celler har floor sleeper; cooldown resettet i spawnNewcomer
  GS.powerCooldowns.newcomer = 5;
  GS.selectedId = newcomer.id;
  addHistory(newcomer, `⚡ Ankom fengselet — ryktet til å være farlig.`);
  addPowerEvent('arrival', `⚡ ${newcomer.name} ankom — beryktet.`);
}
function triggerGangwarPower() {
  if (GS.powerCooldowns.gangwar > 0) return;
  const counts = { A:0, B:0, C:0 };
  for (const inm of GS.inmates) if (inm.groupId) counts[inm.groupId] = (counts[inm.groupId] || 0) + 1;
  const top = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 2);
  const g1 = top[0] && top[0][1] > 0 ? top[0][0] : null;
  const g2 = top[1] && top[1][1] > 0 ? top[1][0] : null;
  if (!g1 || !g2) return;
  triggerGangWar(g1, g2);
  GS.gangwarFlashMs = 600;
  GS.powerCooldowns.gangwar = 5;
}
document.querySelector('[data-pwr="newcomer"]').addEventListener('click', triggerNewcomerPower);
document.querySelector('[data-pwr="gangwar"]').addEventListener('click', triggerGangwarPower);

// Canvas — click to select inmate, mousemove to hover
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width  / rect.width;
  const sy = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top)  * sy;
  let closest = null, closestD = TILE;
  for (const inm of GS.inmates) {
    const d = Math.hypot(inm.px - mx, inm.py - my);
    if (d < closestD) { closest = inm; closestD = d; }
  }
  if (closest) GS.selectedId = closest.id === GS.selectedId ? null : closest.id;
});
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width  / rect.width;
  const sy = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top)  * sy;
  let closest = null, closestD = TILE * 1.2;
  for (const inm of GS.inmates) {
    const d = Math.hypot(inm.px - mx, inm.py - my);
    if (d < closestD) { closest = inm; closestD = d; }
  }
  GS.hoverId = closest ? closest.id : null;
  canvas.style.cursor = closest ? 'pointer' : 'default';
});
canvas.addEventListener('mouseleave', () => { GS.hoverId = null; canvas.style.cursor = 'default'; });

// ================================================================
// MAIN LOOP
// ================================================================
let lastTs = 0;
// v0.9.32: movement-dt får hard clamp + EMA-smoothing slik at tick-hitches
// ikke spiker step-størrelsen. Tick/UI-timere bruker fortsatt rå-clampet dt.
let smoothMoveDt = 16;

function loop(ts) {
  const rawDt = ts - lastTs;
  lastTs = ts;

  // Last Man Standing: frys sim når vinner er kåret, men fortsett å tegne.
  if (GS.winnerId != null) {
    render();
    renderWinnerBanner();
    requestAnimationFrame(loop);
    return;
  }

  // Movement: clamp hardt (20ms) + gliding EMA → jevn step-størrelse
  const moveDt = Math.min(rawDt, 20);
  smoothMoveDt = smoothMoveDt * 0.80 + moveDt * 0.20;

  for (const inm of GS.inmates) inm.move(smoothMoveDt);
  for (const g   of GS.guards)   g.move(smoothMoveDt);

  // Tick/UI bruker rå dt (clampet som før)
  const tickDt = Math.min(rawDt, 50);
  tickTimer += tickDt;
  if (tickTimer >= TICK_MS) { tickTimer = 0; tick(); }

  render();

  uiTimer += tickDt;
  if (uiTimer >= 180) { uiTimer = 0; updateUI(); }

  requestAnimationFrame(loop);
}

const SAVE_KEY = 'fengselsimulator_save';

function saveGame() {
  const data = {
    day: GS.day, phaseIndex: GS.phaseIndex, phaseTick: GS.phaseTick, speed: GS.speed,
    inmates: GS.inmates.map(inm => ({
      id: inm.id, name: inm.name, cellId: inm.cellId, cellSlot: inm.cellSlot,
      groupId: inm.groupId, kategori: inm.kategori, look: inm.look,
      px: inm.px, py: inm.py, zone: inm.zone, targetZone: inm.targetZone,
      unrest: inm.unrest, health: inm.health, energi: inm.energi,
      hygiene: inm.hygiene, disiplin: inm.disiplin, dominans: inm.dominans,
      soningstidTotalt: inm.soningstidTotalt, soningstidIgjen: inm.soningstidIgjen,
      cafState: inm.cafState, sleepState: inm.sleepState,
      isolationTicks: inm.isolationTicks, postFightRoom: inm.postFightRoom,
      isolatCount: inm.isolatCount,
      respekt: inm.respekt,
      fightsWon: inm.fightsWon, fightsLost: inm.fightsLost,
      friendshipsMade: inm.friendshipsMade, counselingCount: inm.counselingCount,
      history: inm.history.slice(0, HISTORY_MAX),
      friendId: inm.friendId, notifiedFriendInRoom: inm.notifiedFriendInRoom,
      libraryVisits: inm.libraryVisits,
      workshopCount: inm.workshopCount,
      lastWorkshopDay: inm.lastWorkshopDay,
      isBored: inm.isBored,
      isFloorSleeper: inm.isFloorSleeper,
      hasDominatedForBed: inm.hasDominatedForBed,
      ambition: inm.ambition,
      ambitionAchieved: inm.ambitionAchieved,
      targetId: inm.targetId,
      lastFightOpponent: inm.lastFightOpponent,
      lastFightDay: inm.lastFightDay,
      memories: inm.memories,
    })),
    guards: GS.guards.map(g => ({ patrol: g.patrol, pi: g.pi })),
    stats: { ...GS.stats },
    playerId: GS.playerId,
    gangwarFlashMs: GS.gangwarFlashMs,
    powerCooldowns: { ...GS.powerCooldowns },
    powerLog: GS.powerLog,
    topDogId: GS.topDogId,
    departed: GS.departed,
    mode:     GS.mode,
    winnerId: GS.winnerId,
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  const data = JSON.parse(raw);
  GS.map = buildMap();
  GS.zoneBorders = computeZoneBorders();
  GS.day = data.day; GS.phaseIndex = data.phaseIndex;
  GS.phaseTick = data.phaseTick; GS.speed = data.speed;
  GS.stats = Object.assign(defaultStats(), data.stats || {});
  GS.playerId = data.playerId ?? null;
  GS.gangwarFlashMs = data.gangwarFlashMs ?? 0;
  GS.powerCooldowns = Object.assign({ newcomer:0, gangwar:0 }, data.powerCooldowns || {});
  delete GS.powerCooldowns.blackout;
  GS.powerLog  = Array.isArray(data.powerLog) ? data.powerLog : [];
  GS.topDogId  = data.topDogId ?? null;
  GS.departed  = Array.isArray(data.departed) ? data.departed : [];
  GS.mode      = (data.mode === 'lastManStanding') ? 'lastManStanding' : 'normal';
  GS.winnerId  = (typeof data.winnerId === 'number') ? data.winnerId : null;
  GS.inmates = []; GS.guards = [];
  UID = 1;
  for (const d of data.inmates) {
    const inm = new Inmate(d.cellId);
    Object.assign(inm, d);
    if (!Array.isArray(inm.history)) inm.history = [];
    if (inm.friendId === undefined) inm.friendId = null;
    if (inm.notifiedFriendInRoom === undefined) inm.notifiedFriendInRoom = null;
    if (typeof inm.libraryVisits !== 'number') inm.libraryVisits = 0;
    if (typeof inm.workshopCount !== 'number') inm.workshopCount = 0;
    if (inm.lastWorkshopDay === undefined) inm.lastWorkshopDay = null;
    if (typeof inm.isBored !== 'boolean') inm.isBored = false;
    if (typeof inm.isFloorSleeper !== 'boolean')     inm.isFloorSleeper = false;
    if (typeof inm.hasDominatedForBed !== 'boolean') inm.hasDominatedForBed = false;
    const VALID_AMBITIONS = new Set(['take_over','survive','climb','make_friend','no_isolation','prove_strength']);
    if (!VALID_AMBITIONS.has(inm.ambition)) inm.ambition = null;
    if (typeof inm.ambitionAchieved !== 'boolean') inm.ambitionAchieved = false;
    if (typeof inm.downedMs !== 'number') inm.downedMs = 0;
    if (typeof inm.bloodPoolMs !== 'number') inm.bloodPoolMs = 0;
    if (typeof inm.fightPushX !== 'number') inm.fightPushX = 0;
    if (typeof inm.fightPushY !== 'number') inm.fightPushY = 0;
    if (typeof inm._facing !== 'number') inm._facing = Math.PI / 2;
    if (typeof inm._isMoving !== 'boolean') inm._isMoving = false;
    if (typeof inm._walkPhase !== 'number') inm._walkPhase = 0;
    if (typeof inm.guardNoticedFight !== 'boolean') inm.guardNoticedFight = true;
    if (typeof inm.targetId !== 'number') inm.targetId = null;
    if (typeof inm.lastFightOpponent !== 'string') inm.lastFightOpponent = null;
    if (typeof inm.lastFightDay !== 'number')      inm.lastFightDay = null;
    if (!Array.isArray(inm.memories))              inm.memories = [];
    inm._wasInWorkshop = inm.zone === 'workshop';
    if (typeof inm.respekt !== 'number') {
      inm.respekt = (typeof inm.ry === 'number') ? inm.ry : 0;
    }
    delete inm.ry;
    if (typeof inm.fightsWon !== 'number') inm.fightsWon = 0;
    if (typeof inm.fightsLost !== 'number') inm.fightsLost = 0;
    if (typeof inm.friendshipsMade !== 'number') inm.friendshipsMade = 0;
    if (typeof inm.counselingCount !== 'number') inm.counselingCount = 0;
    if (inm.look) {
      if (typeof inm.look.build !== 'number')        inm.look.build = 1.0;
      if (typeof inm.look.heightFactor !== 'number') inm.look.heightFactor = 1.0;
      if (typeof inm.look.shoeColor !== 'string')    inm.look.shoeColor = '#141414';
      if (typeof inm.look.pantsColor !== 'string')   inm.look.pantsColor = '#2a2418';
      if (inm.look.jacketColor === undefined)        inm.look.jacketColor = null;
      if (typeof inm.look.beardStyle !== 'string') {
        inm.look.beardStyle = inm.look.beard === true ? 'stubble' : 'none';
      }
      if (typeof inm.look.hairStyle !== 'number') inm.look.hairStyle = 0;
      if (typeof inm.look.hairColor !== 'string') inm.look.hairColor = '#3a2e22';
      delete inm.look.beard;
      delete inm.look.scar;
      delete inm.look.tattoo;
      delete inm.look.browStyle;
    }
    inm._wasInLibrary = inm.zone === 'library';
    inm.waypoints = [];
    inm.currentSpotId = null;
    inm.phaseDelay = 0; inm.pendingZone = null;
    if (typeof inm._chatMs !== 'number') inm._chatMs = 0;
    GS.inmates.push(inm);
  }
  UID = Math.max(...GS.inmates.map(i => i.id)) + 1;
  for (const d of data.guards) GS.guards.push(new Guard(d.patrol, d.pi));
  const zone = PHASE_ZONE[PHASES[GS.phaseIndex]];
  for (const inm of GS.inmates) inm.setTargetZone(zone);
  return true;
}

// ================================================================
// MENU / INIT
// ================================================================
function checkSaveExists() {
  const hasSave = !!localStorage.getItem(SAVE_KEY);
  const hasActiveRound = GS.inmates.length > 0;
  document.getElementById('btn-continue').disabled = !(hasSave || hasActiveRound);
  document.getElementById('btn-load').disabled     = !hasSave;
}

function startGame(fromSave = false) {
  if (fromSave) {
    if (!loadGame()) { alert('Ingen lagret data funnet.'); return; }
  } else {
    GS.map = buildMap();
    GS.zoneBorders = computeZoneBorders();
    GS.day = 1; GS.phaseIndex = 0; GS.phaseTick = 0;
    GS.stats = defaultStats();
    GS.playerId = null;
    GS.powerLog = [];
    GS.topDogId = null;
    GS.departed = [];
    GS.corpses     = [];
    GS.bloodSpots  = [];
    GS.powerCooldowns = { newcomer: 0, gangwar: 0 };
    GS.inmates = []; GS.guards = [];
    spawn();
    if (GS.mode === 'lastManStandingShower') {
      for (const inm of GS.inmates) {
        inm.aktivitet = 'ingen';
        inm.setTargetZone('shower', 0);
      }
    } else {
      const initZone = PHASE_ZONE[PHASES[GS.phaseIndex]];
      for (const inm of GS.inmates) inm.setTargetZone(initZone);
    }
  }
  document.getElementById('menu').style.display = 'none';
  requestAnimationFrame(loop);
}

document.getElementById('btn-new').addEventListener('click', () => {
  GS.mode     = 'normal';
  GS.winnerId = null;
  startGame(false);
});
document.getElementById('btn-lastman').addEventListener('click', () => {
  GS.mode     = 'lastManStanding';
  GS.winnerId = null;
  startGame(false);
});
document.getElementById('btn-lastman-shower').addEventListener('click', () => {
  GS.mode     = 'lastManStandingShower';
  GS.winnerId = null;
  startGame(false);
});
document.getElementById('btn-continue').addEventListener('click', () => {
  if (GS.inmates.length > 0) {
    document.getElementById('menu').style.display = 'none';
  } else {
    startGame(true);
  }
});
document.getElementById('btn-load').addEventListener('click', () => startGame(true));
document.getElementById('btn-save').addEventListener('click', saveGame);
document.getElementById('btn-menu').addEventListener('click', () => {
  document.getElementById('menu').style.display = 'flex';
  checkSaveExists();
});

checkSaveExists();
</script>
</body>
</html>
