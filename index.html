<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Fengselsimulator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0e1012;
  display:flex;
  font-family:'Courier New',monospace;
  color:#b0b0b0;
  height:100vh;
  overflow:hidden;
}
#canvas-wrap {
  flex:1;
  display:flex; align-items:center; justify-content:center;
  background:#0a0c0e;
  overflow:hidden;
}
canvas {
  display:block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#sidebar {
  width:260px;
  height:100vh;
  flex:0 0 260px;
  background:#161a1e;
  border-left:2px solid #222830;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.panel { padding:11px 14px; border-bottom:1px solid #1e2228; }
#hdr h1 { font-size:0.62rem; letter-spacing:3px; color:#334; text-transform:uppercase; margin-bottom:7px; }
#phase-display { font-size:1.3rem; color:#c8b460; font-weight:bold; }
#day-display   { font-size:0.75rem; color:#445; margin-top:2px; }
.stat-row { display:flex; justify-content:space-between; padding:2px 0; font-size:0.78rem; }
.lbl { color:#445; }
.val { color:#999; }
.val.hi { color:#c84040; }
.val.md { color:#b87830; }
.val.lo { color:#388050; }
#inmate-section { flex:1; min-height:90px; overflow-y:auto; }
#inmate-section h3 { font-size:0.6rem; letter-spacing:2px; color:#334; text-transform:uppercase; padding:6px 14px 5px; border-bottom:1px solid #1a1e24; }
#gang-strip {
  display:flex; gap:3px;
  padding:6px 8px 4px; border-bottom:1px solid #1a1e24;
  position:sticky; top:0; background:#161a1e; z-index:2;
}
.gs {
  flex:1; text-align:center; cursor:pointer;
  background:#1a1e24; border:1px solid #252a32; border-radius:3px;
  padding:4px 3px; font-size:0.58rem; color:#667; letter-spacing:0.3px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  display:flex; align-items:center; justify-content:center; gap:4px;
}
.gs:hover { background:#22262e; color:#889; }
.gs.on    { background:#22293a; border-color:#c8b460; color:#c8b460; }
.gs-dot   { display:inline-block; width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.gs-count { font-weight:700; opacity:0.85; }
.ir-empty { padding:12px; text-align:center; color:#334; font-size:0.65rem; }
.ir.pinned { border-color:#665030; }
.ir {
  padding: 8px 12px;
  margin: 4px 8px;
  cursor: pointer;
  border: 1px solid #1e2228;
  border-radius: 4px;
  background: #161a20;
  transition: background 0.12s, border-color 0.12s, transform 0.08s;
}
.ir:hover { background:#1e2430; border-color:#3a4250; }
.ir.sel  { background:#22293a; border-color:#c8b460; box-shadow:0 0 6px rgba(200,180,96,0.18); }
.ir-top  { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
.ir-name { font-size:0.78rem; color:#ccc; font-weight:500; }
.ir-cell { font-size:0.62rem; color:#556; letter-spacing:1px; }
.ir-badge{ font-size:0.60rem; font-weight:700; letter-spacing:1px; margin-top:4px; }
.ub { height:5px; background:#0e1116; border-radius:2px; overflow:hidden; }
.uf { height:100%; border-radius:2px; transition:width 0.5s; }
#detail { border-top:1px solid #1e2228; padding:11px 14px; background:#141820; max-height:210px; overflow-y:auto; flex-shrink:0; }
#detail h4 { font-size:0.76rem; color:#c8b460; margin-bottom:6px; }
.dr { display:flex; justify-content:space-between; font-size:0.73rem; margin:2px 0; }
.dl { color:#445; }
.dv { color:#999; }
#ctrl { border-top:1px solid #1e2228; padding:6px 14px 5px; display:flex; flex-direction:column; gap:5px; }
.ctrl-row { display:flex; align-items:center; gap:5px; }
#ctrl span { font-size:0.66rem; color:#445; }
.sb {
  background:#1a1e24; border:1px solid #30363e; color:#777;
  padding:2px 7px; font-family:monospace; font-size:0.7rem;
  cursor:pointer; border-radius:2px;
  transition: border-color 0.12s, color 0.12s, box-shadow 0.12s;
}
.sb:hover { background:#22282e; border-color:#4a5560; color:#aaa; }
.sb.on { background:#202838; border-color:#c8b460; color:#c8b460;
         box-shadow: 0 0 6px rgba(200,180,96,0.18); }
.pb {
  background:#1a1e24; border:1px solid #30363e; color:#667;
  padding:2px 6px; font-family:monospace; font-size:0.63rem;
  cursor:pointer; border-radius:2px; flex:1;
  transition: border-color 0.12s, color 0.12s, box-shadow 0.12s;
}
.pb:hover { background:#1c2028; border-color:#445560; color:#99a; }
.pb.on { background:#1e2030; border-color:#8870a0; color:#c0a0e0;
         box-shadow: 0 0 5px rgba(136,112,160,0.2); }
#menu {
  position:fixed; inset:0; background:#0a0c0e;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  z-index:100;
}
#menu h1 { font-size:1.6rem; letter-spacing:6px; color:#c8b460; text-transform:uppercase; margin-bottom:10px; }
#menu p  { font-size:0.68rem; color:#334; letter-spacing:2px; margin-top:-10px; margin-bottom:8px; }
.mb {
  background:#141820; border:1px solid #2a3040; color:#888;
  padding:8px 32px; font-family:monospace; font-size:0.8rem; letter-spacing:2px;
  cursor:pointer; border-radius:2px; width:200px; text-align:center;
  transition: border-color 0.15s, color 0.15s;
}
.mb:hover:not(:disabled) { border-color:#c8b460; color:#c8b460; }
.mb:disabled { color:#2a3040; border-color:#1a1e24; cursor:default; }
</style>
</head>
<body>
<div id="menu">
  <h1>Fengselsimulator</h1>
  <p>Panoptikon v0.9.4 &bull; 2025</p>
  <button class="mb" id="btn-new">New Game</button>
  <button class="mb" id="btn-continue" disabled>Continue</button>
  <button class="mb" id="btn-load" disabled>Load</button>
</div>
<div id="canvas-wrap"><canvas id="c"></canvas></div>
<div id="sidebar">
  <div class="panel" id="hdr">
    <h1>Fengselsimulator v1</h1>
    <div style="font-size:11px;color:#6a7080;margin-top:-2px;margin-bottom:4px;">Panoptikon v0.9.4</div>
    <div id="phase-display">Morgen</div>
    <div id="day-display">Dag 1</div>
    <div style="display:flex;flex-direction:column;gap:4px;margin-top:7px">
      <div class="ctrl-row">
        <button class="pb" data-p="Morgen">Morgen</button>
        <button class="pb" data-p="Formiddag">Formiddag</button>
        <button class="pb" data-p="Ettermiddag">Ettermiddag</button>
      </div>
      <div class="ctrl-row">
        <button class="pb" data-p="Kveld">Kveld</button>
        <button class="pb" data-p="Natt">Natt</button>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="stat-row"><span class="lbl">Total uro</span><span class="val" id="s-unrest">0%</span></div>
    <div class="stat-row"><span class="lbl">Innsatte</span><span class="val" id="s-count">0</span></div>
    <div class="stat-row"><span class="lbl">Vakter</span><span class="val" id="s-guards">0</span></div>
  </div>
  <div class="panel">
    <div class="stat-row"><span class="lbl">Kamper</span><span class="val" id="s-fights">0</span></div>
    <div class="stat-row"><span class="lbl">Vennskap</span><span class="val" id="s-friendships">0</span></div>
    <div class="stat-row"><span class="lbl">Isolat</span><span class="val" id="s-isolation">0</span></div>
    <div class="stat-row"><span class="lbl">Samtaler</span><span class="val" id="s-counseling">0</span></div>
    <div class="stat-row"><span class="lbl">Bibliotek</span><span class="val" id="s-library">0</span></div>
    <div class="stat-row"><span class="lbl">Forsvunnet</span><span class="val" id="s-disappeared">0</span></div>
  </div>
  <div id="inmate-section">
    <h3>Innsatte</h3>
    <div id="gang-strip">
      <div class="gs on" data-f="all"   title="Alle innsatte">Alle <span class="gs-count"></span></div>
      <div class="gs"    data-f="gA"    title="Gjeng A"><span class="gs-dot" style="background:#c83030"></span>A <span class="gs-count"></span></div>
      <div class="gs"    data-f="gB"    title="Gjeng B"><span class="gs-dot" style="background:#2858c8"></span>B <span class="gs-count"></span></div>
      <div class="gs"    data-f="gC"    title="Gjeng C"><span class="gs-dot" style="background:#28a040"></span>C <span class="gs-count"></span></div>
      <div class="gs"    data-f="gNone" title="Uten gjeng"><span class="gs-dot" style="background:#444;border:1px solid #667"></span>Ingen <span class="gs-count"></span></div>
    </div>
    <div id="ilist"></div>
  </div>
  <div id="detail">
    <span style="color:#2a3040;font-size:0.73rem">Klikk på innsatt for detaljer.</span>
  </div>
  <div id="ctrl">
    <div class="ctrl-row">
      <span>Hastighet:</span>
      <button class="sb on" data-s="1">1×</button>
      <button class="sb" data-s="2">2×</button>
      <button class="sb" data-s="5">5×</button>
    </div>
    <div class="ctrl-row">
      <button class="sb" id="btn-save">Save</button>
      <button class="sb" id="btn-menu">Menu</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// CONFIG
// ================================================================
const TILE = 21, COLS = 44, ROWS = 26;
const W = COLS * TILE, H = ROWS * TILE; // 924 × 546

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

function fitCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const availW = wrap.clientWidth;
  const availH = wrap.clientHeight;
  const scale  = Math.min(availW / W, availH / H);
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

// ================================================================
// TILE DRAW FUNCTIONS
// ================================================================
function drawWall(ctx, px, py, T) {
  ctx.fillStyle = '#363636';
  ctx.fillRect(px, py, T, T);
  ctx.fillStyle = '#404040';
  ctx.fillRect(px+2, py+2, T-4, T-4);
  const even = Math.floor(py/T) % 2 === 0;
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(px, py+T/2); ctx.lineTo(px+T, py+T/2);
  const bx = px + (even ? T/2 : 0);
  ctx.moveTo(bx, py);       ctx.lineTo(bx, py+T/2);
  ctx.moveTo(bx+T/2, py+T/2); ctx.lineTo(bx+T/2, py+T);
  ctx.stroke();
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(px+T-2, py, 2, T);
  ctx.fillRect(px, py+T-2, T, 2);
}

function drawFloor(ctx, px, py, T) {
  const v = (px/T*7 + py/T*13) % 3;
  ctx.fillStyle = v<1 ? '#505050' : v<2 ? '#4c4c4c' : '#484848';
  ctx.fillRect(px, py, T, T);
  ctx.strokeStyle = '#3e3e3e'; ctx.lineWidth = 0.5;
  ctx.strokeRect(px+0.5, py+0.5, T-1, T-1);
}

function drawCellFloor(ctx, px, py, T) {
  const v = (px/T*11 + py/T*7) % 3;
  ctx.fillStyle = v<1 ? '#444e5c' : v<2 ? '#404858' : '#3c4452';
  ctx.fillRect(px, py, T, T);
  ctx.strokeStyle = '#343c4c'; ctx.lineWidth = 0.5;
  ctx.strokeRect(px+0.5, py+0.5, T-1, T-1);
}

function drawDoor(ctx, px, py, T) {
  ctx.fillStyle = '#362416'; ctx.fillRect(px, py, T, T);
  ctx.fillStyle = '#282828';
  ctx.fillRect(px, py, T, 3); ctx.fillRect(px, py+T-3, T, 3);
  ctx.fillStyle = '#4c3820'; ctx.fillRect(px+3, py+3, T-6, T-6);
  ctx.fillStyle = '#706050'; ctx.fillRect(px+4, py+T*0.42|0, T-8, 3);
  ctx.fillStyle = '#8a8a8a'; ctx.fillRect(px+T-8, py+T/2-3|0, 3, 6);
}

function drawBed(ctx, px, py, T) {
  drawCellFloor(ctx, px, py, T);
  const m = 2;
  // Bed frame (dark wood)
  ctx.fillStyle = '#3a2410'; ctx.fillRect(px+m, py+m, T-m*2, T-m*2);
  ctx.strokeStyle = '#5a3820'; ctx.lineWidth = 1;
  ctx.strokeRect(px+m, py+m, T-m*2, T-m*2);
  // Mattress
  ctx.fillStyle = '#7a6050'; ctx.fillRect(px+m+2, py+m+2, T-m*2-4, T-m*2-4);
  // Blanket (lower 2/3)
  ctx.fillStyle = '#5c7080'; ctx.fillRect(px+m+2, py+m+6, T-m*2-4, T-m*2-8);
  // Blanket fold line
  ctx.strokeStyle = '#4a5e6c'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(px+m+2, py+m+6); ctx.lineTo(px+T-m-2, py+m+6); ctx.stroke();
  // Pillow — bright cream, clearly visible
  ctx.fillStyle = '#e0d8b8'; ctx.fillRect(px+m+3, py+m+2, T-m*2-8, 5);
  ctx.strokeStyle = '#c8c0a0'; ctx.lineWidth = 0.5;
  ctx.strokeRect(px+m+3, py+m+2, T-m*2-8, 5);
}

function drawToilet(ctx, px, py, T) {
  drawCellFloor(ctx, px, py, T);
  ctx.fillStyle = '#c0c0c0';
  ctx.beginPath(); ctx.ellipse(px+T/2, py+T*0.62, T*0.27, T*0.24, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#a0a0a0'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(px+T*0.27|0, py+T*0.17|0, T*0.46|0, T*0.26|0);
  ctx.strokeStyle = '#b0b0b0'; ctx.strokeRect(px+T*0.27|0, py+T*0.17|0, T*0.46|0, T*0.26|0);
}

function drawFence(ctx, px, py, T) {
  ctx.fillStyle = '#202020'; ctx.fillRect(px, py, T, T);
  ctx.strokeStyle = '#404040'; ctx.lineWidth = 1.5;
  for (let i=0; i<=2; i++) {
    const fx = px + T*(i/2);
    ctx.beginPath(); ctx.moveTo(fx, py); ctx.lineTo(fx, py+T); ctx.stroke();
  }
  ctx.strokeStyle = '#303030'; ctx.lineWidth = 0.8;
  for (let j=1; j<=4; j++) {
    const fy = py + T*(j/5);
    ctx.beginPath(); ctx.moveTo(px, fy); ctx.lineTo(px+T, fy); ctx.stroke();
  }
}

function drawYard(ctx, px, py, T) {
  const v = (px/T*5 + py/T*11) % 4;
  ctx.fillStyle = v<1?'#4e5638':v<2?'#48503400'.slice(0,9)+'484':v<3?'#4c5440':'#465038';
  ctx.fillStyle = v<1?'#4e5638':v<2?'#485034':v<3?'#4c5440':'#465038';
  ctx.fillRect(px, py, T, T);
  if (v>3.2) { ctx.fillStyle='rgba(80,60,20,0.1)'; ctx.fillRect(px+3,py+3,T-6,T-6); }
}

function drawTable(ctx, px, py, T) {
  drawFloor(ctx, px, py, T);
  const m = 3;
  ctx.fillStyle = '#543818'; ctx.fillRect(px+m, py+m+3, T-m*2, T-m*2-6);
  ctx.fillStyle = '#422c10';
  ctx.fillRect(px+m, py+m, T-m*2, 3);
  ctx.fillRect(px+m, py+T-m-3, T-m*2, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect(px+m+2, py+m+5, T-m*2-4, 2);
}

function drawGymFloor(ctx, px, py, T) {
  const v = (px/T*5 + py/T*7) % 3;
  ctx.fillStyle = v<1 ? '#3a2828' : v<2 ? '#382626' : '#362424';
  ctx.fillRect(px, py, T, T);
  ctx.strokeStyle = '#2a1a1a'; ctx.lineWidth = 0.5;
  ctx.strokeRect(px+0.5, py+0.5, T-1, T-1);
}

function drawShowerFloor(ctx, px, py, T) {
  const v = (px/T*7 + py/T*5) % 3;
  ctx.fillStyle = v<1 ? '#263244' : v<2 ? '#243040' : '#283448';
  ctx.fillRect(px, py, T, T);
  ctx.strokeStyle = '#1a2436'; ctx.lineWidth = 0.5;
  ctx.strokeRect(px+0.5, py+0.5, T-1, T-1);
  ctx.fillStyle = 'rgba(120,170,240,0.10)';
  ctx.fillRect(px+2, py+2, T-4, T-4);
}

function drawShowerHead(ctx, px, py, T) {
  drawShowerFloor(ctx, px, py, T);
  // Stall border
  ctx.strokeStyle = 'rgba(140,190,255,0.22)'; ctx.lineWidth = 1;
  ctx.strokeRect(px+2, py+2, T-4, T-4);
  // Nozzle pipe (vertical line from top)
  ctx.strokeStyle = 'rgba(160,200,255,0.35)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(px+T/2, py+3); ctx.lineTo(px+T/2, py+T*0.45|0); ctx.stroke();
  // Nozzle head (small horizontal bar)
  ctx.beginPath(); ctx.moveTo(px+T/2-3, py+T*0.45|0); ctx.lineTo(px+T/2+3, py+T*0.45|0); ctx.stroke();
  // Water droplets (3 tiny dots below nozzle)
  ctx.fillStyle = 'rgba(140,200,255,0.40)';
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath(); ctx.arc(px+T/2 + i*3, py+T*0.65|0, 1, 0, Math.PI*2); ctx.fill();
  }
}

function drawEquipment(ctx, px, py, T) {
  drawGymFloor(ctx, px, py, T);
  const m = 4;
  ctx.fillStyle = '#606060';
  ctx.fillRect(px+m, py+T/2-2|0, T-m*2, 3);
  ctx.fillStyle = '#484848';
  ctx.fillRect(px+m, py+m+2, 4, T-m*2-4);
  ctx.fillRect(px+T-m-4, py+m+2, 4, T-m*2-4);
  ctx.strokeStyle = '#808080'; ctx.lineWidth = 0.5;
  ctx.strokeRect(px+m, py+m+2, 4, T-m*2-4);
  ctx.strokeRect(px+T-m-4, py+m+2, 4, T-m*2-4);
}

function drawIsoFloor(ctx, px, py, T) {
  const pal = ['#2a3240','#252c38','#1f2530'];
  ctx.fillStyle = pal[((px/T|0)+(py/T|0))%3];
  ctx.fillRect(px, py, T, T);
  ctx.fillStyle = 'rgba(40,50,64,0.4)';
  ctx.fillRect(px, py, T, 1);
}
function drawCounselFloor(ctx, px, py, T) {
  const pal = ['#3a5256','#365054','#324c50'];
  ctx.fillStyle = pal[((px/T|0)+(py/T|0))%3];
  ctx.fillRect(px, py, T, T);
}
function drawLibraryFloor(ctx, px, py, T) {
  const pal = ['#5a4028','#553c24','#4e381f'];
  ctx.fillStyle = pal[((px/T|0)+(py/T|0))%3];
  ctx.fillRect(px, py, T, T);
}

const DRAWERS = {
  wall: drawWall, floor: drawFloor, cell_floor: drawCellFloor,
  door: drawDoor, bed: drawBed, toilet: drawToilet,
  fence: drawFence, yard: drawYard, table: drawTable,
  gym_floor: drawGymFloor, shower_floor: drawShowerFloor, equipment: drawEquipment,
  shower_head: drawShowerHead,
  iso_floor: drawIsoFloor, counsel_floor: drawCounselFloor, library_floor: drawLibraryFloor,
};

// ================================================================
// MAP BUILDER
// ================================================================
function mk(type, walkable, zone) { return { type, walkable, zone }; }

function buildMap() {
  const M = [];
  for (let y=0; y<ROWS; y++) {
    M[y] = [];
    for (let x=0; x<COLS; x++) M[y][x] = mk('wall', false, 'wall');
  }

  // North fence row 1
  for (let x=1; x<=42; x++) M[1][x] = mk('fence', false, 'fence');

  // Yard rows 2-3 (fenced sides at col 1 and col 42)
  for (let y=2; y<=3; y++)
    for (let x=1; x<=42; x++)
      M[y][x] = (x===1||x===42) ? mk('fence',false,'fence') : mk('yard',true,'yard');

  // Inner fence row 4, gate at cols 20-22 (onto vertical corridor)
  for (let x=1; x<=42; x++)
    M[4][x] = (x>=20&&x<=22) ? mk('floor',true,'corridor') : mk('fence',false,'fence');

  // Cafeteria rows 5-7 (cols 2-41); col 21 will be overridden by vertical corridor
  for (let y=5; y<=7; y++)
    for (let x=2; x<=41; x++) M[y][x] = mk('floor', true, 'cafeteria');

  // Cafeteria: two long tables at row 6
  for (let x=4;  x<=18; x++) M[6][x] = mk('table', false, 'cafeteria'); // left long table
  for (let x=23; x<=37; x++) M[6][x] = mk('table', false, 'cafeteria'); // right long table

  // Row 8: wall (separates cafeteria from below) — only col 21 will be opened by vert corridor

  // Gym: cols 10-20, rows 17-21 (entered via left inner corridor col 9)
  for (let y=17; y<=21; y++)
    for (let x=10; x<=20; x++) M[y][x] = mk('gym_floor', true, 'gym');

  // Equipment in gym (non-walkable)
  for (const [ex,ey] of [
    [11,17],[15,17],[19,17],
    [11,19],[16,19],[19,19],
    [11,21],[15,21],[19,21],
  ]) M[ey][ex] = mk('equipment', false, 'gym');

  // Shower: cols 24-34, rows 17-21 (entered via right inner corridor col 35)
  for (let y=17; y<=21; y++)

  for (const [sx,sy] of [[26,18],[29,18],[32,18]]) M[sy][sx] = mk('shower_head', true, 'shower');

  // ── PANOPTIKON CORRIDORS ────────────────────────────────────────
  // Vertical spine: col 21, rows 4-23 (north-south axis)
  for (let y=4; y<=23; y++) M[y][21] = mk('floor', true, 'corridor');

  // Horizontal spine: row 12, cols 5-38 (east-west axis)
  for (let x=5; x<=38; x++) M[12][x] = mk('floor', true, 'corridor');

  // Center hub: cols 20-22, rows 11-13 (widened 3×3 intersection)
  for (let y=11; y<=13; y++)
    for (let x=20; x<=22; x++) M[y][x] = mk('floor', true, 'corridor');

  for (let y=9; y<=23; y++) M[y][9] = mk('floor', true, 'corridor');

  for (let x=5; x<=38; x++) M[23][x] = mk('floor', true, 'corridor');

  M[8][9]  = mk('floor', true, 'corridor');  // left cafeteria entry (via col 9)
  M[8][35] = mk('floor', true, 'corridor');  // right cafeteria entry (via col 35)

  M[4][35] = mk('floor', true, 'corridor');  // right yard gate (via col 35)

  // ── CELL BLOCKS (4 per side, 8 inmates) ────────────────────────
  const BLOCKS = [
    { wr:9,  dr:10, lr:11 },   // above horizontal spine
    { wr:13, dr:14, lr:15 },   // below horizontal spine
    { wr:17, dr:18, lr:19 },   // alongside gym/shower (upper)
    { wr:20, dr:21, lr:22 },   // alongside gym/shower (lower)
  ];
  for (const { wr, dr, lr } of BLOCKS) {
    // Left cells: cols 1-7, door col 8, inner corridor col 9
    for (let x=1; x<=7; x++) M[wr][x] = mk('wall', false, 'wall');
    for (let x=1; x<=7; x++) M[dr][x] = mk('cell_floor', true, 'cell');

    // Right cells: cols 37-42, door col 36, inner corridor col 35

    for (let x=37; x<=42; x++) M[dr][x] = mk('cell_floor', true, 'cell');
    M[dr][36] = mk('door', true, 'cell');
    for (let x=37; x<=42; x++) M[lr][x] = mk('cell_floor', true, 'cell');
    M[lr][36] = mk('wall', false, 'wall');
    // Furniture right
    M[dr][38] = mk('bed',    false, 'cell');
    M[dr][41] = mk('bed',    false, 'cell');
    M[lr][40] = mk('toilet', false, 'cell');
  }

  // ── NYE ROM (rad 24–25) ─────────────────────────────────────────

  for (let y=24; y<=25; y++)
    for (let x=2; x<=6; x++) M[y][x] = mk('iso_floor', true, 'isolation');

    for (let x=24; x<=32; x++) M[y][x] = mk('library_floor', true, 'library');
  M[24][28] = mk('door', true, 'library');

  return M;
}

// occupancy: spotId → inmateId
const occupancy = new Map();

function releaseSpot(inmateId) {
  for (const [spotId, owner] of occupancy) {
    if (owner === inmateId) { occupancy.delete(spotId); return; }
  }
}

function claimSpot(zone, cellDef, inmateId, subzone = null) {
  releaseSpot(inmateId);
  const candidates = Object.values(SPOTS).filter(s => {
    if (s.zone !== zone) return false;
    if (subzone && s.subzone !== subzone) return false;
    if (zone === 'cell' && s.cellId !== cellDef.id) return false;
    if (zone === 'gang') {
      const owner = GS.inmates.find(i => i.id === inmateId);
      if (owner && !owner.groupId) return false;             // ikke i gjeng → ingen gjeng-spot
      if (owner && s.groupId !== owner.groupId) return false;
    }
    return !occupancy.has(s.id);
  });
  if (candidates.length === 0) return null;

  // Soft scoring: nærhet + gjeng + rivaler + traits + litt tilfeldighet.
  // Cellen er fast (ikke et personlig valg); counter i cafeteria er kø-plass → enkel random.
  const self = GS.inmates.find(i => i.id === inmateId);
  const useScoring = self && zone !== 'cell' && subzone !== 'counter';

  let spot;
  if (useScoring) {
    // Tunable vekter — juster her ved playtesting
    const SAME_KAT_W  = 0.30;
    const SAME_GANG_W = 0.45;
    const RIVAL_W     = 0.55;
    const SOCIAL_W    = 0.25;
    const NEAR_R      = TILE * 4;
    const MIN_SCORE   = 0.15;

    const tempMul = { calm: 1.35, normal: 1.0, aggressive: 0.35 };
    const socSign  = { introvert: -1, normal: 0, dominant: +1 };
    const socMag   = { introvert: 1.0, normal: 0.0, dominant: 1.0 };

    const tMul  = tempMul[self.temperament] ?? 1.0;
    const sSign = socSign[self.sosial] ?? 0;
    const sMag  = socMag[self.sosial]  ?? 0;
    const isGangZone = zone === 'gang';

    const others = GS.inmates.filter(o => o.id !== inmateId);

    const scored = candidates.map(s => {
      let katBonus = 0, gangBonus = 0, rivalMalus = 0, crowd = 0;
      for (const o of others) {
        const dx = s.px - o.px, dy = s.py - o.py;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d >= NEAR_R) continue;
        const prox = 1 - d / NEAR_R; // 0..1
        if (o.kategori === self.kategori) katBonus  += SAME_KAT_W  * prox;
        if (self.groupId && o.groupId === self.groupId) gangBonus += SAME_GANG_W * prox;
        else if (self.groupId && o.groupId && !isGangZone) rivalMalus += RIVAL_W * prox * tMul;
        crowd += prox;
      }
      // Cap så ingen faktor dominerer fullstendig
      katBonus   = Math.min(katBonus,   1.0);
      gangBonus  = Math.min(gangBonus,  1.2);
      rivalMalus = Math.min(rivalMalus, 1.5);
      // Aggressive oppsøker konflikt → flipp malus til svak bonus
      if (self.temperament === 'aggressive') rivalMalus *= -0.4;

      const socialTerm = SOCIAL_W * sSign * sMag * Math.min(crowd, 3) / 3;

      const raw = 1.0 + katBonus + gangBonus - rivalMalus + socialTerm;
      return { s, score: Math.max(MIN_SCORE, raw) };
    });

    const total = scored.reduce((sum, x) => sum + x.score, 0);
    let r = Math.random() * total;
    spot = scored[scored.length - 1].s; // fallback
    for (const { s, score } of scored) {
      r -= score;
      if (r <= 0) { spot = s; break; }
    }
  } else {
    spot = candidates[Math.floor(Math.random() * candidates.length)];
  }

  occupancy.set(spot.id, inmateId);
  return spot;
}

function fallbackPos(zone, cellDef, groupId = null) {
  if (zone === 'cell') {
    const p = cellDef.walkPos[Math.floor(Math.random() * cellDef.walkPos.length)];
    return { px: p.x*TILE+TILE/2, py: p.y*TILE+TILE/2, id: null };
  }
  if (zone === 'cafeteria') return { px: (2+rInt(0,18))*TILE+TILE/2, py: (5+rInt(0,2))*TILE+TILE/2, id: null };
  if (zone === 'yard')      return { px: (2+rInt(0,39))*TILE+TILE/2, py: rInt(2,3)*TILE+TILE/2, id: null };
  if (zone === 'gang') {
    const gs = Object.values(SPOTS).filter(s => s.zone === 'gang' && (!groupId || s.groupId === groupId));
    if (gs.length) return gs[Math.floor(Math.random() * gs.length)];
    return { px: rInt(4,38)*TILE+TILE/2, py: rInt(2,3)*TILE+TILE/2, id: null };
  }
  if (zone === 'gym')       return { px: (10+rInt(0,10))*TILE+TILE/2, py: (17+rInt(0,4))*TILE+TILE/2, id: null };
  if (zone === 'shower')    return { px: (24+rInt(0,10))*TILE+TILE/2, py: (17+rInt(0,4))*TILE+TILE/2, id: null };
  if (zone === 'isolation')  return { px: 4*TILE+TILE/2,  py: 25*TILE+TILE/2, id: null };
  if (zone === 'counseling') return { px: 15*TILE+TILE/2, py: 25*TILE+TILE/2, id: null };
  if (zone === 'library')    return { px: 28*TILE+TILE/2, py: 25*TILE+TILE/2, id: null };
  return { px: rInt(9,35)*TILE+TILE/2, py: rInt(12,23)*TILE+TILE/2, id: null };
}

// ================================================================
// WAYPOINT PATH BUILDER
// ================================================================
function buildPath(inmate, targetZone, destSpot = null) {
  const def = getCellDef(inmate.cellId);
  const { doorCol, doorRow, innerCol, side } = def;
  const pts = [];

  const spot = destSpot || claimSpot(targetZone, def, inmate.id) || fallbackPos(targetZone, def, inmate.groupId);
  inmate.currentSpotId = spot.id || null;
  const dest = { px: spot.px, py: spot.py };

  if (targetZone === inmate.zone) { pts.push(dest); return pts; }

  // Choose east-west level: HORIZ_R (row 12) or CROSS_R (row 23, bottom).
  // Lower blocks and gym/shower exits prefer the cross-corridor.
  // Cafeteria and yard must use HORIZ_R (to reach col 21 vertical corridor).
  const bottomProb = doorRow >= 20 ? 0.70 : doorRow >= 17 ? 0.50 : doorRow >= 13 ? 0.28 : 0.12;
  const useBottom = Math.random() < bottomProb
    && targetZone !== 'cafeteria' && targetZone !== 'yard' && targetZone !== 'gang';
  let atRow = useBottom ? CROSS_R : HORIZ_R;

  // ── EXIT ────────────────────────────────────────────────────────
  if (inmate.zone === 'cell') {
    pts.push(tp(doorCol, doorRow));
    pts.push(tp(innerCol, doorRow));
    pts.push(tp(innerCol, atRow));    // walk inner corridor up (HORIZ_R) or down (CROSS_R)

  } else if (inmate.zone === 'yard' || inmate.zone === 'gang') {
    // Exit yard/gang: 3-way weighted choice of gate used
    const yExitR = Math.random();
    const yExitVia = side === 'L'
      ? (yExitR < 0.42 ? 'left' : yExitR < 0.80 ? 'center' : 'right')
      : (yExitR < 0.42 ? 'right' : yExitR < 0.80 ? 'center' : 'left');
    if (yExitVia === 'left') {
      pts.push(tp(L_INNER, 3));
      pts.push(tp(L_INNER, HORIZ_R));
      atRow = HORIZ_R;
    } else if (yExitVia === 'right') {
      pts.push(tp(R_INNER, 3));
      pts.push(tp(R_INNER, HORIZ_R));
      atRow = HORIZ_R;
    } else {
      pts.push(tp(VERT_X, 3));
      pts.push(tp(VERT_X, HORIZ_R));
      atRow = HORIZ_R;
    }

  } else if (inmate.zone === 'cafeteria') {
    // Exit cafeteria: 3-way weighted choice of exit used
    const cExitR = Math.random();
    const cExitVia = side === 'L'
      ? (cExitR < 0.42 ? 'left' : cExitR < 0.80 ? 'center' : 'right')
      : (cExitR < 0.42 ? 'right' : cExitR < 0.80 ? 'center' : 'left');
    if (cExitVia === 'left') {
      pts.push(tp(L_INNER, 6));
      pts.push(tp(L_INNER, HORIZ_R));
    } else if (cExitVia === 'right') {
      pts.push(tp(R_INNER, 6));
      pts.push(tp(R_INNER, HORIZ_R));
    } else {
      pts.push(tp(VERT_X, HORIZ_R));
    }
    atRow = HORIZ_R;

  } else if (inmate.zone === 'gym') {
    // Exit via left inner corridor; randomly choose top or bottom level
    const gymExit = Math.random() < 0.45 ? CROSS_R : HORIZ_R;
    pts.push(tp(L_INNER, 17));        // step out of gym to inner corridor
    pts.push(tp(L_INNER, gymExit));
    atRow = gymExit;

  } else if (inmate.zone === 'shower') {
    // Exit via right inner corridor
    const shwExit = Math.random() < 0.45 ? CROSS_R : HORIZ_R;
    pts.push(tp(R_INNER, 17));
    pts.push(tp(R_INNER, shwExit));
    atRow = shwExit;

  } else if (inmate.zone === 'isolation') {
    pts.push(tp(5, 24));
    pts.push(tp(5, CROSS_R));
    atRow = CROSS_R;
  } else if (inmate.zone === 'counseling') {
    pts.push(tp(15, 24));
    pts.push(tp(15, CROSS_R));
    atRow = CROSS_R;
  } else if (inmate.zone === 'library') {
    pts.push(tp(28, 24));
    pts.push(tp(28, CROSS_R));
    atRow = CROSS_R;
  } else {
    // corridor — atRow already set
  }

  // ── ENTER ─────────────────────────────────────────────────────
  if (targetZone === 'cell') {
    // Navigate to inmate's own inner corridor, then walk to door row
    pts.push(tp(innerCol, atRow));
    pts.push(tp(innerCol, doorRow));
    pts.push(tp(doorCol, doorRow));
    pts.push(dest);

  } else if (targetZone === 'cafeteria') {
    // 3-way weighted entry: left (col 9) | center (col 21) | right (col 35)
    const cEntR = Math.random();
    const cEntVia = side === 'L'
      ? (cEntR < 0.42 ? 'left' : cEntR < 0.80 ? 'center' : 'right')
      : (cEntR < 0.42 ? 'right' : cEntR < 0.80 ? 'center' : 'left');
    if (atRow === CROSS_R) pts.push(tp(cEntVia === 'center' ? VERT_X : (cEntVia === 'left' ? L_INNER : R_INNER), CROSS_R));
    if (cEntVia === 'left') {
      pts.push(tp(L_INNER, HORIZ_R));
      pts.push(tp(L_INNER, 6));
    } else if (cEntVia === 'right') {
      pts.push(tp(R_INNER, HORIZ_R));
      pts.push(tp(R_INNER, 6));
    } else {
      pts.push(tp(VERT_X, HORIZ_R));
      pts.push(tp(VERT_X, 6));
    }
    pts.push(dest);

  } else if (targetZone === 'yard') {
    // 3-way weighted entry: left (col 9) | center (col 21) | right (col 35)
    const yEntR = Math.random();
    const yEntVia = side === 'L'
      ? (yEntR < 0.42 ? 'left' : yEntR < 0.80 ? 'center' : 'right')
      : (yEntR < 0.42 ? 'right' : yEntR < 0.80 ? 'center' : 'left');
    if (atRow === CROSS_R) pts.push(tp(yEntVia === 'center' ? VERT_X : (yEntVia === 'left' ? L_INNER : R_INNER), CROSS_R));
    if (yEntVia === 'left') {
      pts.push(tp(L_INNER, HORIZ_R));
      pts.push(tp(L_INNER, 4));
      pts.push(tp(L_INNER, 2));
    } else if (yEntVia === 'right') {
      pts.push(tp(R_INNER, HORIZ_R));
      pts.push(tp(R_INNER, 4));
      pts.push(tp(R_INNER, 2));
    } else {
      pts.push(tp(VERT_X, HORIZ_R));
      pts.push(tp(VERT_X, 5));
      pts.push(tp(VERT_X, 3));
    }
    pts.push(dest);

  } else if (targetZone === 'gang') {
    // Enter gang rally point — same routing as yard (same physical space)
    const gEntR = Math.random();
    const gEntVia = side === 'L'
      ? (gEntR < 0.42 ? 'left' : gEntR < 0.80 ? 'center' : 'right')
      : (gEntR < 0.42 ? 'right' : gEntR < 0.80 ? 'center' : 'left');
    if (atRow === CROSS_R) pts.push(tp(gEntVia === 'center' ? VERT_X : (gEntVia === 'left' ? L_INNER : R_INNER), CROSS_R));
    if (gEntVia === 'left') {
      pts.push(tp(L_INNER, HORIZ_R));
      pts.push(tp(L_INNER, 4));
      pts.push(tp(L_INNER, 2));
    } else if (gEntVia === 'right') {
      pts.push(tp(R_INNER, HORIZ_R));
      pts.push(tp(R_INNER, 4));
      pts.push(tp(R_INNER, 2));
    } else {
      pts.push(tp(VERT_X, HORIZ_R));
      pts.push(tp(VERT_X, 5));
      pts.push(tp(VERT_X, 3));
    }
    pts.push(dest);

  } else if (targetZone === 'gym') {
    // Enter gym via left inner corridor (col 9 → col 10 at row 17)
    // Does NOT route through col 21 — avoids vertical corridor bottleneck
    pts.push(tp(L_INNER, atRow));          // walk to left inner at chosen level
    pts.push(tp(L_INNER, 17));             // down inner to gym row
    const gx = 10 + Math.floor(Math.random() * 5);
    pts.push(tp(gx, 17));                  // step right into gym top
    pts.push(dest);

  } else if (targetZone === 'shower') {
    // Enter shower via right inner corridor (col 35 → col 34 at row 17)
    // Does NOT route through col 21
    pts.push(tp(R_INNER, atRow));          // walk to right inner at chosen level
    pts.push(tp(R_INNER, 17));             // down inner to shower row
    const sx = 29 + Math.floor(Math.random() * 5);
    pts.push(tp(sx, 17));                  // step left into shower top
    pts.push(dest);

  } else if (targetZone === 'isolation') {
    if (atRow !== CROSS_R) pts.push(tp(VERT_X, CROSS_R));
    pts.push(tp(5, CROSS_R));
    pts.push(tp(5, 24));
    pts.push(dest);
  } else if (targetZone === 'counseling') {
    if (atRow !== CROSS_R) pts.push(tp(VERT_X, CROSS_R));
    pts.push(tp(15, CROSS_R));
    pts.push(tp(15, 24));
    pts.push(dest);
  } else if (targetZone === 'library') {
    if (atRow !== CROSS_R) pts.push(tp(VERT_X, CROSS_R));
    pts.push(tp(28, CROSS_R));
    pts.push(tp(28, 24));
    pts.push(dest);
  }

  return pts;
}

// ================================================================
// INMATE CLASS
// ================================================================
let UID = 1;
const NAMES = [
  // Norske
  'Erik Dahl','Lars Berg','Knut Vik','Ole Moe','Jan Bye','Per Rud',
  'Tor Lund','Arne Foss','Ivar Nag','Bjørn Hov','Rolf Ask','Geir Sol',
  'Svein Holm','Kåre Ek','Odd Ruud','Trond Sæter','Magne Ro','Harald Lid',
  'Gunnar Os','Einar Myr','Stein Bø','Helge Fure',
  // Polske / baltiske
  'Piotr Nowak','Tomasz Wójcik','Kamil Dąbrowski',
  'Mindaugas Petras','Darius Kazlauskas',
  // Somaliske / østafrikanske
  'Ahmed Hassan','Omar Ali','Yusuf Mahamed','Hassan Abdi','Samuel Tesfay',
  // Sør-asiatiske
  'Amir Khan','Tariq Hussain','Rashid Malik',
  // Midtøsten / Nord-Afrika
  'Mohammed Saleh','Ali Rahimi','Karim Fassi',
  // Tyrkiske / Balkan
  'Mehmet Yilmaz','Emre Demir','Dragan Petrović','Viktor Ivanov',
];

// Unik navn-velger: tar neste ledige fra NAMES, eller suffikser med tall hvis alle er brukt
function pickUniqueName() {
  const taken = new Set(GS.inmates.map(i => i.name));
  for (const n of NAMES) {
    if (!taken.has(n)) return n;
  }
  for (let k = 2; k < 100; k++) {
    for (const n of NAMES) {
      const cand = `${n} ${k}`;
      if (!taken.has(cand)) return cand;
    }
  }
  return `Innsatt ${GS.inmates.length + 1}`;
}

const CLOTH_COLORS = ['#c85020','#3858a0','#a02020','#607838','#703898','#a0943a'];
const SKIN_TONES   = ['#f0c888','#d4906a','#b06838','#7c4020'];
const HAIR_COLORS  = ['#181008','#4c3018','#787878','#b09838'];
const KATEGORIER   = ['vold','økonomi','narkotika','tyveri','annet'];

// Kvirk — én valgfri personlighetsflavor per innsatt (ca. 40% har en)
const KVIRK_OPTS = [
  ['none',        0.60],
  ['paranoid',    0.08],
  ['impulsiv',    0.08],
  ['karismatisk', 0.08],
  ['nervøs',      0.08],
  ['fanatisk',    0.08],
];

// Aktivitet — settes ved fase-skifte, påvirker uro per tick
const AKTIVITETER = ['ingen','trening','sosial','lesing','dusj','samling'];

class Inmate {
  constructor(cellId) {
    this.id            = UID++;
    this.name          = pickUniqueName();
    this.cellId        = cellId;
    this.cellSlot      = 0;
    this.groupId       = Math.random() < 0.65 ? ['A','B','C'][this.id % 3] : null;
    this.zone          = 'cell';
    this.targetZone    = 'cell';
    this.waypoints     = [];
    this.speed         = 0.52 + Math.random()*0.28;
    this.currentSpotId    = null;
    this.phaseDelay       = 0;
    this.pendingZone      = null;
    this.cafState         = null;  // null | 'to_counter' | 'to_seat' | 'seated'
    this.cafSeat          = null;
    this.cafCounterDelay  = 0;
    this.cafCounterTarget = 0;
    this.sleepState          = null;   // null | 'to_bed' | 'going_to_bed' | 'in_bed'
    this.isBeingIntervened   = false;

    // Core stats
    this.unrest   = 10 + Math.random()*20;
    this.health   = 80 + Math.random()*20;
    this.energi   = 40 + Math.random()*60;   // 0–100, drains when active, recharges at night
    this.hygiene  = 40 + Math.random()*60;   // 0–100, drains over time, recharges in shower
    this.disiplin = 20 + Math.random()*80;   // 0–100, erodes when unrest is high
    this.dominans = 10 + Math.random()*90;   // 0–100, drifts slowly toward mean

    // Sentence in simulated days
    this.soningstidTotalt = 20 + Math.floor(Math.random()*61);  // 20–80 dager
    this.soningstidIgjen  = this.soningstidTotalt;

    // Traits — stabile personlighetstrekk (påvirker spot-valg og konflikt)
    const pickWeighted = (opts) => {
      const r = Math.random(); let acc = 0;
      for (const [val, w] of opts) { acc += w; if (r < acc) return val; }
      return opts[opts.length-1][0];
    };
    this.temperament      = pickWeighted([['calm',0.30],['normal',0.50],['aggressive',0.20]]);
    this.sosial           = pickWeighted([['introvert',0.30],['normal',0.50],['dominant',0.20]]);
    this.stressTolerance  = pickWeighted([['low',0.25],['medium',0.50],['high',0.25]]);
    this.isolationResponse = pickWeighted([['positive',0.30],['neutral',0.50],['negative',0.20]]);
    this.kvirk            = pickWeighted(KVIRK_OPTS);   // 'none'|'paranoid'|'impulsiv'|'karismatisk'|'nervøs'|'fanatisk'
    this.idolId           = null;                        // kun fanatisk: ID til karismatisk idol
    this.aktivitet        = 'ingen';                     // settes ved fase-skifte

    // Conflict state
    this.inConflict       = false;
    this.conflictFlashMs  = 0;    // visuell markør, telles ned per tick
    this.conflictCooldown = 0;    // ms til neste konflikt kan triggres
    this.conflictCount    = 0;    // teller konflikter siden siste isolat-slutt
    this.isolationTicks   = 0;    // gjenværende isolat-tid i ticks (0 = fri)
    this.isolatCount      = 0;    // totalt antall ganger i isolat
    this.ry               = 0;    // omdømme — +2 kamp-seier, +1 venn i egen gjeng, -3 isolat

    // Fight state (v0.9.1 kamp-logikk)
    this.strength         = 40 + Math.random() * 40;   // 40–80
    this.inFight          = false;
    this.fightMs          = 0;     // gjenværende kamp-varighet
    this.fightOpponent    = null;  // id til motstander

    // Rom-opphold etter kamp: hvilken type sone vi er i
    // 'isolation' | 'counseling' | 'library' | null
    this.postFightRoom    = null;

    // Personlig historikk — korte hendelser, nyeste først
    this.history          = [];

    // Relasjoner (v0.9.4)
    this.friendId              = null;
    this.notifiedFriendInRoom  = null;  // dedupe: lagrer friendId siste gang historikk ble logget for "venn i rom"

    // Frivillige biblioteksbesøk (v0.9.6) — teller kun opp når inm har gått dit av eget valg
    this.libraryVisits  = 0;
    this._wasInLibrary  = false;

    // Starting position
    const def = getCellDef(cellId);
    const pos = def.walkPos[0];
    this.px = pos.x * TILE + TILE/2;
    this.py = pos.y * TILE + TILE/2;

    // Crime category
    this.kategori = KATEGORIER[Math.floor(Math.random()*KATEGORIER.length)];

    // Visual look — generated once, stays with this inmate
    const pick = arr => arr[Math.floor(Math.random()*arr.length)];
    this.look = {
      clothColor: pick(CLOTH_COLORS),
      skinTone:   pick(SKIN_TONES),
      hairStyle:  Math.random() < 0.20 ? 0 : (Math.random() < 0.60 ? 1 : 2), // 0=skallete 1=kort 2=hette
      hairColor:  pick(HAIR_COLORS),
      beard:      Math.random() < 0.30,
      scar:       Math.random() < 0.15,
      sizeFactor: 0.85 + Math.random()*0.30,
    };
  }

  // Called by tick() — staggerMs delays before the path is actually built
  setTargetZone(zone, staggerMs = 0) {
    if (staggerMs > 0) {
      this.pendingZone = zone;
      this.phaseDelay  = staggerMs;
      return;
    }
    this._applyZoneChange(zone);
  }

  _applyZoneChange(zone) {
    if (zone === this.targetZone && zone === this.zone) return;
    // Snap current zone from tile position
    const tx = (this.px / TILE) | 0;
    const ty = (this.py / TILE) | 0;
    const tile = GS.map[ty]?.[tx];
    if (tile) {
      const z = tile.zone;
      if      (z === 'cell'       ) this.zone = 'cell';
      else if (z === 'cafeteria'  ) this.zone = 'cafeteria';
      else if (z === 'yard'       ) this.zone = 'yard';
      else if (z === 'gym'        ) this.zone = 'gym';
      else if (z === 'shower'     ) this.zone = 'shower';
      else if (z === 'isolation'  ) this.zone = 'isolation';
      else if (z === 'counseling' ) this.zone = 'counseling';
      else if (z === 'library'    ) this.zone = 'library';
      else                          this.zone = 'corridor';
    }
    this.targetZone  = zone;
    this.pendingZone = null;

    if (zone === 'cafeteria') {
      // Two-step: counter (food pick-up) → seat
      const def = getCellDef(this.cellId);
      const counterSpot = claimSpot('cafeteria', def, this.id, 'counter')
                       || fallbackPos('cafeteria', def);
      this.cafState         = 'to_counter';
      this.cafSeat          = null;
      this.cafCounterDelay  = 0;
      this.cafCounterTarget = 1000 + Math.random() * 1000; // 1–2 s pause at counter
      this.currentSpotId    = counterSpot.id || null;
      this.waypoints        = buildPath(this, 'cafeteria', counterSpot);
      this.sleepState       = null;
    } else if (zone === 'cell') {
      this.cafState   = null;
      this.cafSeat    = null;
      // Night: will walk to bed after arriving in cell
      this.sleepState = PHASES[GS.phaseIndex] === 'Natt' ? 'to_bed' : null;
      this.waypoints  = buildPath(this, 'cell');
    } else {
      this.cafState   = null;
      this.cafSeat    = null;
      this.sleepState = null;
      this.waypoints  = buildPath(this, zone);
    }
  }

  move(dt) {
    // Handle stagger delay
    if (this.phaseDelay > 0) {
      this.phaseDelay -= dt;
      if (this.phaseDelay <= 0 && this.pendingZone) {
        this._applyZoneChange(this.pendingZone);
      }
      return;
    }

    // Stopp bevegelse under kamp — de står og slåss
    if (this.inFight) return;

    if (this.waypoints.length === 0) {
      // Cafeteria sub-state machine
      if (this.cafState === 'to_counter') {
        this.cafCounterDelay += dt;
        if (this.cafCounterDelay >= this.cafCounterTarget) {
          const def  = getCellDef(this.cellId);
          const seat = claimSpot('cafeteria', def, this.id, 'seat')
                    || fallbackPos('cafeteria', def);
          this.cafSeat   = seat;
          this.waypoints = [{ px: seat.px, py: seat.py }];
          this.cafState  = 'to_seat';
        }
        return;
      }
      if (this.cafState === 'to_seat') {
        this.cafState = 'seated';
        return;
      }

      // Sleep state machine — walk to bed, then lie down
      if (this.sleepState === 'to_bed' && this.zone === 'cell') {
        const def = getCellDef(this.cellId);
        const bed = def.beds[this.cellSlot] || def.beds[0];
        this.waypoints = [{ px: bed.x * TILE + TILE / 2, py: bed.y * TILE + TILE / 2 }];
        this.sleepState = 'going_to_bed';
        return;
      }
      if (this.sleepState === 'going_to_bed') {
        this.sleepState = 'in_bed';
        return;
      }

      // No wander during night, shower, or while seated eating
      const isNight  = PHASES[GS.phaseIndex] === 'Natt';
      const isShower = this.zone === 'shower';
      const isSeated     = this.cafState === 'seated';
      const isInBed      = this.sleepState === 'in_bed';
      const isIntervened = this.isBeingIntervened;
      if (!isNight && !isShower && !isSeated && !isInBed && !isIntervened && Math.random() < 0.001) {
        this.waypoints = buildPath(this, this.targetZone);
      }
      return;
    }
    const wp = this.waypoints[0];
    const dx = wp.px - this.px, dy = wp.py - this.py;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < 2) {
      this.px = wp.px; this.py = wp.py;
      this.waypoints.shift();
      if (this.waypoints.length === 0) this.zone = this.targetZone;
    } else {
      const spd = this.speed * dt * 0.054;
      this.px += dx/d * spd;
      this.py += dy/d * spd;
    }
  }
}

// ================================================================
// GUARD CLASS
// ================================================================
class Guard {
  constructor(patrol, pi = 0) {
    this.patrol            = patrol;
    this.pi                = pi;
    this.px                = patrol[pi].x * TILE + TILE/2;
    this.py                = patrol[pi].y * TILE + TILE/2;
    this.speed             = 0.75;
    this.target            = null;  // Inmate being targeted, or null
    this.interventionTimer = 0;     // ms spent intervening
    this.scanTimer         = 0;     // ms until next target scan
  }

  move(dt) {
    // Periodically scan for high-unrest target
    this.scanTimer -= dt;
    if (this.scanTimer <= 0 && !this.target) {
      // Adaptiv scan-rate: dobler tempo ved høy uro i fengselet
      const anyHigh = GS.inmates.some(i => i.unrest > 70);
      this.scanTimer = anyHigh ? 1000 : 2000;
      let best = null, bestScore = -1;
      for (const inm of GS.inmates) {
        if (!inm.inConflict && inm.unrest < 78) continue;   // konflikt → alltid kandidat
        const dx = inm.px - this.px, dy = inm.py - this.py;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < TILE * 10) {
          const base = inm.inConflict ? inm.unrest + 60 : inm.unrest; // konflikt-pri styrket
          const score = base - d * 0.05;
          if (score > bestScore) { best = inm; bestScore = score; }
        }
      }
      this.target = best;
    }

    if (this.target) {
      // Drop target if inmate has calmed down
      if (this.target.unrest < 40) {
        this.target.isBeingIntervened = false;
        this.target = null; this.interventionTimer = 0;
      } else {
        const dx = this.target.px - this.px, dy = this.target.py - this.py;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < TILE * 1.2) {
          // Intervening: stand still, calm the inmate
          this.target.isBeingIntervened = true;
          this.target.waypoints = [];
          this.target.unrest = Math.max(0, this.target.unrest - 2.5);
          // Vakt avbryter pågående kamp — la resolve trigge neste tick
          if (this.target.inFight) this.target.fightMs = Math.min(this.target.fightMs, 200);
          this.interventionTimer += dt;
          if (this.interventionTimer >= 4000) {
            this.target.isBeingIntervened = false;
            this.target = null; this.interventionTimer = 0;
          }
        } else {
          // Pursue — move directly toward inmate
          const spd = this.speed * dt * 0.054;
          this.px += dx/d * spd;
          this.py += dy/d * spd;
        }
      }
      return;
    }

    // Normal patrol
    const g = this.patrol[this.pi];
    const tx = g.x*TILE + TILE/2, ty = g.y*TILE + TILE/2;
    const dx = tx - this.px, dy = ty - this.py;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < 3) {
      this.pi = (this.pi + 1) % this.patrol.length;
      // Smartere patrulje: når vi runder, sikt mot waypoint nærmest høyeste-uro-innsatt (hvis uro > 55)
      if (this.pi === 0) {
        let hotInm = null, hotUnrest = 55;
        for (const inm of GS.inmates) {
          if (inm.unrest > hotUnrest && inm.isolationTicks === 0 && inm.zone !== 'cell') {
            hotUnrest = inm.unrest; hotInm = inm;
          }
        }
        if (hotInm) {
          let bestI = 0, bestD = Infinity;
          for (let i = 0; i < this.patrol.length; i++) {
            const wx = this.patrol[i].x*TILE + TILE/2;
            const wy = this.patrol[i].y*TILE + TILE/2;
            const wd = Math.hypot(wx - hotInm.px, wy - hotInm.py);
            if (wd < bestD) { bestD = wd; bestI = i; }
          }
          this.pi = bestI;
        }
      }
    } else {
      const spd = this.speed * dt * 0.054;
      this.px += dx/d * spd;
      this.py += dy/d * spd;
    }
  }
}

// ================================================================
// SPAWN
// ================================================================
function spawn() {
  for (const def of CELL_DEFS) {
    for (let slot = 0; slot < 2; slot++) {
      const inm = new Inmate(def.id);
      inm.cellSlot = slot;
      const wp = def.walkPos[slot] || def.walkPos[0];
      inm.px = wp.x * TILE + TILE / 2;
      inm.py = wp.y * TILE + TILE / 2;
      GS.inmates.push(inm);
    }
  }

  // Guard 1: horizontal spine patrol (east-west sweep along row 12)
  GS.guards.push(new Guard([{x:5,y:12},{x:21,y:12},{x:38,y:12},{x:21,y:12}]));
  // Guard 2: inner corridors + bottom cross (full perimeter loop)
  GS.guards.push(new Guard([{x:9,y:9},{x:9,y:23},{x:35,y:23},{x:35,y:9}]));
  // Guard 3: cafeteria + yard via vertical corridor
  GS.guards.push(new Guard([{x:21,y:6},{x:8,y:6},{x:21,y:6},{x:21,y:2},{x:21,y:6},{x:34,y:6}]));
  // Guard 4: vertical spine + gym/shower observer (panoptikon guard)
  GS.guards.push(new Guard([{x:21,y:12},{x:21,y:5},{x:21,y:12},{x:21,y:19},{x:21,y:12}]));

  assignIdols();
}

// Gjengleder per A/B/C: høyest ry → høyest strength → lavest id.
function computeLeaders() {
  const leaders = {};
  for (const gang of ['A','B','C']) {
    let best = null;
    for (const inm of GS.inmates) {
      if (inm.groupId !== gang) continue;
      if (!best) { best = inm; continue; }
      if (inm.ry > best.ry) best = inm;
      else if (inm.ry === best.ry) {
        if (inm.strength > best.strength) best = inm;
        else if (inm.strength === best.strength && inm.id < best.id) best = inm;
      }
    }
    if (best) leaders[gang] = best.id;
  }
  return leaders;
}

// Fanatiske får en karismatisk idol etter spawn. Null hvis ingen karismatisk eksisterer.
function assignIdols() {
  const karismatiske = GS.inmates.filter(i => i.kvirk === 'karismatisk');
  for (const inm of GS.inmates) {
    if (inm.kvirk !== 'fanatisk') continue;
    if (karismatiske.length === 0) { inm.idolId = null; continue; }
    inm.idolId = karismatiske[Math.floor(Math.random()*karismatiske.length)].id;
  }
}

// Fjerner innsatt på indeks i, rydder referanser, spawner erstatning.
function removeInmate(i) {
  const inm = GS.inmates[i];
  const cellId = inm.cellId;
  const removedId = inm.id;
  const wasKarismatisk = inm.kvirk === 'karismatisk';

  releaseSpot(removedId);
  if (GS.selectedId === removedId) GS.selectedId = null;
  if (GS.hoverId === removedId) GS.hoverId = null;

  for (const other of GS.inmates) {
    if (other === inm) continue;
    if (other.friendId === removedId) {
      other.friendId = null;
      other.notifiedFriendInRoom = null;
    }
    if (other.idolId === removedId) other.idolId = null;
    if (other.fightOpponent === removedId) {
      other.fightOpponent = null;
      other.inFight = false;
      other.fightMs = 0;
    }
    if (other.notifiedFriendInRoom === removedId) other.notifiedFriendInRoom = null;
  }

  GS.stats.disappeared++;
  GS.inmates.splice(i, 1);

  const fresh = new Inmate(cellId);
  fresh.setTargetZone(PHASE_ZONE[PHASES[GS.phaseIndex]]);
  GS.inmates.push(fresh);

  if (wasKarismatisk) assignIdols();
}

// ================================================================
// CONFLICT MECHANIC
// ================================================================
const CONFLICT_DIST       = TILE * 1.5;   // rivaler trenger ikke være helt inntil
const HEALTH_FLOOR        = 0;            // 0 = innsatt kan forsvinne ved health<=0
const CONFLICT_COOLDOWN   = 12000;        // 12s før samme innsatt kan igjen
const FLASH_DURATION      = 1800;         // 1.8s visuell markør

// stressTolerance → unrest-terskel der innsatt er "på randen"
const STRESS_THRESHOLD = { low: 35, medium: 50, high: 65 };
// temperament → sjanse for å TRIGGE når alle andre krav er møtt
const AGGRESSION_ROLL  = { calm: 0.10, normal: 0.45, aggressive: 0.80 };

// Rom-opphold: konsekvens av gjentatte konflikter. Innsatt "velger" ett av tre rom.
const ISOLATION_THRESHOLD = 3;                                     // konflikter før rom-ruting
const ROOM_DURATION = {
  isolation:  1020,   // full døgnsyklus — straff
  counseling:  340,   // ~1 fase
  library:     680,   // ~2 faser, roligere
};

// Weighted random basert på personlighet + uro
function chooseRoomAfterFight(inm) {
  const w = { isolation: 1.0, counseling: 1.0, library: 1.0 };

  if (inm.unrest > 70) w.isolation *= 2.0;
  if (inm.unrest > 85) w.isolation *= 1.5;

  if (inm.kvirk === 'nervøs')       { w.counseling *= 2.5; w.isolation  *= 0.7; }
  if (inm.kvirk === 'karismatisk')  { w.isolation  *= 0.4; w.library    *= 1.3; }
  if (inm.kvirk === 'paranoid')     { w.counseling *= 0.4; w.library    *= 1.3; }
  if (inm.kvirk === 'fanatisk')     { w.counseling *= 0.6; }

  if (inm.stressTolerance === 'low')    w.counseling *= 2.0;
  if (inm.temperament   === 'calm')     w.library    *= 1.8;
  if (inm.temperament   === 'aggressive'){ w.isolation *= 1.4; w.library *= 0.5; }
  if (inm.sosial        === 'introvert') w.library    *= 1.4;
  if (inm.health        < 50)            w.counseling *= 1.4;

  const total = w.isolation + w.counseling + w.library;
  let r = Math.random() * total;
  if ((r -= w.isolation)  <= 0) return 'isolation';
  if ((r -= w.counseling) <= 0) return 'counseling';
  return 'library';
}

function sendToRoomAfterFight(inm) {
  if (inm.isolationTicks > 0) return;      // allerede på opphold
  const room = chooseRoomAfterFight(inm);
  inm.postFightRoom      = room;
  inm.isolationTicks     = ROOM_DURATION[room];
  inm.conflictCount      = 0;
  if (room === 'isolation')      GS.stats.isolation++;
  else if (room === 'counseling') GS.stats.counseling++;
  else if (room === 'library')    GS.stats.library++;
  if (room === 'isolation') {
    inm.isolatCount++;
    inm.ry              -= 3;
    inm.soningstidIgjen  += 1;
    inm.soningstidTotalt += 1;
  }
  inm.waypoints   = [];
  inm.pendingZone = null;
  releaseSpot(inm.id);
  inm.setTargetZone(room);
  addHistory(inm,
    room === 'isolation'  ? 'Sendt til isolat' :
    room === 'counseling' ? 'Sendt til samtale' :
                            'Sendt til biblioteket');
}

const HISTORY_ROOM_LINES = {
  isolation:  { pos: ['Kom rolig ut av isolatet', 'Roet seg i isolatet'],
                neg: ['Kom verre ut av isolatet', 'Brøt ned i isolatet'] },
  counseling: { pos: ['Roet seg i samtalen', 'Åpnet seg i samtalen'],
                neg: ['Samtalen hjalp ikke', 'Sa ingenting i samtalen'] },
  library:    { pos: ['Fant ro i biblioteket', 'Roet seg blant bøkene'],
                neg: ['Rastløs i biblioteket', 'Fant ikke ro blant bøkene'] },
};

// Ferdig-effekt: kalles når timeren går til 0
function applyRoomEffect(inm) {
  const room = inm.postFightRoom;
  if (!room) return;
  let d = 0, neg = false;

  if (room === 'isolation') {
    d = -25;
    if (inm.isolationResponse === 'positive')      d -= 10;
    else if (inm.isolationResponse === 'negative') { d = 15; neg = true; }
    if (inm.kvirk === 'nervøs') { d += 10; if (d > 0) neg = true; }
    if (inm.kvirk === 'fanatisk') {
      const idol = GS.inmates.find(x => x.id === inm.idolId);
      if (!idol || idol.isolationTicks > 0) { d += 8; if (d > -5) neg = true; }
    }
    addHistory(inm, pickRandom(HISTORY_ROOM_LINES.isolation[neg ? 'neg' : 'pos']));
  } else if (room === 'counseling') {
    d = -12;
    if (inm.kvirk          === 'nervøs')      d -= 10;
    if (inm.stressTolerance === 'low')        d -= 6;
    if (inm.temperament    === 'aggressive') { d += 4; neg = true; }
    if (inm.kvirk          === 'paranoid')   { d += 3; neg = true; }
    addHistory(inm, pickRandom(HISTORY_ROOM_LINES.counseling[neg ? 'neg' : 'pos']));
  } else if (room === 'library') {
    d = -8;
    if (inm.temperament === 'calm' || inm.sosial === 'introvert') d -= 5;
    if (inm.temperament === 'aggressive') { d += 2; neg = true; }
    inm.disiplin = Math.min(100, inm.disiplin + 3);
    addHistory(inm, pickRandom(HISTORY_ROOM_LINES.library[neg ? 'neg' : 'pos']));
  }

  inm.unrest = Math.max(0, Math.min(100, inm.unrest + d));
  inm.postFightRoom = null;
}

// Kamp-varighet: 3.5–5s så spilleren rekker å se den
const FIGHT_MS_MIN = 3500;
const FIGHT_MS_MAX = 5000;

function triggerConflict(a, b) {
  // Start kamp — skade/utfall bestemmes i resolveFight når timeren er ute
  const dur = FIGHT_MS_MIN + Math.random() * (FIGHT_MS_MAX - FIGHT_MS_MIN);
  a.inFight = b.inFight = true;
  a.fightMs = b.fightMs = dur;
  a.fightOpponent = b.id;
  b.fightOpponent = a.id;
  a.waypoints = [];
  b.waypoints = [];
  a.inConflict = b.inConflict = true;
  a.conflictFlashMs = b.conflictFlashMs = FLASH_DURATION;
  a.conflictCooldown = a.kvirk === 'impulsiv' ? CONFLICT_COOLDOWN/2 : CONFLICT_COOLDOWN;
  b.conflictCooldown = b.kvirk === 'impulsiv' ? CONFLICT_COOLDOWN/2 : CONFLICT_COOLDOWN;
  a.conflictCount++;
  b.conflictCount++;
  // Isolat-sjekk er flyttet til resolveFight — applies etter at kampen er over
}

function resolveFight(a, b) {
  GS.stats.fights++;
  // Vinner = høyere (strength + tilfeldig 0–20)
  const scoreA = a.strength + Math.random() * 20;
  const scoreB = b.strength + Math.random() * 20;
  const winner = scoreA >= scoreB ? a : b;
  const loser  = winner === a ? b : a;

  // Taper: helseskade + uro opp
  const dmg = 8 + Math.random() * 7;   // 8–15
  loser.health = Math.max(HEALTH_FLOOR, loser.health - dmg);
  loser.unrest = Math.min(100, loser.unrest + 15);

  // Vinner: litt lavere uro, ingen skade
  winner.unrest = Math.max(0, winner.unrest - 5);
  winner.ry += 2;

  // Rydd opp kamp-flagg på begge
  a.inFight = b.inFight = false;
  a.fightMs = b.fightMs = 0;
  a.fightOpponent = b.fightOpponent = null;

  // Historikk — kort hendelse per innsatt
  addHistory(winner, pickRandom([
    `Vant kamp mot ${loser.name}`,
    `Banka ${loser.name}`,
    `Ble stående — ${loser.name} gikk ned`,
  ]));
  addHistory(loser, pickRandom([
    `Tapte mot ${winner.name}`,
    `Ble slått ned av ${winner.name}`,
    `Kom dårlig ut mot ${winner.name}`,
  ]));

  // Rom-ruting hvis de har nådd terskel (innsatt "velger" isolation/counseling/library)
  if (a.conflictCount >= ISOLATION_THRESHOLD) sendToRoomAfterFight(a);
  if (b.conflictCount >= ISOLATION_THRESHOLD) sendToRoomAfterFight(b);
}

function runConflictCheck() {
  const n = GS.inmates.length;
  for (let i = 0; i < n; i++) {
    const a = GS.inmates[i];
    if (a.isolationTicks > 0) continue;
    if (a.conflictCooldown > 0) continue;
    let aThresh = STRESS_THRESHOLD[a.stressTolerance];
    if (a.kvirk === 'fanatisk' && a.idolId != null) {
      const aIdol = GS.inmates.find(x => x.id === a.idolId);
      if (aIdol && aIdol.inConflict) aThresh -= 15;
    }
    if (a.unrest < aThresh) continue;
    if (a.isBeingIntervened) continue;
    if (a.zone === 'cell') continue;

    for (let j = i+1; j < n; j++) {
      const b = GS.inmates[j];
      if (b.isolationTicks > 0) continue;
      if (b.conflictCooldown > 0) continue;
      if (a.groupId && b.groupId === a.groupId) continue;       // rivaler = annen gjeng (skippes kun for gjeng-medlem-par)
      if (b.id === a.friendId) continue;                        // ikke angrip venn
      let bThresh = STRESS_THRESHOLD[b.stressTolerance];
      if (b.kvirk === 'fanatisk' && b.idolId != null) {
        const bIdol = GS.inmates.find(x => x.id === b.idolId);
        if (bIdol && bIdol.inConflict) bThresh -= 15;
      }
      if (b.unrest < bThresh) continue;
      if (b.isBeingIntervened) continue;
      if (b.zone === 'cell') continue;

      const dx = a.px - b.px, dy = a.py - b.py;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d > CONFLICT_DIST) continue;

      // Trigger-sjanse = høyeste av de to sine aggresjon
      const chance = Math.max(AGGRESSION_ROLL[a.temperament], AGGRESSION_ROLL[b.temperament]);
      if (Math.random() > chance) continue;

      triggerConflict(a, b);
      break; // a er ferdig — maks én konflikt per sjekk per person
    }
  }
}

// ================================================================
// SIMULATION TICK
// ================================================================
const TICK_MS = 900;
let tickTimer = 0;
let conflictCounter = 0;
let friendCounter   = 0;

// ── Venn-dannelse (v0.9.4) ──────────────────────────────────────────────
function computeFriendWeight(a, b) {
  let w = 0.003;
  if (a.groupId && b.groupId) w *= (a.groupId === b.groupId ? 3.0 : 0.25);
  // Personlighet — a sin side påvirker mest (b regnes symmetrisk over to ticks)
  if (a.kvirk === 'karismatisk' || a.temperament === 'calm')       w *= 1.5;
  if (a.kvirk === 'fanatisk'    || a.temperament === 'aggressive') w *= 0.15;
  if (a.kvirk === 'nervøs')                                         w *= 0.7;
  return w;
}

function runFriendFormation() {
  const FRIEND_DIST = TILE * 2;
  for (const a of GS.inmates) {
    if (a.friendId != null) continue;
    if (a.inFight || a.inConflict) continue;
    if (a.isolationTicks > 0 || a.postFightRoom) continue;
    if (a.zone === 'cell') continue;
    // Finn nærmeste kvalifiserte kandidat
    for (const b of GS.inmates) {
      if (b === a) continue;
      if (b.friendId != null) continue;
      if (b.inFight || b.inConflict) continue;
      if (b.isolationTicks > 0 || b.postFightRoom) continue;
      const d = Math.hypot(a.px - b.px, a.py - b.py);
      if (d > FRIEND_DIST) continue;
      const w = computeFriendWeight(a, b);
      if (Math.random() < w) {
        a.friendId = b.id;
        b.friendId = a.id;
        GS.stats.friendships++;
        if (a.groupId && a.groupId === b.groupId) {
          a.ry += 1;
          b.ry += 1;
        }
        addHistory(a, `Ble venn med ${b.name}`);
        addHistory(b, `Ble venn med ${a.name}`);
        break;
      }
    }
  }
}

// Teller frivillige og påbegynte biblioteksbesøk; begrenser til antall spots (8)
function libraryHasSpot() {
  const used = GS.inmates.filter(i =>
    i.zone === 'library' || i.targetZone === 'library'
  ).length;
  return used < 8;
}

// Velger aktivitet per fase — enkel prioritering på temperament/sosial/stress
function chooseActivity(inm, phase) {
  if (phase === 'Natt') return 'ingen';
  if (phase === 'Kveld' && inm.hygiene < 50) return 'dusj';
  const wantsToRead =
    inm.temperament !== 'aggressive' &&
    inm.kvirk !== 'fanatisk' &&
    (inm.sosial === 'introvert' ||
     inm.stressTolerance === 'low' ||
     inm.kvirk === 'nervøs' ||
     inm.kvirk === 'paranoid');
  if (phase === 'Formiddag') {
    if (inm.temperament === 'aggressive' || inm.energi > 70) return 'trening';
    if (wantsToRead) return 'lesing';
    return 'sosial';
  }
  if (phase === 'Ettermiddag') {
    if (wantsToRead) return 'lesing';
    return 'sosial';
  }
  return 'ingen';
}

function tick() {
  // Advance phase
  GS.phaseTick += GS.speed;
  if (GS.phaseTick >= PHASE_TICKS[PHASES[GS.phaseIndex]]) {
    GS.phaseTick = 0;
    GS.phaseIndex = (GS.phaseIndex + 1) % PHASES.length;
    if (GS.phaseIndex === 0) {
      GS.day++;
      // Sentence countdown — one sim day passes
      for (let i = GS.inmates.length - 1; i >= 0; i--) {
        GS.inmates[i].soningstidIgjen--;
        if (GS.inmates[i].soningstidIgjen <= 0) {
          const cellId = GS.inmates[i].cellId;
          GS.inmates.splice(i, 1);
          const fresh = new Inmate(cellId);
          fresh.setTargetZone(PHASE_ZONE[PHASES[GS.phaseIndex]]);
          GS.inmates.push(fresh);
        }
      }
    }
    // Aktivitet først — den styrer bibliotek-overstyringen i sone-valget under
    const newPhase = PHASES[GS.phaseIndex];
    for (const inm of GS.inmates) {
      inm.aktivitet = chooseActivity(inm, newPhase);
    }
    const defaultZone = PHASE_ZONE[newPhase];
    for (let i = 0; i < GS.inmates.length; i++) {
      if (GS.inmates[i].isolationTicks > 0) continue;
      let targetZone = defaultZone;
      if (GS.inmates[i].aktivitet === 'lesing' && libraryHasSpot()) {
        targetZone = 'library';
      }
      const delay = i * 350 + Math.random() * 200;
      GS.inmates[i].setTargetZone(targetZone, delay);
    }
    // Ritual / Samling: i Ettermiddag, hvis en karismatisk er fri, samles hun og fanatiske i samme sone
    if (newPhase === 'Ettermiddag') {
      const kari = GS.inmates.find(i => i.kvirk === 'karismatisk' && i.isolationTicks === 0);
      if (kari) {
        const samlingZone = kari.targetZone;
        for (const inm of GS.inmates) {
          if (inm === kari || (inm.kvirk === 'fanatisk' && inm.targetZone === samlingZone)) {
            inm.aktivitet = 'samling';
          }
        }
      }
    }
  }

  // Unrest + stat dynamics
  const phase   = PHASES[GS.phaseIndex];
  const isNight = phase === 'Natt';
  for (const inm of GS.inmates) {
    let delta = 0;
    if (isNight) {
      // Proporsjonal reduksjon — uro mister en andel, nullstilles aldri helt.
      // Koeffisient kombinerer isolationResponse (base) og temperament (modifier).
      const NIGHT_BASE = { positive: -0.014, neutral: -0.010, negative: -0.006 };
      const NIGHT_TEMP = { calm: 1.25, normal: 1.0, aggressive: 0.70 };
      const factor = NIGHT_BASE[inm.isolationResponse] * NIGHT_TEMP[inm.temperament];
      delta = factor * inm.unrest;
    } else {
      let nearbyCount = 0;
      for (const other of GS.inmates) {
        if (other === inm) continue;
        const dx = other.px - inm.px, dy = other.py - inm.py;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < TILE*3) {
          nearbyCount++;
          const prox = 1 - d/(TILE*3);
          // Same category → less tension; different → more
          const factor = other.kategori === inm.kategori ? 0.15 : 0.45;
          delta += factor * prox;
          // Same gang → calming; different gang → tension; non-gang eller blandet → nøytral
          if (inm.groupId && other.groupId) {
            const gangFactor = other.groupId === inm.groupId ? -0.10 : 0.55;
            delta += gangFactor * prox;
          }
          // Venn nær → beroligende
          if (inm.friendId && other.id === inm.friendId) delta -= 0.15 * prox;
          // Sosial-trait: introvert irriteres av crowd, dominant nyter selskap
          if (inm.sosial === 'introvert') delta += 0.10 * prox;
          else if (inm.sosial === 'dominant') delta -= 0.05 * prox;
          // Karismatisk smitter ro på naboer
          if (other.kvirk === 'karismatisk') delta -= 0.08 * prox;
          // Samling-smitte: utenforstående i samme sone som samling blir ukomfortable
          if (inm.aktivitet !== 'samling' && other.aktivitet === 'samling') delta += 0.08 * prox;
        }
      }
      // Paranoid — overfylt sone føles truende
      if (inm.kvirk === 'paranoid' && nearbyCount >= 3) delta += 0.15;
      for (const g of GS.guards) {
        const dx = g.px - inm.px, dy = g.py - inm.py;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < TILE*5) {
          // Differensiert vakt-reaksjon: nervøs trigges, andre roes ulikt
          let guardFactor = -1.1;
          if (inm.kvirk === 'nervøs')            guardFactor = +0.6;
          else if (inm.kvirk === 'fanatisk')     guardFactor = -0.3;
          else if (inm.kvirk === 'karismatisk')  guardFactor = -0.5;
          else if (inm.kvirk === 'paranoid')     guardFactor = -0.4;
          delta += guardFactor * (1 - d/(TILE*5));
        }
      }
      // stressTolerance forsterker/demper samlet reaksjon på nærhet
      const STRESS_MUL = { low: 1.25, medium: 1.0, high: 0.80 };
      delta *= STRESS_MUL[inm.stressTolerance];
      // Impulsiv — uro-svingninger forsterket
      if (inm.kvirk === 'impulsiv') delta *= 1.20;
      // Temperament-basert baseline: aggressive drifter naturlig mot høyere unrest
      const BASELINE = { calm: 15, normal: 22, aggressive: 35 };
      delta += (BASELINE[inm.temperament] - inm.unrest) * 0.012;
      // Fanatisk — bundet til idol
      if (inm.kvirk === 'fanatisk' && inm.idolId != null) {
        const idol = GS.inmates.find(x => x.id === inm.idolId);
        if (idol) {
          if (idol.isolationTicks > 0) {
            delta += 0.25;                          // panikk når idol er låst inne
          } else {
            const dIx = idol.px - inm.px, dIy = idol.py - inm.py;
            const dI  = Math.sqrt(dIx*dIx + dIy*dIy);
            if (dI < TILE*4) delta -= 0.12;         // trygghet nær idol
          }
        }
      }
      // Aktivitets-effekt
      switch (inm.aktivitet) {
        case 'trening':  delta -= 0.30; inm.energi = Math.max(0, inm.energi - 0.5); break;
        case 'sosial':   delta -= 0.15; break;
        case 'lesing':   delta -= 0.40; break;
        case 'dusj':     delta += 0.10; break;
        case 'samling':  delta -= 0.20; break;
      }
      // Relasjons-effekter (v0.9.4)
      if (inm.friendId != null) {
        const friend = GS.inmates.find(x => x.id === inm.friendId);
        if (friend) {
          // Venn i rom etter kamp eller isolat → litt uro + historikk én gang per hendelse
          if (friend.postFightRoom || friend.isolationTicks > 0) {
            delta += 0.25;
            if (inm.notifiedFriendInRoom !== friend.id) {
              inm.notifiedFriendInRoom = friend.id;
              const roomTxt = friend.postFightRoom === 'counseling' ? 'på samtale'
                            : friend.postFightRoom === 'library'    ? 'i biblioteket'
                            : 'i isolat';
              addHistory(inm, `Ble urolig da ${friend.name} havnet ${roomTxt}`);
            }
          } else if (inm.notifiedFriendInRoom === friend.id) {
            inm.notifiedFriendInRoom = null;   // resett når vennen er fri igjen
          }
          // Venn i annen gjeng → små indre konflikt
          if (inm.groupId && friend.groupId && inm.groupId !== friend.groupId) {
            delta += 0.10;
          }
        } else {
          // Venn er borte (løslatt) — rydd opp
          inm.friendId = null;
          inm.notifiedFriendInRoom = null;
        }
      }
    }
    // Rom-opphold overstyrer alt — uro fryses under oppholdet,
    // og stor effekt trigges ved utskrivning (applyRoomEffect)
    if (inm.isolationTicks > 0) {
      delta = 0;
      inm.isolationTicks -= GS.speed;
      if (inm.isolationTicks <= 0) {
        inm.isolationTicks = 0;
        applyRoomEffect(inm);
      }
    }
    inm.unrest = Math.max(0, Math.min(100, inm.unrest + delta));

    // energi: recharges at night, drains during gym, slow passive drain otherwise
    if (isNight)           inm.energi = Math.min(100, inm.energi + 2.5);
    else if (phase==='Formiddag') inm.energi = Math.max(0, inm.energi - 1.2);
    else                   inm.energi = Math.max(0, inm.energi - 0.3);

    // hygiene: recharges in shower phase, slow passive drain otherwise
    if (phase === 'Kveld') inm.hygiene = Math.min(100, inm.hygiene + 4.0);
    else                   inm.hygiene = Math.max(0,   inm.hygiene - 0.5);

    // disiplin: erodes when unrest high, recovers slightly when calm
    inm.disiplin = Math.max(0, Math.min(100, inm.disiplin + (inm.unrest > 50 ? -0.4 : 0.1)));

    // dominans: very slow drift toward individual baseline (no sudden changes)
    inm.dominans = Math.max(0, Math.min(100, inm.dominans + (50 - inm.dominans) * 0.005));

    // conflict cooldown + flash decrement (hver tick)
    if (inm.conflictCooldown > 0) inm.conflictCooldown = Math.max(0, inm.conflictCooldown - TICK_MS);
    if (inm.conflictFlashMs  > 0) {
      inm.conflictFlashMs = Math.max(0, inm.conflictFlashMs - TICK_MS);
      if (inm.conflictFlashMs === 0) inm.inConflict = false;
    }
    // kamp-timer: kun siden med lavere id kjører resolve for å unngå dobbel
    if (inm.fightMs > 0) {
      inm.fightMs = Math.max(0, inm.fightMs - TICK_MS);
      if (inm.fightMs === 0 && inm.inFight) {
        const opp = GS.inmates.find(x => x.id === inm.fightOpponent);
        if (opp && inm.id < opp.id) {
          resolveFight(inm, opp);
        } else if (!opp) {
          // motstander borte (fx sendt til isolat fra annet sted) — bare rydd opp
          inm.inFight = false;
          inm.fightOpponent = null;
        }
      }
    }
  }

  // Konflikt-sjekk hver 10. tick (~9s)
  if (++conflictCounter >= 10) { conflictCounter = 0; runConflictCheck(); }

  // Venn-dannelse hver 10. tick (deler teller med konflikt-sjekken ville gjort det uregelmessig;
  // bruker egen teller for klarhet)
  if (++friendCounter >= 10) { friendCounter = 0; runFriendFormation(); }

  // Tell frivillige biblioteksbesøk (kant-detektor ved ankomst, ignorer post-fight-opphold)
  for (const inm of GS.inmates) {
    if (inm.zone !== 'library') {
      inm._wasInLibrary = false;
      continue;
    }
    if (!inm._wasInLibrary && inm.postFightRoom === null) {
      inm.libraryVisits++;
      GS.stats.library++;
    }
    // Setter flagget uansett — hindrer falsk økning når post-fight-halen slipper postFightRoom
    inm._wasInLibrary = true;
  }

  // Stakes: innsatte med health <= 0 fjernes og erstattes
  for (let i = GS.inmates.length - 1; i >= 0; i--) {
    if (GS.inmates[i].health <= 0) removeInmate(i);
  }

  GS.totalUnrest = GS.inmates.length
    ? GS.inmates.reduce((s,i) => s+i.unrest, 0) / GS.inmates.length
    : 0;
}

  'Morgen':      'rgba(255,180,60,0.025)',
  'Formiddag':   'rgba(80,40,20,0.02)',

  'Kveld':       'rgba(40,60,120,0.03)',
  'Natt':        'rgba(0,10,40,0.12)',
};

const ZONE_LBL = {
  cell:'Celle', cafeteria:'Kantine', yard:'Utegård',
  corridor:'Korridor', center:'Korridor',
  gym:'Treningsrom', shower:'Dusj',
  isolation:'Isolat', counseling:'Samtalerom', library:'Bibliotek',
};

/// Cell regions: [leftCol, topRow, widthTiles, heightTiles] for each of the 8 cells
const CELL_REGIONS = [

  [36,10,7,2],[36,14,7,2],[36,18,7,2],[36,21,7,2], // right cells R1-R4
];

function renderMap() {
