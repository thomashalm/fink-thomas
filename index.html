const TICK_MS = 900;
let tickTimer = 0;
let conflictCounter = 0;
let friendCounter   = 0;

// ── Venn-dannelse (v0.9.4) ──────────────────────────────────────────────
function computeFriendWeight(a, b) {
  let w = 0.003;
  if (a.groupId && b.groupId) w *= (a.groupId === b.groupId ? 3.0 : 0.25);
  // Personlighet — a sin side påvirker mest (b regnes symmetrisk over to ticks)
  if (a.kvirk === 'karismatisk' || a.temperament === 'calm')       w *= 1.5;
  if (a.kvirk === 'fanatisk'    || a.temperament === 'aggressive') w *= 0.15;
  if (a.kvirk === 'nervøs')                                         w *= 0.7;
  if (a.ambition === 'make_friend' && !a.ambitionAchieved)          w *= 1.5;
  return w;
}

function runFriendFormation() {
  const FRIEND_DIST = TILE * 2;
  for (const a of GS.inmates) {
    if (a.friendId != null) continue;
    if (a.inFight || a.inConflict) continue;
    if (a.isolationTicks > 0 || a.postFightRoom) continue;
    if (a.zone === 'cell') continue;
    // Finn nærmeste kvalifiserte kandidat
    for (const b of GS.inmates) {
      if (b === a) continue;
      if (b.friendId != null) continue;
      if (b.inFight || b.inConflict) continue;
      if (b.isolationTicks > 0 || b.postFightRoom) continue;
      const d = Math.hypot(a.px - b.px, a.py - b.py);
      if (d > FRIEND_DIST) continue;
      const w = computeFriendWeight(a, b);
      if (Math.random() < w) {
        a.friendId = b.id;
        b.friendId = a.id;
        GS.stats.friendships++;
        a.friendshipsMade++;
        b.friendshipsMade++;
        if (a.groupId && a.groupId === b.groupId) {
          a.respekt += 1;
          b.respekt += 1;
        }
        addHistory(a, `Ble venn med ${b.name}`);
        addHistory(b, `Ble venn med ${a.name}`);
        checkAmbitionAchieved(a);
        checkAmbitionAchieved(b);
        break;
      }
    }
  }
}

// Teller frivillige og påbegynte biblioteksbesøk; begrenser til antall spots (5)
function libraryHasSpot() {
  const used = GS.inmates.filter(i =>
    i.zone === 'library' || i.targetZone === 'library' || i.pendingZone === 'library'
  ).length;
  return used < 5;
}

// Speiler libraryHasSpot — maks 5 innsatte på verkstedet
function workshopHasSpot() {
  const used = GS.inmates.filter(i =>
    i.zone === 'workshop' || i.targetZone === 'workshop' || i.pendingZone === 'workshop'
  ).length;
  return used < 5;
}

// Velger aktivitet per fase — enkel prioritering på temperament/sosial/stress
function chooseActivity(inm, phase) {
  if (phase === 'Natt') return 'ingen';
  if (phase === 'Kveld' && inm.hygiene < 50) return 'dusj';
  const wantsToRead =
    inm.temperament !== 'aggressive' &&
    inm.kvirk !== 'fanatisk' &&
    (inm.sosial === 'introvert' ||
     inm.stressTolerance === 'low' ||
     inm.kvirk === 'nervøs' ||
     inm.kvirk === 'paranoid');
  const wantsWorkshop =
    inm.temperament !== 'aggressive' &&
    (inm.energi < 60 || inm.kvirk === 'nervøs' || inm.kvirk === 'paranoid');
  if (phase === 'Formiddag') {
    if (inm.temperament === 'aggressive' || inm.energi > 70) return 'trening';
    if (wantsWorkshop && workshopHasSpot()) return 'arbeid';
    if (wantsToRead) return 'lesing';
    return 'sosial';
  }
  if (phase === 'Ettermiddag') {
    if (wantsToRead) return 'lesing';
    return 'sosial';
  }
  return 'ingen';
}

function tick() {
  // Advance phase
  GS.phaseTick += GS.speed;
  const phaseLen = PHASE_TICKS[PHASES[GS.phaseIndex]]
                 * (isArenaMode() ? 0.5 : 1);
  if (GS.phaseTick >= phaseLen) {
    GS.phaseTick = 0;
    GS.phaseIndex = (GS.phaseIndex + 1) % PHASES.length;
    if (GS.phaseIndex === 0) {
      GS.day++;
      for (const k in GS.powerCooldowns) {
        if (GS.powerCooldowns[k] > 0) GS.powerCooldowns[k]--;
      }
      // Sentence countdown — one sim day passes
      for (let i = GS.inmates.length - 1; i >= 0; i--) {
        GS.inmates[i].soningstidIgjen--;
        if (GS.inmates[i].soningstidIgjen <= 0) {
          const leaving = GS.inmates[i];
          const cellId = leaving.cellId;
          if (leaving.ambition === 'survive' && !leaving.ambitionAchieved && leaving.fightsLost === 0) {
            leaving.ambitionAchieved = true;
            addPowerEvent('ambition', `🎯 ${leaving.name} overlevde soningen uten tap.`);
          }
          if (leaving.ambition === 'no_isolation' && !leaving.ambitionAchieved && leaving.isolatCount === 0) {
            leaving.ambitionAchieved = true;
            addPowerEvent('ambition', `🎯 ${leaving.name} slapp ut uten å havne i isolat.`);
          }
          addDeparted(leaving, 'Slapp ut etter endt soning');
          GS.inmates.splice(i, 1);
          if (!isArenaMode()) {
            const fresh = new Inmate(cellId);
            fresh.setTargetZone(PHASE_ZONE[PHASES[GS.phaseIndex]]);
            GS.inmates.push(fresh);
          }
        }
      }
    }
    // Aktivitet først — den styrer bibliotek-overstyringen i sone-valget under
    const newPhase = PHASES[GS.phaseIndex];
    for (const inm of GS.inmates) {
      if (GS.mode === 'lastManStandingShower') {
        inm.aktivitet = 'ingen';   // shower: aldri dusj, aldri aktivitet-bytte
      } else {
        inm.aktivitet = chooseActivity(inm, newPhase);
      }
      // Oppdater kjedelig-flagg ved fase-bytte (verksted-deprivasjon)
      inm.isBored = (GS.day - (inm.lastWorkshopDay ?? GS.day)) > 5;
    }
    const defaultZone =
        GS.mode === 'lastManStandingShower' ? 'shower'
      : GS.mode === 'lastManStanding'       ? 'gang'
      : PHASE_ZONE[newPhase];
    for (let i = 0; i < GS.inmates.length; i++) {
      if (GS.inmates[i].isolationTicks > 0) continue;
      let targetZone = defaultZone;
      if (!isArenaMode()) {
        if (GS.inmates[i].aktivitet === 'lesing' && libraryHasSpot()) {
          targetZone = 'library';
        }
        if (GS.inmates[i].aktivitet === 'arbeid' && workshopHasSpot()) {
          targetZone = 'workshop';
        }
      }
      // Variert fasestagger med personlighet (v0.9.32): 0–5.5s spredning,
      // ±1s forskyvning basert på kvirk/temperament — impulsive først, nervøse sist.
      const inm = GS.inmates[i];
      const pBias = inm.kvirk === 'impulsiv'             ? -800
                  : inm.temperament === 'aggressive'     ? -400
                  : inm.temperament === 'calm'           ? +600
                  : inm.kvirk === 'nervøs'               ? +1100
                  : 0;
      const delay = (GS.mode === 'lastManStandingShower') ? 0
                  : isArenaMode()                         ? Math.random() * 800
                  :                                         Math.max(0, Math.random() * 5500 + pBias);
      inm.setTargetZone(targetZone, delay);
    }
    // Ritual / Samling: i Ettermiddag, hvis en karismatisk er fri, samles hun og fanatiske i samme sone
    if (newPhase === 'Ettermiddag' && !isArenaMode()) {
      const kari = GS.inmates.find(i => i.kvirk === 'karismatisk' && i.isolationTicks === 0);
      if (kari) {
        const samlingZone = kari.targetZone;
        for (const inm of GS.inmates) {
          if (inm === kari || (inm.kvirk === 'fanatisk' && inm.targetZone === samlingZone)) {
            inm.aktivitet = 'samling';
          }
        }
      }
    }
  }

  // Unrest + stat dynamics
  const phase   = PHASES[GS.phaseIndex];
  const isNight = phase === 'Natt';
  for (const inm of GS.inmates) {
    let delta = 0;
    if (isNight) {
      // Proporsjonal reduksjon — uro mister en andel, nullstilles aldri helt.
      // Koeffisient kombinerer isolationResponse (base) og temperament (modifier).
      const NIGHT_BASE = { positive: -0.014, neutral: -0.010, negative: -0.006 };
      const NIGHT_TEMP = { calm: 1.25, normal: 1.0, aggressive: 0.70 };
      const factor = NIGHT_BASE[inm.isolationResponse] * NIGHT_TEMP[inm.temperament];
      delta = factor * inm.unrest;
      // Floor sleeper: stress fra gulv-soving
      if (inm.isFloorSleeper) {
        delta += 0.03;
      } else if (inm.cellId) {
        // Cellekamerater i overfylt celle — svak effekt
        const crowded = GS.inmates.some(x => x.cellId === inm.cellId && x.isFloorSleeper);
        if (crowded) delta += 0.01;
      }
    } else {
      let nearbyCount = 0;
      // Cache grudge-ider én gang per innsatt per tick (unngår scan av memories i inner-loop)
      const grudgeIds = new Set(getGrudgeTargets(inm).map(g => g.id));
      for (const other of GS.inmates) {
        if (other === inm) continue;
        const dx = other.px - inm.px, dy = other.py - inm.py;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < TILE*3) {
          nearbyCount++;
          const prox = 1 - d/(TILE*3);
          // Same category → less tension; different → more
          const factor = other.kategori === inm.kategori ? 0.15 : 0.45;
          delta += factor * prox;
          // Same gang → calming; different gang → tension; non-gang eller blandet → nøytral
          if (inm.groupId && other.groupId) {
            const gangFactor = other.groupId === inm.groupId ? -0.10 : 0.55;
            delta += gangFactor * prox;
          }
          // Venn nær → beroligende
          if (inm.friendId && other.id === inm.friendId) delta -= 0.15 * prox;
          // Sosial-trait: introvert irriteres av crowd, dominant nyter selskap
          if (inm.sosial === 'introvert') delta += 0.10 * prox;
          else if (inm.sosial === 'dominant') delta -= 0.05 * prox;
          // Karismatisk smitter ro på naboer
          if (other.kvirk === 'karismatisk') delta -= 0.08 * prox;
          // Samling-smitte: utenforstående i samme sone som samling blir ukomfortable
          if (inm.aktivitet !== 'samling' && other.aktivitet === 'samling') delta += 0.08 * prox;
          // Grudge-nærhet — minner bygger press når den som bærer grudge er nær fienden
          if (grudgeIds.has(other.id)) delta += 0.30 * prox;
          // Farlige naboer — svakere innsatte blir stresset av dominerende/aggressive/nylig-i-kamp
          const otherIsDangerous =
            other.respekt > 70 ||
            other.conflictCooldown > 0 ||
            other.kvirk === 'impulsiv';
          if (otherIsDangerous && inm.respekt < other.respekt - 20 && inm.stressTolerance === 'low') {
            delta += 0.20 * prox;
          }
          // Småprat-boble (v0.9.32): sporadisk 💬 over to idle innsatte som står nær.
          // Kun én gang per par (other.id > inm.id), ingen stats-effekt.
          if (other.id > inm.id && d < TILE * 2
              && inm._chatMs === 0 && other._chatMs === 0
              && !inm.inFight && !other.inFight
              && inm.downedMs === 0 && other.downedMs === 0
              && inm.isolationTicks === 0 && other.isolationTicks === 0
              && inm.cafState !== 'to_seat' && other.cafState !== 'to_seat'
              && !grudgeIds.has(other.id)) {
            let roll = 0.0035;
            if (inm.friendId === other.id || other.friendId === inm.id) roll *= 3;
            else if (inm.groupId && inm.groupId === other.groupId)      roll *= 2;
            if (Math.random() < roll) {
              inm._chatMs = 1800;
              other._chatMs = 1800;
            }
          }
        }
      }
      // Paranoid — overfylt sone føles truende
      if (inm.kvirk === 'paranoid' && nearbyCount >= 3) delta += 0.15;
      for (const g of GS.guards) {
        const dx = g.px - inm.px, dy = g.py - inm.py;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < TILE*5) {
          // Differensiert vakt-reaksjon: nervøs trigges, andre roes ulikt
          let guardFactor = -1.1;
          if (inm.kvirk === 'nervøs')            guardFactor = +0.6;
          else if (inm.kvirk === 'fanatisk')     guardFactor = -0.3;
          else if (inm.kvirk === 'karismatisk')  guardFactor = -0.5;
          else if (inm.kvirk === 'paranoid')     guardFactor = -0.4;
          delta += guardFactor * (1 - d/(TILE*5));
        }
      }
      // stressTolerance forsterker/demper samlet reaksjon på nærhet
      const STRESS_MUL = { low: 1.25, medium: 1.0, high: 0.80 };
      delta *= STRESS_MUL[inm.stressTolerance];
      // Impulsiv — uro-svingninger forsterket
      if (inm.kvirk === 'impulsiv') delta *= 1.20;
      // Temperament-basert baseline: aggressive drifter naturlig mot høyere unrest
      const BASELINE = { calm: 15, normal: 22, aggressive: 35 };
      delta += (BASELINE[inm.temperament] - inm.unrest) * 0.012;
      // Fanatisk — bundet til idol
      if (inm.kvirk === 'fanatisk' && inm.idolId != null) {
        const idol = GS.inmates.find(x => x.id === inm.idolId);
        if (idol) {
          if (idol.isolationTicks > 0) {
            delta += 0.25;                          // panikk når idol er låst inne
          } else {
            const dIx = idol.px - inm.px, dIy = idol.py - inm.py;
            const dI  = Math.sqrt(dIx*dIx + dIy*dIy);
            if (dI < TILE*4) delta -= 0.12;         // trygghet nær idol
          }
        }
      }
      // Aktivitets-effekt (skrudd av i lastMan — ingen ro-ned)
      if (!isArenaMode()) {
        switch (inm.aktivitet) {
          case 'trening':  delta -= 0.30; inm.energi = Math.max(0, inm.energi - 0.5); break;
          case 'sosial':   delta -= 0.15; break;
          case 'lesing':   delta -= 0.40; break;
          case 'arbeid':   delta -= 0.35; inm.energi = Math.max(0, inm.energi - 0.15); break;
          case 'dusj':     delta += 0.10; break;
          case 'samling':  delta -= 0.20; break;
        }
      }
      // Kjedelig-drift: innsatte som ikke har vært i verksted på 5+ dager
      if (inm.isBored) delta += 0.005;
      // Relasjons-effekter (v0.9.4)
      if (inm.friendId != null) {
        const friend = GS.inmates.find(x => x.id === inm.friendId);
        if (friend) {
          // Venn i rom etter kamp eller isolat → litt uro + historikk én gang per hendelse
          if (friend.postFightRoom || friend.isolationTicks > 0) {
            delta += 0.25;
            if (inm.notifiedFriendInRoom !== friend.id) {
              inm.notifiedFriendInRoom = friend.id;
              const roomTxt = friend.postFightRoom === 'counseling' ? 'på samtale'
                            : friend.postFightRoom === 'library'    ? 'i biblioteket'
                            : 'i isolat';
              addHistory(inm, `Ble urolig da ${friend.name} havnet ${roomTxt}`);
            }
          } else if (inm.notifiedFriendInRoom === friend.id) {
            inm.notifiedFriendInRoom = null;   // resett når vennen er fri igjen
          }
          // Venn i annen gjeng → små indre konflikt
          if (inm.groupId && friend.groupId && inm.groupId !== friend.groupId) {
            delta += 0.10;
          }
        } else {
          // Venn er borte (løslatt) — rydd opp
          inm.friendId = null;
          inm.notifiedFriendInRoom = null;
        }
      }
    }
    // Rom-opphold overstyrer alt — uro fryses under oppholdet,
    // og stor effekt trigges ved utskrivning (applyRoomEffect)
    if (inm.isolationTicks > 0) {
      delta = 0;
      inm.isolationTicks -= GS.speed;
      if (inm.isolationTicks <= 0) {
        inm.isolationTicks = 0;
        applyRoomEffect(inm);
      }
    }
    inm.unrest = Math.max(0, Math.min(100, inm.unrest + delta));

    // energi: recharges at night (full in bed, half on floor), drains during gym, slow passive drain otherwise
    if (isNight) {
      if (inm.sleepState === 'in_bed')        inm.energi = Math.min(100, inm.energi + 2.5);
      else if (inm.sleepState === 'on_floor') inm.energi = Math.min(100, inm.energi + 1.25);
    }
    else if (phase==='Formiddag') inm.energi = Math.max(0, inm.energi - 1.2);
    else                   inm.energi = Math.max(0, inm.energi - 0.3);

    // hygiene: recharges in shower phase, slow passive drain otherwise
    if (phase === 'Kveld') inm.hygiene = Math.min(100, inm.hygiene + 4.0);
    else                   inm.hygiene = Math.max(0,   inm.hygiene - 0.5);

    // disiplin: erodes when unrest high, recovers slightly when calm
    inm.disiplin = Math.max(0, Math.min(100, inm.disiplin + (inm.unrest > 50 ? -0.4 : 0.1)));

    // dominans: very slow drift toward individual baseline (no sudden changes)
    inm.dominans = Math.max(0, Math.min(100, inm.dominans + (50 - inm.dominans) * 0.005));

    // conflict cooldown + flash decrement (hver tick)
    if (inm.conflictCooldown > 0) inm.conflictCooldown = Math.max(0, inm.conflictCooldown - TICK_MS);
    if (inm.conflictFlashMs  > 0) {
      inm.conflictFlashMs = Math.max(0, inm.conflictFlashMs - TICK_MS);
      if (inm.conflictFlashMs === 0) inm.inConflict = false;
    }
    // Chat-boble decay (v0.9.32)
    if (inm._chatMs > 0) inm._chatMs = Math.max(0, inm._chatMs - TICK_MS);
    // downed-timer: ligger nede etter tapt kamp, blokkerer bevegelse
    if (inm.downedMs > 0) inm.downedMs = Math.max(0, inm.downedMs - TICK_MS);
    // blodpøl-nedtelling etter tap
    if (inm.bloodPoolMs > 0) inm.bloodPoolMs = Math.max(0, inm.bloodPoolMs - TICK_MS);
    // push-offset decay (visuell slide-back etter kamp)
    if (inm.fightPushX || inm.fightPushY) {
      inm.fightPushX *= 0.55;
      inm.fightPushY *= 0.55;
      if (Math.hypot(inm.fightPushX, inm.fightPushY) < 0.3) {
        inm.fightPushX = inm.fightPushY = 0;
      }
    }
    // kamp-timer: kun siden med lavere id kjører resolve for å unngå dobbel
    if (inm.fightMs > 0) {
      inm.fightMs = Math.max(0, inm.fightMs - TICK_MS);
      if (inm.fightMs === 0 && inm.inFight) {
        const opp = GS.inmates.find(x => x.id === inm.fightOpponent);
        if (opp && inm.id < opp.id) {
          resolveFight(inm, opp);
        } else if (!opp) {
          // motstander borte (fx sendt til isolat fra annet sted) — bare rydd opp
          inm.inFight = false;
          inm.fightOpponent = null;
          // Rydd opp spawn-seng-kamp hvis koblingen finnes: fall tilbake til floor sleeper i cellen
          if (inm.bedChallengeVs !== null) {
            inm.bedChallengeVs = null;
            if (inm.cellId) {
              inm.cellSlot       = null;
              inm.isFloorSleeper = true;
              const cellDef = getCellDef(inm.cellId);
              if (cellDef) {
                positionInmateAt(inm, cellDef.floorPos.x, cellDef.floorPos.y);
              } else {
                console.warn('[bedChallenge cleanup] Mangler cellDef for', inm.cellId);
              }
              addHistory(inm, `🛏 Måtte ta gulvet — motstanderen forsvant.`);
              addPowerEvent('bed', `🛏 ${inm.name} måtte ta gulvet — kampen ble avbrutt.`);
            }
          }
        }
      }
    }
  }

  // Shower: passiv unrest-floor så ingen driver ned mellom kamper
  if (GS.mode === 'lastManStandingShower') {
    for (const inm of GS.inmates) {
      if (inm.unrest < 70) inm.unrest = Math.min(100, inm.unrest + 1.5);
    }
  }

  // Konflikt-sjekk hver 10. tick (~9s) — hver 3. tick (~2,7s) i lastMan
  const cLimit = (GS.mode === 'lastManStandingShower') ? 1
               : isArenaMode()                         ? 3
               :                                         10;
  if (++conflictCounter >= cLimit) { conflictCounter = 0; runConflictCheck(); }

  // Last Man Standing: eskalerende uro når få gjenstår — forhindrer stagnert sluttspill
  if (isArenaMode() && GS.inmates.length <= 8) {
    const bump = (9 - GS.inmates.length) * 0.3;
    for (const inm of GS.inmates) inm.unrest = Math.min(100, inm.unrest + bump);
  }

  // Venn-dannelse hver 10. tick (deler teller med konflikt-sjekken ville gjort det uregelmessig;
  // bruker egen teller for klarhet)
  const fLimit = (isArenaMode()) ? Infinity : 10;
  if (++friendCounter >= fLimit) { friendCounter = 0; runFriendFormation(); }

  // Tell frivillige biblioteksbesøk (kant-detektor ved ankomst, ignorer post-fight-opphold)
  for (const inm of GS.inmates) {
    if (inm.zone !== 'library') {
      inm._wasInLibrary = false;
      continue;
    }
    if (!inm._wasInLibrary && inm.postFightRoom === null) {
      inm.libraryVisits++;
      GS.stats.library++;
    }
    // Setter flagget uansett — hindrer falsk økning når post-fight-halen slipper postFightRoom
    inm._wasInLibrary = true;
  }

  // Tell verksted-besøk (kant-detektor ved ankomst) — gir respekt + historikk
  for (const inm of GS.inmates) {
    if (inm.zone !== 'workshop') {
      inm._wasInWorkshop = false;
      continue;
    }
    if (!inm._wasInWorkshop) {
      inm.workshopCount++;
      inm.lastWorkshopDay = GS.day;
      inm.isBored = false;
      inm.respekt += 1;
      GS.stats.workshop++;
      addHistory(inm, 'Jobbet i verksted.');
    }
    inm._wasInWorkshop = true;
  }

  // Stakes: innsatte med health <= 0 fjernes og erstattes
  for (let i = GS.inmates.length - 1; i >= 0; i--) {
    if (GS.inmates[i].health <= 0) removeInmate(i);
  }

  GS.totalUnrest = GS.inmates.length
    ? GS.inmates.reduce((s,i) => s+i.unrest, 0) / GS.inmates.length
    : 0;

  if (GS.gangwarFlashMs > 0) GS.gangwarFlashMs = Math.max(0, GS.gangwarFlashMs - TICK_MS);

  // Sjelden rotte-spawn i dusjen — maks én aktiv om gangen
  if (!GS.activeRat && Math.random() < 0.004) {
    const drains = [
      { x: 25.5 * TILE, y: 20.5 * TILE },
      { x: 29.5 * TILE, y: 20.5 * TILE },
      { x: 33.5 * TILE, y: 20.5 * TILE },
    ];
    const ai = Math.floor(Math.random() * 3);
    let bi = Math.floor(Math.random() * 3);
    while (bi === ai) bi = Math.floor(Math.random() * 3);
    GS.activeRat = {
      sx: drains[ai].x, sy: drains[ai].y,
      ex: drains[bi].x, ey: drains[bi].y,
      startedAt: Date.now(),
      durationMs: 900 + Math.random() * 500,
    };
  }
}

// ================================================================
// RENDERER
// ================================================================
const PHASE_TINT = {
  'Morgen':      'rgba(255,160,80,0.10)',
  'Formiddag':   'rgba(255,240,200,0.04)',
  'Ettermiddag': null,
  'Kveld':       'rgba(30,40,90,0.22)',
  'Natt':        'rgba(0,10,40,0.38)',
};

// Hvor sterkt lampene (og yard-poles) lyser per fase. 0 = av, 1 = full.
const PHASE_LAMP_GLOW = {
  'Morgen':      0.15,
  'Formiddag':   0.0,
  'Ettermiddag': 0.0,
  'Kveld':       0.9,
  'Natt':        1.0,
};

const ZONE_LBL = {
  cell:'Celle', cafeteria:'Kantine', yard:'Utegård',
  corridor:'Korridor', center:'Korridor',
  gym:'Treningsrom', shower:'Dusj',
  isolation:'Isolat', counseling:'Samtalerom', library:'Bibliotek',
  workshop:'Verksted',
};

/// Cell regions: [leftCol, topRow, widthTiles, heightTiles] for each of the 8 cells
const CELL_REGIONS = [
  [1,10,8,2],[1,14,8,2],[1,18,8,2],[1,21,8,2],  // left cells L1-L4
  [36,10,7,2],[36,14,7,2],[36,18,7,2],[36,21,7,2], // right cells R1-R4
];

function renderMap() {
  for (let y=0; y<ROWS; y++)
    for (let x=0; x<COLS; x++) {
      const t = GS.map[y][x];
      (DRAWERS[t.type] || DRAWERS.wall)(ctx, x*TILE, y*TILE, TILE);
    }
  // Subtle cell room outlines — part of the environment, not UI
  ctx.save();
  ctx.strokeStyle = 'rgba(160,185,210,0.09)';
  ctx.lineWidth = 1;
  for (const [cx, cy, cw, ch] of CELL_REGIONS) {
    ctx.strokeRect(cx*TILE + 0.5, cy*TILE + 0.5, cw*TILE - 1, ch*TILE - 1);
  }
  ctx.restore();
}

function renderLabels() {
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.font = `${TILE*0.5|0}px monospace`;
  ctx.fillText('🌳 UTEGÅRD',  21.5*TILE, 2.5*TILE);
  ctx.fillText('🍴 KANTINE',  21.5*TILE, 6.5*TILE);
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.font = `${TILE*0.4|0}px monospace`;
  ctx.fillText('🏋 GYM',     15*TILE,   19*TILE);
  ctx.fillText('🚿 DUSJ',    29*TILE,   19*TILE);
  ctx.fillText('🛏 CELLE',   4.5*TILE,  16*TILE);
  ctx.fillText('🛏 CELLE',   39.5*TILE, 16*TILE);
  ctx.fillText('🔒 ISOLAT',     4.5*TILE,  24.5*TILE);
  ctx.fillText('💬 SAMTALE',   15.5*TILE,  24.5*TILE);
  ctx.fillText('📚 BIBLIOTEK', 28.5*TILE,  24.5*TILE);
  ctx.fillText('🔧 VERKSTED',  37.5*TILE,  24.5*TILE);
  ctx.restore();
}

const GANG_COLOR = { A: '#c83030', B: '#2858c8', C: '#28a040' };

function drawShadow(x, y, w) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.beginPath();
  ctx.ellipse(x, y + TILE * 0.22, w, w * 0.35, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ================================================================
// Farge-helpers for detaljert inmate-render
// ================================================================
function _mixHex(hex, toward, amt) {
  const a  = parseInt(hex.slice(1), 16);
  const b  = parseInt(toward.slice(1), 16);
  const ar = (a>>16)&255, ag = (a>>8)&255, ab = a&255;
  const br = (b>>16)&255, bg = (b>>8)&255, bb = b&255;
  const r  = Math.round(ar + (br-ar)*amt);
  const g  = Math.round(ag + (bg-ag)*amt);
  const bl = Math.round(ab + (bb-ab)*amt);
  return `rgb(${r},${g},${bl})`;
}
const _lighten = (hex, amt) => _mixHex(hex, '#ffffff', amt);
const _darken  = (hex, amt) => _mixHex(hex, '#000000', amt);

function deriveFacing(inm) {
  if (inm.inFight) {
    const opp = GS.inmates.find(x => x.id === inm.fightOpponent);
    if (opp) {
      const dx = opp.px - inm.px, dy = opp.py - inm.py;
      if (dx !== 0 || dy !== 0) return Math.atan2(dy, dx);
    }
  }
  if (inm.waypoints && inm.waypoints.length > 0) {
    const w = inm.waypoints[0];
    const dx = w.px - inm.px, dy = w.py - inm.py;
    if (Math.abs(dx) > 0.1 || Math.abs(dy) > 0.1) return Math.atan2(dy, dx);
  }
  return (typeof inm._facing === 'number') ? inm._facing : Math.PI / 2;
}

// Detaljert inmate-render — kun prototypen. Kalles INNENFOR samme scope som
// det eksisterende body+head-blokken, mellom selection-ring og status-emoji.
// Forventer at (px, py) allerede inkluderer fightPush + lunge (kaller sender
// det inn). base er samme som i renderInmates-loopen.
function renderInmateDetailed(inm, px, py, base, facing) {
  const look    = inm.look;
  const build   = (typeof look.build === 'number') ? look.build : 1.0;
  const tall    = (typeof look.heightFactor === 'number') ? look.heightFactor : 1.0;
  const bPreset = BODY_TYPES[look.bodyType] || BODY_TYPES.normal;
  const br      = base * 0.56 * build;
  const hr      = base * 0.48 * (0.94 + 0.06 * build) * bPreset.hrMult;

  // Pust + walk/idle animasjoner
  const now     = Date.now();
  const breath  = 1 + 0.020 * Math.sin(now * 0.002 + inm.id * 0.7);
  const moving  = !!inm._isMoving && !inm.inFight && inm.downedMs === 0;
  const phase   = (inm._walkPhase || 0) * 0.18;   // distansebasert stride-fase
  const bob     = moving ? Math.sin(phase) * 2.0 : 0;
  const lean    = moving
    ? Math.sin((facing - Math.PI/2)) * 0.095 + 0.08
    : Math.sin(now * 0.0009 + inm.id) * 0.012;

  // Pivot ved fotpunkt, så lean + breath roterer naturlig
  const pivotY = py + base * 0.85;

  ctx.save();
  ctx.translate(px, pivotY);
  ctx.rotate(lean);
  ctx.scale(breath, breath);
  ctx.translate(-px, -pivotY);

  // Arbeidskoordinater (etter bob). heightFactor strekker vertikale avstander.
  const bx = px,           by = py + base * 0.18 * tall + bob;
  const hx = px,           hy = py - base * 0.44 * tall + bob;

  const gangColor = GANG_COLOR[inm.groupId] || '#888';
  const inGang    = inm.groupId != null;

  // Retningsskalarer for facing-aware detaljer
  const fwd   = facing - Math.PI/2;              // 0 = mot kamera
  const faceX = Math.sin(fwd);                   // -1..1: venstre/høyre
  const faceY = Math.cos(fwd);                   // 1 = mot kamera, -1 = bort
  const frontFacing = Math.max(0, faceY);        // 0..1 (fade for ansikt)
  const sideFacing  = Math.abs(faceX);           // 0..1 (for øre)

  // ========== BEIN ==========
  // Walk-fase: ett bein forover, ett bak, alternerende — drevet av distanse
  const walkPhase = moving ? Math.sin(phase) : 0;
  const pantsColor = look.pantsColor || _darken(look.clothColor, 0.32);
  const legBaseY = py + base * 0.78 * tall;
  ctx.save();
  ctx.fillStyle = pantsColor;
  // Venstre bein
  const lLift = moving ? Math.max(0, walkPhase) * 0.65 : 0;
  ctx.beginPath();
  ctx.ellipse(px - br * 0.42, legBaseY - lLift, br * 0.33, br * 0.60, 0, 0, Math.PI*2);
  ctx.fill();
  // Høyre bein
  const rLift = moving ? Math.max(0, -walkPhase) * 0.65 : 0;
  ctx.beginPath();
  ctx.ellipse(px + br * 0.42, legBaseY - rLift, br * 0.33, br * 0.60, 0, 0, Math.PI*2);
  ctx.fill();
  // Kontur-antydning
  ctx.strokeStyle = 'rgba(0,0,0,0.40)'; ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.ellipse(px - br * 0.42, legBaseY - lLift, br * 0.33, br * 0.60, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(px + br * 0.42, legBaseY - rLift, br * 0.33, br * 0.60, 0, 0, Math.PI*2); ctx.stroke();
  ctx.restore();

  // ========== SKO ==========
  // Mørk blokk i bunnen av hvert bein — beveger seg med walkPhase
  const shoeColor = look.shoeColor || '#141414';
  const shoeW = br * 0.38;
  const shoeH = br * 0.22;
  const shoeY = legBaseY + br * 0.50;
  ctx.save();
  ctx.fillStyle = shoeColor;
  ctx.beginPath(); ctx.ellipse(px - br * 0.42, shoeY - lLift, shoeW, shoeH, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px + br * 0.42, shoeY - rLift, shoeW, shoeH, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 0.7;
  ctx.beginPath(); ctx.ellipse(px - br * 0.42, shoeY - lLift, shoeW, shoeH, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(px + br * 0.42, shoeY - rLift, shoeW, shoeH, 0, 0, Math.PI*2); ctx.stroke();
  ctx.restore();

  // ========== BAKRE ARM ==========
  // Arm motsatt facing — tegnes først så fremre arm overlapper
  const armSway = moving ? Math.sin(phase + Math.PI) * 0.8 : 0;
  const armY    = by + br * 0.05;
  const armLen  = br * 0.55;
  const armWid  = br * 0.30;
  const backArmX  = bx + faceX * br * 1.05 * -1;   // motsatt facing-side
  const backArmY  = armY - armSway;
  ctx.save();
  ctx.fillStyle = _darken(look.clothColor, 0.10);
  ctx.beginPath();
  ctx.ellipse(backArmX, backArmY, armWid, armLen, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 0.7;
  ctx.stroke();
  ctx.restore();

  // ========== TORSO ==========
  // Dark pre-pass outline for silhouette contrast
  ctx.save();
  ctx.fillStyle = 'rgba(8,6,10,0.88)';
  ctx.beginPath(); ctx.arc(bx, by, br + 1.2, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // Radial gradient: lysere øvre → mørkere nedre
  const torsoGrad = ctx.createRadialGradient(
    bx - br * 0.25, by - br * 0.5, 0,
    bx,             by,              br * 1.15
  );
  torsoGrad.addColorStop(0, _lighten(look.clothColor, 0.22));
  torsoGrad.addColorStop(0.6, look.clothColor);
  torsoGrad.addColorStop(1,   _darken(look.clothColor, 0.22));
  ctx.fillStyle = torsoGrad;
  ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();

  // Rim-light venstre side
  ctx.save();
  ctx.strokeStyle = 'rgba(255,245,220,0.40)'; ctx.lineWidth = 1.1;
  ctx.beginPath(); ctx.arc(bx, by, br - 0.3, Math.PI * 1.05, Math.PI * 1.35); ctx.stroke();
  ctx.restore();

  // Torso kontur
  ctx.strokeStyle = 'rgba(0,0,0,0.60)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.stroke();

  // ========== FENGSELS-STRIPER (arena-modus) ==========
  if (isArenaMode()) {
    ctx.save();
    ctx.beginPath(); ctx.arc(bx, by, br - 0.5, 0, Math.PI*2); ctx.clip();
    ctx.fillStyle = 'rgba(255,250,245,0.72)';
    const stripeH = Math.max(1, br * 0.18);
    const stripeW = br * 2.2;
    for (let s = -1; s <= 1; s++) {
      const sy = by + s * br * 0.45 - stripeH * 0.5;
      ctx.fillRect(bx - stripeW * 0.5, sy, stripeW, stripeH);
    }
    ctx.restore();
  }

  // ========== JAKKE / VEST (~30 %) ==========
  // Andre-lags klær oppå skjorta — gir to-tone silhuett
  if (look.jacketColor) {
    const jackR = br * 0.88;
    const jackGrad = ctx.createRadialGradient(
      bx - jackR * 0.25, by - jackR * 0.45, 0,
      bx,                by - jackR * 0.10, jackR * 1.15
    );
    jackGrad.addColorStop(0,   _lighten(look.jacketColor, 0.20));
    jackGrad.addColorStop(0.6, look.jacketColor);
    jackGrad.addColorStop(1,   _darken(look.jacketColor, 0.22));
    ctx.save();
    ctx.fillStyle = jackGrad;
    ctx.beginPath(); ctx.arc(bx, by - br * 0.08, jackR, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 0.9;
    ctx.beginPath(); ctx.arc(bx, by - br * 0.08, jackR, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Krage-bue (under hodet)
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 0.9;
  ctx.beginPath();
  ctx.arc(bx, by, br * 0.9, Math.PI * 1.15, Math.PI * 1.85);
  ctx.stroke();
  ctx.restore();

  // Gjeng-symbol (samme som eksisterende render)
  if (inGang) {
    ctx.save();
    ctx.fillStyle = gangColor; ctx.globalAlpha = 0.82;
    const ss = br * 0.48;
    if (inm.groupId === 'A') {
      ctx.beginPath(); ctx.moveTo(bx, by-ss); ctx.lineTo(bx+ss*0.85, by+ss*0.5); ctx.lineTo(bx-ss*0.85, by+ss*0.5); ctx.closePath(); ctx.fill();
    } else if (inm.groupId === 'B') {
      ctx.beginPath(); ctx.arc(bx, by, ss*0.6, 0, Math.PI*2); ctx.fill();
    } else if (inm.groupId === 'C') {
      ctx.fillRect(bx-ss*0.6, by-ss*0.6, ss*1.2, ss*1.2);
    }
    ctx.restore();
  }

  // ========== FREMRE ARM ==========
  const frontArmX = bx + faceX * br * 1.05;
  const frontArmY = armY + armSway;
  ctx.save();
  ctx.fillStyle = look.clothColor;
  ctx.beginPath();
  ctx.ellipse(frontArmX, frontArmY, armWid, armLen, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.50)'; ctx.lineWidth = 0.8;
  ctx.stroke();
  // Rim-light på ytterkant av fremre arm
  ctx.strokeStyle = 'rgba(255,245,220,0.30)'; ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.ellipse(frontArmX, frontArmY, armWid, armLen, 0, Math.PI * 0.95, Math.PI * 1.25);
  ctx.stroke();
  ctx.restore();

  // ========== NAKKE ==========
  ctx.save();
  ctx.fillStyle = _darken(look.skinTone, 0.25);
  ctx.fillRect(hx - 1.2, hy + hr * 0.55, 2.4, base * 0.22);
  ctx.restore();

  // ========== HODE ==========
  // Dark pre-pass outline
  ctx.save();
  ctx.fillStyle = 'rgba(8,6,10,0.88)';
  ctx.beginPath(); ctx.arc(hx, hy, hr + 1.0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  const headGrad = ctx.createRadialGradient(
    hx - hr * 0.30, hy - hr * 0.50, 0,
    hx,             hy,              hr * 1.15
  );
  headGrad.addColorStop(0,   _lighten(look.skinTone, 0.18));
  headGrad.addColorStop(0.6, look.skinTone);
  headGrad.addColorStop(1,   _darken(look.skinTone, 0.22));
  ctx.fillStyle = headGrad;
  ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI*2); ctx.fill();

  // Kjevekant-skygge
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = 0.9;
  ctx.beginPath();
  ctx.arc(hx, hy, hr - 0.2, Math.PI * 0.28, Math.PI * 0.72);
  ctx.stroke();
  ctx.restore();

  // Hode kontur
  ctx.strokeStyle = 'rgba(0,0,0,0.60)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI*2); ctx.stroke();

  // Rim-light på hode (venstre side)
  ctx.save();
  ctx.strokeStyle = 'rgba(255,245,220,0.50)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(hx, hy, hr - 0.3, Math.PI * 1.10, Math.PI * 1.40);
  ctx.stroke();
  ctx.restore();

  // ========== ØRE-ANTYDNING (kun i profil) ==========
  if (sideFacing > 0.3) {
    ctx.save();
    ctx.fillStyle = _darken(look.skinTone, 0.22);
    ctx.globalAlpha = (sideFacing - 0.3) / 0.7;
    const earX = hx - faceX * hr * 0.95;   // motsatt facing
    ctx.beginPath();
    ctx.ellipse(earX, hy, hr * 0.18, hr * 0.32, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ========== HÅR ==========
  // 0=skallet 1=buzzcut 2=hette 3=hood-up 4=langt 5=afro 6=flat top
  if (look.hairStyle === 5) {
    // AFRO — stor rund hårmasse, sterk silhuett
    ctx.save();
    const afroR = hr * 1.55;
    const afroGrad = ctx.createRadialGradient(hx - hr*0.30, hy - hr*0.60, 0, hx, hy - hr*0.30, afroR);
    afroGrad.addColorStop(0, _lighten(look.hairColor, 0.22));
    afroGrad.addColorStop(1, _darken(look.hairColor, 0.22));
    ctx.fillStyle = afroGrad;
    ctx.beginPath();
    ctx.arc(hx, hy - hr * 0.15, afroR, Math.PI * 1.02, Math.PI * -0.02, false);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.60)'; ctx.lineWidth = 1;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,245,220,0.32)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(hx, hy - hr * 0.15, afroR - 0.6, Math.PI * 1.15, Math.PI * 1.45);
    ctx.stroke();
    ctx.restore();
  } else if (look.hairStyle === 6) {
    // FLAT TOP — rektangulær silhuett
    ctx.save();
    const ftW = hr * 1.85, ftH = hr * 0.72;
    const ftX = hx - ftW / 2;
    const ftY = hy - hr - ftH * 0.35;
    ctx.fillStyle = look.hairColor;
    ctx.fillRect(ftX, ftY, ftW, ftH);
    ctx.fillStyle = _darken(look.hairColor, 0.30);
    ctx.fillRect(ftX, ftY + ftH * 0.60, ftW, ftH * 0.25);
    ctx.strokeStyle = 'rgba(0,0,0,0.70)'; ctx.lineWidth = 1;
    ctx.strokeRect(ftX, ftY, ftW, ftH);
    ctx.restore();
  } else if (look.hairStyle > 0) {
    const capR = look.hairStyle === 2 ? hr * 1.20
               : look.hairStyle === 3 ? hr * 1.40
               : look.hairStyle === 4 ? hr * 1.06
               : hr * 0.98;
    const hairGrad = ctx.createRadialGradient(
      hx - hr * 0.25, hy - hr * 0.55, 0,
      hx,             hy - hr * 0.2,   capR
    );
    hairGrad.addColorStop(0, _lighten(look.hairColor, 0.25));
    hairGrad.addColorStop(1, _darken(look.hairColor, 0.15));
    const arcShift = (facing - Math.PI/2) * 0.25;

    if (look.hairStyle === 3) {
      // Hood-up: øvre arc + faller ned til skulder for sterk silhuett
      ctx.save();
      ctx.fillStyle = hairGrad;
      ctx.beginPath();
      ctx.arc(hx, hy, capR, Math.PI, 0, false);
      ctx.lineTo(hx + capR, hy + hr * 0.90);
      ctx.quadraticCurveTo(hx, hy + hr * 1.05, hx - capR, hy + hr * 0.90);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 0.9;
      ctx.stroke();
      ctx.restore();
    } else {
      // Standard hår-arc (kort/hette/langt)
      ctx.save();
      ctx.fillStyle = hairGrad;
      ctx.beginPath();
      ctx.arc(hx, hy, capR, Math.PI + arcShift, arcShift, false);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.restore();

      // Langt hår: ekstra ellipser som faller ned langs sidene
      if (look.hairStyle === 4) {
        ctx.save();
        ctx.fillStyle = hairGrad;
        ctx.beginPath();
        ctx.ellipse(hx - capR * 0.78, hy + hr * 0.28, hr * 0.20, hr * 0.58, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.50)'; ctx.lineWidth = 0.7;
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(hx + capR * 0.78, hy + hr * 0.28, hr * 0.20, hr * 0.58, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      // Highlight-streke (ikke for hood, gjøres over; ikke meningsfull for langt heller)
      ctx.save();
      ctx.strokeStyle = 'rgba(255,245,220,0.35)'; ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.arc(hx, hy, capR - 0.4, Math.PI * 1.15, Math.PI * 1.45);
      ctx.stroke();
      ctx.restore();

      // Hairline mot hud — kun når vendt fremover
      if (frontFacing > 0.3) {
        ctx.save();
        ctx.globalAlpha = (frontFacing - 0.3) / 0.7 * 0.7;
        ctx.strokeStyle = _darken(look.hairColor, 0.4);
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.arc(hx, hy, capR * 0.92, Math.PI + arcShift + 0.15, arcShift - 0.15, false);
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  // ========== ANSIKT (facing-aware) ==========
  if (frontFacing > 0.15) {
    const faceAlpha = (frontFacing - 0.15) / 0.85;
    ctx.save();
    ctx.globalAlpha = faceAlpha;

    // Øye-posisjon: roter (±hr*0.38, hr*0.15) med (facing - PI/2)
    const eyeDx = hr * 0.38, eyeDy = hr * 0.18;
    const cosF = Math.cos(fwd), sinF = Math.sin(fwd);
    const eye1x = hx + ( eyeDx * cosF - eyeDy * sinF);
    const eye1y = hy + ( eyeDx * sinF + eyeDy * cosF);
    const eye2x = hx + (-eyeDx * cosF - eyeDy * sinF);
    const eye2y = hy + (-eyeDx * sinF + eyeDy * cosF);

    // Blink — seedet pr. id
    const blinkPeriod = 3000 + ((inm.id * 137) % 2000);
    const blinkPhase  = (now + inm.id * 311) % blinkPeriod;
    const blinking    = blinkPhase < 120;

    // Øyne skalerer med hr — radius + blink-lengde
    const eyeR    = hr * 0.28;
    const eyeLine = hr * 0.32;
    ctx.fillStyle = 'rgba(20,14,10,0.92)';
    if (blinking) {
      ctx.strokeStyle = 'rgba(20,14,10,0.92)'; ctx.lineWidth = Math.max(0.9, hr * 0.14);
      ctx.beginPath(); ctx.moveTo(eye1x - eyeLine, eye1y); ctx.lineTo(eye1x + eyeLine, eye1y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eye2x - eyeLine, eye2y); ctx.lineTo(eye2x + eyeLine, eye2y); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(eye1x, eye1y, eyeR, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(eye2x, eye2y, eyeR, 0, Math.PI*2); ctx.fill();
      // Pupil-highlight — liten hvit prikk øverst-høyre i øyet
      ctx.fillStyle = 'rgba(255,250,240,0.85)';
      ctx.beginPath(); ctx.arc(eye1x + eyeR * 0.35, eye1y - eyeR * 0.35, eyeR * 0.40, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(eye2x + eyeR * 0.35, eye2y - eyeR * 0.35, eyeR * 0.40, 0, Math.PI*2); ctx.fill();
    }

    // Bryn — vinkel styres av unrest/temperament (aggressiv = innover-og-ned)
    if (!blinking) {
      const browOff  = hr * 0.38;
      const browLen  = hr * 0.38;
      const browTilt = inm.unrest > 70 ? 0.55
                     : inm.unrest > 40 ? 0.25
                     : inm.temperament === 'aggressive' ? 0.40
                     : inm.temperament === 'calm'       ? -0.10
                     : 0.05;
      ctx.strokeStyle = _darken(look.hairColor || '#2a1a14', 0.25);
      ctx.lineWidth   = Math.max(0.9, hr * 0.16);
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(eye1x - browLen * 0.5 * cosF, eye1y - browOff - browLen * 0.5 * sinF);
      ctx.lineTo(eye1x + browLen * 0.5 * cosF, eye1y - browOff + browTilt + browLen * 0.5 * sinF);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(eye2x - browLen * 0.5 * cosF, eye2y - browOff + browTilt - browLen * 0.5 * sinF);
      ctx.lineTo(eye2x + browLen * 0.5 * cosF, eye2y - browOff + browLen * 0.5 * sinF);
      ctx.stroke();
      ctx.lineCap = 'butt';
    }

    // Munn — skalerer med hr, form avhenger av unrest
    const mouthDy   = hr * 0.68;
    const mx        = hx + (0 * cosF - mouthDy * sinF);
    const my        = hy + (0 * sinF + mouthDy * cosF);
    const mouthDrop = inm.unrest > 70 ? hr * 0.28 : inm.unrest > 40 ? hr * 0.14 : 0;
    const mouthHalf = hr * 0.42;
    ctx.strokeStyle = 'rgba(0,0,0,0.70)';
    ctx.lineWidth   = Math.max(0.9, hr * 0.15);
    ctx.beginPath();
    ctx.moveTo(mx - mouthHalf * cosF,             my - mouthHalf * sinF + mouthDrop);
    ctx.quadraticCurveTo(mx, my + mouthDrop * 0.4, mx + mouthHalf * cosF, my + mouthHalf * sinF + mouthDrop);
    ctx.stroke();

    ctx.restore();
  }

  // ========== SKJEGG ==========
  // Stubble: eksisterende dot-pattern, lavere alpha
  if (look.beardStyle === 'stubble' && frontFacing > 0.25) {
    ctx.save();
    ctx.globalAlpha = (frontFacing - 0.25) / 0.75 * 0.70;
    ctx.fillStyle = _darken(look.hairColor, 0.1);
    const cosF2 = Math.cos(fwd), sinF2 = Math.sin(fwd);
    const stubs = [
      [-0.55, 0.58], [ 0.55, 0.58],
      [-0.25, 0.75], [ 0.25, 0.75],
      [ 0.00, 0.66],
    ];
    for (const [sx, sy] of stubs) {
      const dx = sx * hr, dy = sy * hr;
      const x = hx + (dx * cosF2 - dy * sinF2);
      const y = hy + (dx * sinF2 + dy * cosF2);
      ctx.beginPath(); ctx.arc(x, y, 0.55, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  // Full: solid masse under haken — leser som mørk klump på avstand
  else if (look.beardStyle === 'full' && frontFacing > 0.10) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, (frontFacing - 0.10) / 0.40) * 0.88;
    ctx.fillStyle = _darken(look.hairColor, 0.18);
    const cosF2 = Math.cos(fwd), sinF2 = Math.sin(fwd);
    const bDy = hr * 0.64;
    const bcx = hx + (0 * cosF2 - bDy * sinF2);
    const bcy = hy + (0 * sinF2 + bDy * cosF2);
    ctx.beginPath();
    ctx.ellipse(bcx, bcy, hr * 0.58, hr * 0.42, fwd, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.restore();
  }

  // Gjeng-bandana (samme som eksisterende, tegnes øverst på panne)
  if (inGang) {
    ctx.save();
    ctx.fillStyle = gangColor; ctx.globalAlpha = 0.72;
    ctx.fillRect(hx - hr*1.05, hy - hr*0.18, hr*2.1, 2);
    ctx.restore();
  }

  ctx.restore();
}
